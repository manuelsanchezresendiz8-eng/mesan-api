name: Deploy MESAN Omega

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import sanity check
        run: python -c "from main_enterprise import app; print('MESAN Omega import OK')"
        env:
          PYTHONPATH: .

      - name: Run tests
        run: pytest tests/ -q --tb=short
        env:
          PYTHONPATH: .
          MESAN_SECRET_KEY: test_secret_key_ci
