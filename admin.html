<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN-Ω CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;800&display=swap" rel="stylesheet">
<style>
:root {
    --accent: #38BDF8; /* El Azul MESAN */
    --title: #FFFFFF;
    --text: #94A3B8;
    --bg: #000000;
    --bg-deep: #0A192F;
    --card: rgba(10,25,47,0.9);
    --border: rgba(56,189,248,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(circle at center, var(--bg-deep) 0%, var(--bg) 100%);
    color: var(--title);
    font-family: 'Lexend', sans-serif;
    min-height: 100vh;
    padding: 80px 20px 40px;
}

.nav {
    position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 15px 30px; font-size: 11px; letter-spacing: 3px; color: var(--accent);
    background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); z-index: 100;
}

.nav-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 5px 12px; font-size: 9px; cursor: pointer; border-radius: 3px;
}
.nav-btn.active { border-color: var(--accent); color: var(--accent); }

.stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }

.card {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    padding: 18px; margin-bottom: 12px; border-left: 3px solid var(--accent);
}

.btn-action {
    padding: 6px 12px; background: transparent; border: 1px solid var(--border);
    color: var(--accent); font-size: 9px; cursor: pointer; border-radius: 3px;
}

.login-box {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: var(--card); padding: 40px; border: 1px solid var(--accent); width: 300px; z-index: 200;
}

.login-box input {
    width: 100%; padding: 12px; background: #000; border: 1px solid var(--border);
    color: #fff; margin-bottom: 15px; text-align: center;
}

.btn-login {
    width: 100%; padding: 13px; background: transparent; border: 1px solid var(--accent);
    color: var(--accent); cursor: pointer;
}
</style>
</head>
<body>

<div id="loginBox" class="login-box">
    <h3>MESAN Ω — CRM</h3>
    <input id="apiKeyInput" type="password" placeholder="API KEY">
    <button class="btn-login" onclick="iniciarSesion()">ACCEDER</button>
</div>

<div class="nav" id="topbar" style="display:none;">
    <div>MESAN Ω — CRM</div>
    <div style="display:flex; gap:10px;">
        <button class="nav-btn active" id="btn-fecha" onclick="ordenar('fecha')">RECIENTES</button>
        <button class="nav-btn" id="btn-score" onclick="ordenar('score')">SCORE</button>
        <button class="nav-btn" onclick="logout()">SALIR</button>
        <span id="timer" style="font-size:9px; color:#334155;">30s</span>
    </div>
</div>

<div id="leads" style="margin-top:20px;"></div>

<script>
const API = "https://mesan-api.onrender.com";
let API_KEY = localStorage.getItem("mesan_key");
let countdown = 30;

if (API_KEY) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("topbar").style.display = "flex";
    cargar();
}

function iniciarSesion() {
    const key = document.getElementById("apiKeyInput").value.trim();
    localStorage.setItem("mesan_key", key);
    location.reload();
}

function logout() { localStorage.removeItem("mesan_key"); location.reload(); }

async function cargar() {
    try {
        const res = await fetch(API + "/leads", { headers: { "api-key": API_KEY } });
        const data = await res.json();
        render(data.leads || []);
    } catch(e) { console.log("Error"); }
}

function render(leads) {
    let html = "";
    leads.forEach(l => {
        html += `<div class="card">
            <div style="font-size:14px; font-weight:600;">${l.nombre || "Lead"}</div>
            <div style="font-size:11px; color:var(--text); margin:10px 0;">
                Score: <span style="color:var(--accent)">${l.score||0}</span> | ${l.email||""}<br>
                Exposición: <span style="color:var(--accent)">$${(l.impacto_min||0).toLocaleString()} MXN</span>
            </div>
            <button class="btn-action" onclick="window.open('https://wa.me/52${l.telefono}')">WHATSAPP</button>
        </div>`;
    });
    document.getElementById("leads").innerHTML = html;
}

setInterval(() => {
    countdown--;
    document.getElementById("timer").innerText = countdown + "s";
    if (countdown <= 0) { countdown = 30; cargar(); }
}, 1000);
</script>
</body>
</html>
