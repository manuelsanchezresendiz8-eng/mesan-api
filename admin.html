<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω | CRM Central</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #010508; --panel: #06121D; --accent: #00BFFF;

    --input-bg: #0A1929; --alert: #FF3B30; --ia: #9B59B6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background-color:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding:70px 20px 40px; }

/* NAVEGACIÓN ORIGINAL */
.nav { position:fixed; top:0; width:100%; display:flex; justify-content:space-between; align-items:center; padding:12px 20px; font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:3px; color:var(--text); background:rgba(1,5,8,0.97); border-bottom:1px solid var(--border); backdrop-filter:blur(10px); z-index:100; }
.nav-actions { display:flex; gap:10px; }
.nav-btn { background:transparent; border:1px solid var(--border); color:var(--dim); padding:5px 12px; font-family:'Orbitron',sans-serif; font-size:9px; cursor:pointer; border-radius:4px; transition:0.3s; }
.nav-btn:hover { border-color:var(--accent); color:var(--accent); }

/* LOGIN BOX */
.login-box { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--panel); padding:40px; border-radius:10px; border:1px solid var(--accent); width:300px; z-index:200; text-align:center; }
.login-title { font-family:'Orbitron',sans-serif; font-size:16px; color:var(--accent); margin-bottom:25px; letter-spacing:2px; }
.login-box input { width:100%; padding:13px; background:var(--input-bg); border:1px solid var(--border); color:var(--text); border-radius:6px; margin-bottom:15px; text-align:center; outline:none; }
.btn-login { width:100%; padding:13px; background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:'Orbitron',sans-serif; cursor:pointer; border-radius:6px; }

/* TABS */
.tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:1px solid var(--border); }
.tab { padding:12px 16px; background:transparent; border:none; color:var(--dim); font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:2px; cursor:pointer; }

.ia-console { background:var(--panel); border:1px solid var(--ia); border-radius:8px; padding:20px; }

.ia-result { display:none; margin-top:20px; background:rgba(155,89,182,0.05); border:1px solid var(--ia); padding:15px; border-radius:6px; }
.ia-res-text { font-size:13px; line-height:1.6; white-space:pre-wrap; }

.footer { text-align:center; margin-top:40px; font-family:'Orbitron',sans-serif; font-size:9px; color:var(--dim); opacity:0.3; letter-spacing:4px; }
</style>
</head>
<body>

<div id="loginBox" class="login-box">
    <div class="login-title">MESAN Ω — CRM</div>
    <input id="apiKeyInput" type="password" placeholder="API KEY">
    <button class="btn-login" id="btnLogin">ACCEDER</button>
</div>

<div class="nav" id="topbar" style="display:none;">
    <div>MESAN Ω — CONTROL</div>
    <div class="nav-actions">
        <button class="nav-btn" onclick="location.reload()">ACTUALIZAR</button>
        <button class="nav-btn" onclick="logout()">SALIR</button>
    </div>
</div>

<div id="mainContent" style="display:none;">
    <div class="tabs">
        <button class="tab active" onclick="cambiarTab('leads',this)">LEADS</button>
        <button class="tab" onclick="cambiarTab('motor',this)">MOTOR</button>
        <button class="tab" onclick="cambiarTab('ia',this)">🧠 IA</button>
    </div>

    <div id="tab-leads" class="tab-content">
        <div id="leads-list"></div>
    </div>

    <div id="tab-ia" class="tab-content" style="display:none;">
        <div class="ia-console">
            <textarea class="ia-textarea" id="ia-input" placeholder="Ej: Cliente con 5 empleados, 4 sin IMSS, 1 con Infonavit..."></textarea>
            <button class="btn-ia" id="btn-ia" onclick="analizarIA()">ANALIZAR CON IA</button>
            <div class="ia-result" id="ia-result">
                <div class="ia-res-text" id="ia-res-text"></div>
            </div>
        </div>
    </div>
</div>

<div class="footer" id="footer" style="display:none;">MESAN Ω © 2026</div>

<script>
var API_KEY = localStorage.getItem("mesan_key");

function desbloquear() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("topbar").style.display = "flex";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("footer").style.display = "block";
}

document.getElementById("btnLogin").onclick = function() {
    var key = document.getElementById("apiKeyInput").value;
    if(key) { localStorage.setItem("mesan_key", key); desbloquear(); }
}

if(API_KEY) desbloquear();

function logout() { localStorage.removeItem("mesan_key"); location.reload(); }

function cambiarTab(tab, el) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).style.display = 'block';
    el.classList.add('active');
}

function analizarIA() {
    var prompt = document.getElementById("ia-input").value.toLowerCase();
    var resDiv = document.getElementById("ia-result");
    var resText = document.getElementById("ia-res-text");
    
    if(!prompt) return;

    resDiv.style.display = "block";
    resText.innerText = "PROCESANDO ESCENARIO FISCAL...";

    setTimeout(() => {
        let diagnostico = "";
        
        if(prompt.includes("infonavit")) {
            diagnostico = "DIAGNÓSTICO TÉCNICO OMEGA:\n\n" +
                "• RIESGO CRÍTICO: El empleado con INFONAVIT genera una huella digital inmediata. El Instituto detectará la falta de aportaciones y notificará automáticamente al IMSS.\n" +
                "• CONTINGENCIA: Omisión de cuotas COP y RCV por los 4 empleados restantes. Estimación de capitales constitutivos y multas (Art. 304 LSS).\n" +
                "• ACCIÓN: Regularizar al portador de crédito y aplicar estrategia de sustitución patronal o blindaje para los nodos no registrados.";
        } else if(prompt.includes("empleados")) {
            diagnostico = "ANÁLISIS ESTRUCTURAL:\n\n" +
                "Detectada falta de cumplimiento en Seguridad Social. Riesgo de multas por grado de siniestralidad omitido y responsabilidad solidaria.";
        } else {
            diagnostico = "ANALIZANDO: Situación detectada fuera de los parámetros de Soberanía. Se requiere desglose de nómina para cálculo de impacto.";
        }
        
        resText.innerText = diagnostico;
    }, 1000);
}
</script>
</body>
</html>
