<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN-Ω CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;800&display=swap" rel="stylesheet">
<style>
:root {
    --accent: #38BDF8; /* Azul MESAN homologado */
    --title: #FFFFFF;
    --text: #94A3B8;
    --bg: #000000;
    --bg-deep: #0A192F;
    --card: rgba(10,25,47,0.9);
    --border: rgba(56,189,248,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(circle at center, var(--bg-deep) 0%, var(--bg) 100%);
    color: var(--title);
    font-family: 'Lexend', sans-serif;
    min-height: 100vh;
    padding: 80px 20px 40px;
}

/* NAVBAR HOMOLOGADA */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    background: rgba(0,0,0,0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    z-index: 100;
}

.nav-actions { display: flex; gap: 15px; align-items: center; }

.nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    font-family: 'Lexend', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    transition: 0.3s;
}

.nav-btn:hover, .nav-btn.active { 
    border-color: var(--accent); 
    color: var(--accent);
    background: rgba(56,189,248,0.1);
}

.timer { font-size: 9px; color: #475569; letter-spacing: 1px; }

/* STATS */
.stats {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    flex: 1;
    min-width: 100px;
    text-align: center;
}

.stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    display: block;
}

.stat-lbl {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text);
    text-transform: uppercase;
    margin-top: 4px;
}

/* CARDS DE LEADS */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 12px;
    border-left: 4px solid var(--border);
    transition: 0.4s ease;
}

.card:hover { 
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(56,189,248,0.1);
}

/* Indicadores de Score homologados al Azul MESAN */
.card.critico { border-left-color: var(--accent); }
.card.vulnerable { border-left-color: rgba(56,189,248,0.5); }
.card.estable { border-left-color: rgba(56,189,248,0.2); }

.card-nombre {
    font-size: 15px;
    font-weight: 600;
    color: var(--title);
    margin-bottom: 10px;
    letter-spacing: 1px;
}

.card-info {
    font-size: 11px;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 15px;
}

.card-info span { color: var(--accent); font-weight: 600; }

.card-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
}

.btn-action {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Lexend', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: 0.3s;
    text-decoration: none;
    text-align: center;
}

.btn-action:hover { 
    border-color: var(--accent); 
    color: var(--accent);
    background: rgba(56,189,248,0.05);
}

.btn-action.wa { 
    background: rgba(56,189,248,0.1);
    border-color: var(--accent); 
    color: var(--accent);
    font-weight: 600;
}

.card-select {
    background: #000;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Lexend', sans-serif;
    font-size: 10px;
    padding: 8px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
}

.giro-tag {
    display: inline-block;
    font-size: 9px;
    padding: 3px 10px;
    background: rgba(56,189,248,0.1);
    color: var(--accent);
    border-radius: 3px;
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-transform: uppercase;
}

.fecha {
    font-size: 9px;
    color: #475569;
    letter-spacing: 1px;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 50px;
    font-size: 10px;
    color: #334155;
    letter-spacing: 4px;
}
</style>
</head>
<body>

<div id="loginBox" class="login-box" style="display:none;">
    </div>

<div class="nav" id="topbar">
    <div>MESAN Ω — CRM</div>
    <div class="nav-actions">
        <button class="nav-btn active" id="btn-fecha" onclick="ordenar('fecha')">RECIENTES</button>
        <button class="nav-btn" id="btn-score" onclick="ordenar('score')">SCORE</button>
        <button class="nav-btn" onclick="cargar()">ACTUALIZAR</button>
        <button class="nav-btn" onclick="logout()">SALIR</button>
        <span class="timer" id="timer">30s</span>
    </div>
</div>

<div class="stats" id="stats">
    <div class="stat"><span class="stat-num" id="total">19</span><div class="stat-lbl">Total</div></div>
    <div class="stat"><span class="stat-num" id="criticos">1</span><div class="stat-lbl">Críticos</div></div>
    <div class="stat"><span class="stat-num" id="pagados">0</span><div class="stat-lbl">Pagados</div></div>
</div>

<div id="leads">
    <div class="card critico">
        <div class="giro-tag">EDUCACIÓN</div>
        <div class="card-nombre">cbtis 21</div>
        <div class="card-info">
            Score: <span>100</span> &nbsp;|&nbsp; MEDIO<br>
            bledsoe_18@icloud.com<br>
            5548722116<br>
            Exposición: <span>$7,211 — $10,816 MXN</span><br>
            <span class="fecha">📅 19/04/2026 4:57 am</span>
        </div>
        <div class="card-actions">
            <button class="btn-action wa">WHATSAPP</button>
            <button class="btn-action">LLAMAR</button>
            <button class="btn-action">ID</button>
            <select class="card-select">
                <option>NUEVO</option>
                <option>CONTACTADO</option>
            </select>
        </div>
    </div>
</div>

<div class="footer">MESAN Ω © 2026 — SOBERANÍA EMPRESARIAL</div>

</body>
</html>
