    /* RESET Y FONDO BASE */
    body {

        font-family: 'Courier New', Courier, monospace; /* Estilo terminal pro */

    }

    /* CONTENEDOR PRINCIPAL */
    .crm-container {
        max-width: 1200px;
        margin: auto;
        border: 1px solid rgba(0, 242, 255, 0.2);
        background: rgba(0, 0, 0, 0.8);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);

    }

    /* HEADER DEL CRM */
    .crm-header {
        border-bottom: 2px solid #00f2ff;
        padding-bottom: 10px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .crm-header h1 {
        letter-spacing: 5px;
        text-transform: uppercase;
        margin: 0;
    }

    /* TARJETAS DE CLIENTES/REGISTROS */
    .record-card {
        background: rgba(255, 255, 255, 0.03);
        border-left: 4px solid #00f2ff;
        margin-bottom: 15px;
        padding: 20px;
        transition: all 0.3s ease;
    }

    }

    .exposure-value {
        color: #ff3e3e;
        font-weight: bold;
        font-size: 1.1rem;
    }

    .btn-action {
        background: transparent;
        border: 1px solid #00f2ff;
        color: #00f2ff;
        padding: 5px 15px;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 12px;
        margin-right: 10px;
    }

    .btn-action:hover {
        background: #00f2ff;
        color: #000;
    }

    /* INDICADORES SUPERIORES (NÚMEROS) */
    .stats-bar {
        display: flex;
        gap: 30px;
        margin-bottom: 20px;
        font-size: 1.5rem;
    }

    .stat-item span {
        color: #fff;
    }
</style>
