<body>

<div id="loginBox" class="login-box">

        </div>
        <div id="leads"></div>

        <div class="field"><label>Precio del servicio ($)</label><input id="precio" type="number" placeholder="27200"></div>

        <button class="btn-main" onclick="ejecutarMotor()">EJECUTAR DIAGNÓSTICO</button>
    </div>

    <div id="tab-ia" class="tab-content">

<script>
var API = "https://mesan-api.onrender.com";
var API_KEY = localStorage.getItem("mesan_key");

function desbloquearSistema() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("topbar").style.display = "flex";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("footer").style.display = "block";
    cargarLeads();
}

document.getElementById("btnLogin").addEventListener("click", function() {
    var key = document.getElementById("apiKeyInput").value.trim();
    if (!key) return;
    localStorage.setItem("mesan_key", key);
    API_KEY = key;
    desbloquearSistema();
});

if (API_KEY) { desbloquearSistema(); }

function logout() { localStorage.removeItem("mesan_key"); location.reload(); }

function cambiarTab(tab, el) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("tab-" + tab).classList.add("active");
}

function cargarLeads() {
    if (!API_KEY) return;
    fetch(API + "/leads", { headers: { "api-key": API_KEY } })
    .then(res => res.json())
    .then(data => {
        var leads = data.leads || [];
        document.getElementById("total").innerText = leads.length;
        document.getElementById("leads").innerHTML = leads.map(l => `
            <div class="card ${l.impacto > 100000 ? 'critico' : ''}">
                <div class="card-nombre">${l.nombre}</div>
                <div class="card-info">Impacto: <span>$${l.impacto}</span></div>
            </div>
        `).join('');
    }).catch(e => console.log("Error de conexión"));
}

function ejecutarMotor() {
    alert("Diagnóstico procesado bajo protocolo Omega.");
}

function consultarIA() {
    var btn = document.getElementById("btn-ia");
    btn.innerText = "PROCESANDO...";
    setTimeout(() => {
        document.getElementById("ia-result").style.display = "block";
        document.getElementById("ia-result-text").innerText = "ANÁLISIS: Riesgo estructural detectado. Proceda con blindaje fiscal.";
        btn.innerText = "ANALIZAR CON IA";
    }, 1000);
}
</script>
