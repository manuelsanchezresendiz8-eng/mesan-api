<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω | CONSOLA DE DIAGNÓSTICO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root {
        --bg: #010508; --accent: #00FFFF; --border: #1A3B61;
        --text: #FFFFFF; --dim: #5E7A94; --alert: #FF3B30; --ia: #9B59B6;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background-color:var(--bg); color:var(--text); font-family:'Inter', sans-serif; padding:20px; }
    
    /* CABECERA HOMOLOGADA */
    .header-master { font-family:'Orbitron', sans-serif; margin-bottom:30px; }
    .header-sub { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 5px; }
    .header-title { color: var(--accent); font-size: 22px; letter-spacing: 3px; }

    /* CONTENEDOR DE CONSOLA */
    .console-box { border: 1px solid var(--border); border-radius: 4px; padding: 25px; background: rgba(6, 18, 29, 0.3); margin-bottom: 20px; position: relative; }
    .console-label { font-family: 'Orbitron'; font-size: 9px; color: var(--dim); letter-spacing: 2px; margin-bottom: 15px; display: block; text-transform: uppercase; }

    /* TACÓMETRO DE RIESGO */
    .gauge-wrapper { width: 180px; margin: 0 auto 20px; position: relative; }
    .gauge-val { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron'; font-size: 24px; color: var(--alert); }

    /* ÁREA DE INPUT IA */
    .ia-textarea { width: 100%; background: #0A1929; border: 1px solid var(--border); border-left: 4px solid var(--ia); padding: 15px; color: white; font-family: 'Inter'; font-size: 13px; outline: none; resize: none; border-radius: 4px; }
    .btn-analizar { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--ia); color: var(--ia); font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; letter-spacing: 2px; transition: 0.3s; font-size: 11px; }
    .btn-analizar:hover { background: rgba(155, 89, 182, 0.1); }

    /* RESULTADO ESTRATÉGICO */
    .result-pane { display: none; margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .data-row { margin-bottom: 15px; }
    .data-label { font-family: 'Orbitron'; font-size: 10px; color: var(--ia); margin-bottom: 5px; display: block; }
    .data-text { font-size: 14px; color: var(--text); line-height: 1.6; }
    .money-val { font-family: 'Orbitron'; font-size: 26px; color: var(--alert); }

    /* WHATSAPP CTA */
    .wa-card { background: rgba(0, 255, 255, 0.03); border: 1px dashed var(--accent); padding: 15px; color: var(--accent); font-size: 12px; margin-top: 15px; border-radius: 4px; white-space: pre-wrap; }
</style>
</head>
<body>

    <div class="header-master">
        <div class="header-sub">// CONSOLA DE DIAGNÓSTICO MESAN Ω</div>
        <div class="header-title">Maestría Empresarial</div>
    </div>

    <div class="console-box" style="border-color: var(--accent);">
        <span class="console-label">Nivel de Riesgo Operativo</span>
        <div class="gauge-wrapper">
            <canvas id="gaugeChart"></canvas>
            <div id="gaugeText" class="gauge-val">0%</div>
        </div>
    </div>

    <div class="console-box" style="border-color: var(--ia);">
        <span class="console-label">Consultor Estratégico Activo</span>
        <textarea id="ia-input" class="ia-textarea" rows="3" placeholder="Describa la situación de la empresa..."></textarea>
        <button class="btn-analizar" onclick="ejecutarDictamen()">ANALIZAR CON IA</button>

        <div id="output" class="result-pane">
            <div class="data-row">
                <span class="data-label">Diagnóstico de Impacto</span>
                <div id="diag-text" class="data-text"></div>
            </div>
            <div class="data-row">
                <span class="data-label">Contingencia Estimada</span>
                <div id="money-text" class="money-val"></div>
            </div>
            <div class="data-row">
                <span class="data-label">Propuesta WhatsApp para el CEO</span>
                <div id="wa-text" class="wa-card"></div>
                <button class="btn-analizar" style="border-color: var(--accent); color: var(--accent);" onclick="copyWA()">COPIAR PARA ENVÍO</button>
            </div>
        </div>
    </div>

<script>
    // Inicializar Tacómetro
    const ctx = document.getElementById('gaugeChart').getContext('2d');
    const gauge = new Chart(ctx, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [0, 100],
                backgroundColor: ['#FF3B30', '#1A3B61'],
                borderWidth: 0, circumference: 180, rotation: 270, cutout: '85%'
            }]
        },
        options: { plugins: { tooltip: { enabled: false } }, responsive: true }
    });

    function ejecutarDictamen() {
        const input = document.getElementById("ia-input").value.toLowerCase();
        const out = document.getElementById("output");
        
        // Actualizar tacómetro visualmente
        gauge.data.datasets[0].data = [88, 12];
        gauge.update();
        document.getElementById("gaugeText").innerText = "88%";
        
        out.style.display = "block";

        if(input.includes("cofepris") || input.includes("clausura")) {
            document.getElementById("diag-text").innerHTML = "<b>ESTADO CRÍTICO:</b> La clausura sanitaria por COFEPRIS genera una interrupción total del flujo de caja. Riesgo inminente de revocación de licencia si no se atiende el Suplemento de la FEUM de inmediato.";
            document.getElementById("money-text").innerText = "$320,000 MXN";
            document.getElementById("wa-text").innerText = "MESAN Ω INFORME:\n\nLa clausura actual es un bloqueo operativo de alto impacto. Tenemos el protocolo para solventar las actas técnicas y reabrir bajo nuestro esquema de Soberanía Empresarial. ¿Ejecutamos?";
        } else {
            document.getElementById("diag-text").innerText = "Analizando variables de riesgo en la infraestructura fiscal y operativa...";
            document.getElementById("money-text").innerText = "CÁLCULO EN CURSO";
            document.getElementById("wa-text").innerText = "Esperando entrada de datos técnicos...";
        }
    }

    function copyWA() {
        navigator.clipboard.writeText(document.getElementById("wa-text").innerText);
        alert("Mensaje copiado.");
    }
</script>
</body>
</html>
