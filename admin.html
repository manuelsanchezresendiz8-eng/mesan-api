<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN-Ω CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f3ff;--magenta:#ff0055;--dark:#000508;--panel:#040f1e;--text:#d4e8f0;--dim:rgba(180,210,225,0.4);--border:rgba(0,243,255,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'JetBrains Mono';padding:24px;}
h1{font-family:'Orbitron';color:var(--cyan);letter-spacing:6px;}
.sub{font-size:10px;color:var(--dim);margin-bottom:20px;}
.stats{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.stat{border:1px solid var(--border);padding:10px;}
.stat-num{font-family:'Orbitron';font-size:1.5rem;color:var(--cyan);}
.stat-num.red{color:var(--magenta);}
.stat-lbl{font-size:9px;color:var(--dim);}
.card{border:1px solid var(--border);background:var(--panel);padding:15px;margin-bottom:10px;}
.card.critico{border-left:3px solid var(--magenta);}
.card.vulnerable{border-left:3px solid #ffaa00;}
.card.estable{border-left:3px solid #00e5a0;}
.btn{cursor:pointer;padding:6px 12px;border:none;font-size:10px;}
.btn-wa{background:#25D366;color:#fff;}
.btn-call{background:var(--cyan);color:#000;}
.btn-id{background:none;border:1px solid var(--border);color:var(--dim);}
select{background:#000;color:#fff;border:1px solid var(--border);padding:5px;}
.empty{text-align:center;color:var(--dim);padding:40px;}
.timer{font-size:10px;color:var(--dim);}
.giro-tag{display:inline-block;font-size:9px;padding:2px 8px;border:1px solid rgba(0,243,255,0.3);color:var(--cyan);margin-bottom:6px;border-radius:3px;}
.orden-btn{background:none;border:1px solid var(--border);color:var(--dim);padding:4px 10px;font-size:10px;cursor:pointer;margin-left:10px;}
.orden-btn.active{border-color:var(--cyan);color:var(--cyan);}
.fecha-local{font-size:9px;color:var(--dim);}
</style>
</head>
<body>

<h1>MESAN-Ω CRM</h1>
<div class="sub">Panel de Control de Leads — Hora local: Mexicali (UTC-8)</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="total">0</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-num red" id="criticos">0</div><div class="stat-lbl">Críticos</div></div>
  <div class="stat"><div class="stat-num" id="pagados">0</div><div class="stat-lbl">Pagados</div></div>
</div>

<button onclick="cargar()">Actualizar</button>
<button onclick="logout()">Cerrar sesión</button>
<button class="orden-btn active" id="btn-fecha" onclick="ordenar('fecha')">📅 Recientes</button>
<button class="orden-btn" id="btn-score" onclick="ordenar('score')">🔥 Score</button>
<span class="timer" id="timer">Auto-refresh: 30s</span>

<div id="leads"></div>

<script>
const API = "https://mesan-api.onrender.com";
let API_KEY = localStorage.getItem("mesan_key");
let countdown = 30;
let ordenActual = "fecha";
let leadsCache = [];

if (!API_KEY) {
  API_KEY = prompt("Ingrese API Key MESAN Ω");
  if (API_KEY) localStorage.setItem("mesan_key", API_KEY);
}

function logout(){
  localStorage.removeItem("mesan_key");
  location.reload();
}

function formatFecha(fecha) {
  if (!fecha) return "-";
  try {
    const d = new Date(fecha);
    const offset = -8 * 60;
    const local = new Date(d.getTime() + (offset - d.getTimezoneOffset()) * 60000);

    const dia = String(local.getDate()).padStart(2, "0");
    const mes = String(local.getMonth() + 1).padStart(2, "0");
    const anio = local.getFullYear();
    const hora = local.getHours();
    const min = String(local.getMinutes()).padStart(2, "0");
    const ampm = hora >= 12 ? "p.m." : "a.m.";
    const hora12 = hora % 12 || 12;

    return `${dia}/${mes}/${anio}, ${hora12}:${min} ${ampm}`;
  } catch(e) {
    return fecha.substring(0, 16).replace("T", " ");
  }
}

function ordenar(tipo) {
  ordenActual = tipo;
  document.getElementById("btn-fecha").classList.toggle("active", tipo === "fecha");
  document.getElementById("btn-score").classList.toggle("active", tipo === "score");
  render(leadsCache);
}

async function cargar(){
  if (!API_KEY) return;
  try{
    const res = await fetch(API + "/leads", {
      headers: { "api-key": API_KEY }
    });

    if (res.status === 403) {
      alert("API Key inválida");
      logout();
      return;
    }

    if (!res.ok) throw new Error();

    const data = await res.json();
    leadsCache = data.leads || [];
    render(leadsCache);
    countdown = 30;

  }catch(e){
    console.error(e);
    document.getElementById("leads").innerHTML =
      "<div class='empty'>Error de conexión con el servidor</div>";
  }
}

function render(leads){
  document.getElementById("total").innerText = leads.length;

  const criticosList = ["ALTO","CRISIS FINANCIERA","RIESGO OPERATIVO","RIESGO LEGAL"];
  document.getElementById("criticos").innerText =
    leads.filter(l => criticosList.includes(l.clasificacion)).length;
  document.getElementById("pagados").innerText =
    leads.filter(l => l.estatus === "pagado").length;

  if (!leads.length){
    document.getElementById("leads").innerHTML =
      "<div class='empty'>Sin leads aún</div>";
    return;
  }

  const sorted = [...leads];
  if (ordenActual === "fecha") {
    sorted.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
  } else {
    sorted.sort((a,b) => (b.score||0) - (a.score||0));
  }

  let html = "";

  sorted.forEach(l => {
    const criticosList = ["ALTO","CRISIS FINANCIERA","RIESGO OPERATIVO","RIESGO LEGAL"];
    const mediosList = ["MEDIO","INEFICIENCIA","RIESGO REPSE"];
    const tipo = criticosList.includes(l.clasificacion) ? "critico"
               : mediosList.includes(l.clasificacion) ? "vulnerable"
               : "estable";

    const tel = (l.telefono || "").replace(/\D/g,"");
    const waMsg = encodeURIComponent(
      "Hola " + (l.nombre || "") + ", revisé tu diagnóstico MESAN Omega.\n" +
      "Score: " + (l.score || 0) + " — " + (l.clasificacion || "") + "\n" +
      "¿Tienes 15 minutos para una llamada?"
    );
    const waLink = tel ? `https://wa.me/52${tel}?text=${waMsg}` : "#";
    const giro = l.giro ? `<span class="giro-tag">${l.giro.toUpperCase()}</span><br>` : "";

    html += `
      <div class="card ${tipo}">
        ${giro}
        <b>${l.nombre || "Sin nombre"}</b><br>
        Score: ${l.score || 0} (${l.clasificacion || "N/A"})<br>
        Email: ${l.email || "-"}<br>
        Tel: ${l.telefono || "-"}<br>
        Exposición: $${(l.impacto_min||0).toLocaleString()} - $${(l.impacto_max||0).toLocaleString()} MXN<br>
        <span class="fecha-local">📅 ${formatFecha(l.fecha)}</span><br><br>
        <a href="${waLink}" target="_blank" class="btn btn-wa">WhatsApp</a>
        <a href="tel:${l.telefono || ""}" class="btn btn-call">Llamar</a>
        <button class="btn btn-id" onclick="copiar('${l.id}')">ID</button>
        <select onchange="update('${l.id}',this.value)">
          <option value="nuevo" ${l.estatus==="nuevo"?"selected":""}>nuevo</option>
          <option value="contactado" ${l.estatus==="contactado"?"selected":""}>contactado</option>
          <option value="cerrado" ${l.estatus==="cerrado"?"selected":""}>cerrado</option>
          <option value="perdido" ${l.estatus==="perdido"?"selected":""}>perdido</option>
        </select>
      </div>
    `;
  });

  document.getElementById("leads").innerHTML = html;
}

async function update(id, estatus){
  try{
    await fetch(API + "/lead/" + id, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "api-key": API_KEY
      },
      body: JSON.stringify({estatus})
    });
  }catch(e){
    alert("Error de conexión");
  }
}

function copiar(id){
  navigator.clipboard.writeText(id);
  alert("ID copiado");
}

setInterval(() => {
  countdown--;
  document.getElementById("timer").innerText = "Auto-refresh: " + countdown + "s";
  if (countdown <= 0) cargar();
}, 1000);

cargar();
</script>
</body>
</html>
