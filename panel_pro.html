<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Omega — Motor Financiero</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#010508;--accent:#00FFFF;--border:#1A3B61;--text:#FFFFFF;--dim:#5E7A94;--ok:#00FF9C;--warn:#FF8C00;--alert:#FF3B30;--panel:#06121D;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:20px;}
.header{font-family:'Orbitron';margin-bottom:30px;}
.header-sub{font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:5px;}
.header-title{color:var(--accent);font-size:20px;letter-spacing:3px;}
.nav-links{margin-bottom:20px;}
.nav-links a{color:var(--dim);font-size:12px;text-decoration:none;margin-right:15px;}
.nav-links a:hover{color:var(--accent);}
.console-box{border:1px solid var(--border);border-radius:4px;padding:25px;background:rgba(6,18,29,0.3);margin-bottom:20px;}
.console-label{font-family:'Orbitron';font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:15px;display:block;text-transform:uppercase;}
.field{margin-bottom:16px;}
.field label{font-size:11px;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:6px;text-transform:uppercase;}
.field input,.field select{width:100%;background:#0A1929;border:1px solid var(--border);color:#fff;padding:10px 12px;border-radius:4px;font-size:13px;outline:none;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.areas-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.area-item{background:#0A1929;border:1px solid var(--border);border-radius:4px;padding:10px;}
.area-item label{font-size:10px;color:var(--dim);display:block;margin-bottom:6px;text-transform:uppercase;}
.area-item input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:#fff;padding:4px 0;font-size:13px;outline:none;text-align:center;}
.btn-main{width:100%;padding:14px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Orbitron';cursor:pointer;letter-spacing:2px;font-size:11px;transition:0.3s;}
.btn-main:hover{background:rgba(0,255,255,0.1);}
.result-pane{display:none;margin-top:25px;border-top:1px solid var(--border);padding-top:20px;}
.clasificacion{font-family:'Orbitron';font-size:18px;padding:10px 20px;border-radius:4px;display:inline-block;margin-bottom:15px;}
.RENTABLE{background:rgba(0,255,156,0.1);border:1px solid var(--ok);color:var(--ok);}
.AJUSTADO{background:rgba(255,140,0,0.1);border:1px solid var(--warn);color:var(--warn);}
.EN-RIESGO{background:rgba(255,59,48,0.1);border:1px solid var(--alert);color:var(--alert);}
.data-row{margin-bottom:16px;}
.data-label{font-family:'Orbitron';font-size:9px;color:var(--accent);margin-bottom:8px;display:block;letter-spacing:2px;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.metric-box{background:rgba(6,18,29,0.5);border:1px solid var(--border);padding:14px;border-radius:4px;}
.metric-val{font-family:'Orbitron';font-size:18px;color:var(--accent);}
.metric-sub{font-size:10px;color:var(--dim);margin-top:4px;}
.precio-recomendado{background:rgba(0,255,255,0.05);border:1px solid var(--accent);padding:20px;border-radius:4px;text-align:center;margin:15px 0;}
.precio-val{font-family:'Orbitron';font-size:28px;color:var(--accent);}
.precio-lbl{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:6px;}
.footer{margin-top:40px;text-align:center;font-size:10px;color:var(--dim);letter-spacing:2px;}
</style>
</head>
<body>
<div class="header">
    <div class="header-sub">// MESAN Omega</div>
    <div class="header-title">Motor Financiero</div>
</div>
<div class="nav-links">
    <a href="crm.html">← CRM</a>
    <a href="admin.html">Consultor IA</a>
</div>

<div class="console-box" style="border-color:var(--accent)">
    <span class="console-label">Parametros del Servicio</span>

    <div class="field">
        <label>Numero de Elementos (personas)</label>
        <input type="number" id="elementos" placeholder="Ej: 5" min="1" value="1">
    </div>

    <div class="field">
        <label>Zona de Operacion</label>
        <select id="zona">
            <option value="interior">Interior de la Republica</option>
            <option value="frontera">Zona Frontera (BC, Sonora, Chih, Coah, NL, Tamps)</option>
        </select>
    </div>

    <span class="console-label" style="margin-top:10px;">Areas a Cubrir</span>
    <div class="areas-grid">
        <div class="area-item"><label>Oficinas</label><input type="number" id="a-oficinas" min="0" value="0" placeholder="0"></div>
        <div class="area-item"><label>Banos</label><input type="number" id="a-banos" min="0" value="0" placeholder="0"></div>
        <div class="area-item"><label>Almacen</label><input type="number" id="a-almacen" min="0" value="0" placeholder="0"></div>
        <div class="area-item"><label>Produccion</label><input type="number" id="a-produccion" min="0" value="0" placeholder="0"></div>
        <div class="area-item"><label>Comedor</label><input type="number" id="a-comedor" min="0" value="0" placeholder="0"></div>
        <div class="area-item"><label>Estacionamiento</label><input type="number" id="a-estacionamiento" min="0" value="0" placeholder="0"></div>
        <div class="area-item"><label>Laboratorio</label><input type="number" id="a-laboratorio" min="0" value="0" placeholder="0"></div>
        <div class="area-item"><label>General</label><input type="number" id="a-general" min="0" value="0" placeholder="0"></div>
    </div>

    <div class="field">
        <label>Precio que ofrece el cliente ($) — opcional</label>
        <input type="number" id="precio_cliente" placeholder="Ej: 27000 (para evaluar margen)">
    </div>

    <button class="btn-main" onclick="calcularLocal()">EJECUTAR DIAGNOSTICO</button>
</div>

<div class="result-pane" id="resultado"></div>

<div class="footer">MESAN Omega © 2026 — MOTOR FINANCIERO</div>

<script>
const API="https://mesan-api.onrender.com";

// CONFIGURACION SMG 2026
const CONFIG_ZONA = {
    frontera: { costo_elemento: 20367, iva: 0.08, label: "Zona Frontera" },
    interior: { costo_elemento: 12029, iva: 0.16, label: "Zona Interior" }
};
const FACTORES_AREA = {
    oficinas:1.0, banos:1.30, almacen:0.85, produccion:1.20,
    comedor:1.10, estacionamiento:0.70, laboratorio:1.50, general:1.0
};
const MARGEN = 0.35;

function calcularLocal(){
    const zona = document.getElementById("zona").value;
    const elementos = parseInt(document.getElementById("elementos").value)||1;
    const cfg = CONFIG_ZONA[zona];
    const precio_cliente = parseFloat(document.getElementById("precio_cliente").value)||0;

    const areas_activas = {};
    ["oficinas","banos","almacen","produccion","comedor","estacionamiento","laboratorio","general"].forEach(k=>{
        const v = parseInt(document.getElementById("a-"+k).value)||0;
        if(v>0) areas_activas[k]=v;
    });
    if(Object.keys(areas_activas).length===0) areas_activas["general"]=1;

    const total_areas = Object.values(areas_activas).reduce((s,v)=>s+v,0);
    const factor = Object.entries(areas_activas).reduce((s,[k,v])=>s+(FACTORES_AREA[k]||1)*v,0)/total_areas;

    const costo_total = Math.round(cfg.costo_elemento * elementos * factor);
    const precio_sin_iva = Math.round(costo_total / (1 - MARGEN));
    const precio_final = Math.round(precio_sin_iva * (1 + cfg.iva));
    const ganancia = precio_sin_iva - costo_total;
    const iva_monto = precio_final - precio_sin_iva;

    let clas="RENTABLE", dec="ACEPTAR", msg="Margen saludable — operacion viable";
    if(precio_cliente > 0){
        const p_sin_iva = precio_cliente / (1 + cfg.iva);
        const margen_cliente = (p_sin_iva - costo_total) / p_sin_iva * 100;
        if(margen_cliente < 10){ clas="EN RIESGO"; dec="RECHAZAR"; msg="Margen insuficiente — perdida probable"; }
        else if(margen_cliente < 35){ clas="AJUSTADO"; dec="REVISAR"; msg="Margen bajo — evaluar optimizacion"; }
    }

    renderResultado({
        clasificacion: clas,
        decision: {decision:dec, mensaje:msg},
        zona: cfg.label,
        iva: (cfg.iva*100)+"%",
        elementos,
        costo_operativo: costo_total,
        margen_cierre: Math.round(MARGEN*100),
        ganancia_estimada: ganancia,
        iva_monto,
        financiero: precio_cliente>0?{ingreso:precio_cliente, costo_total, utilidad:Math.round(precio_cliente/(1+cfg.iva)-costo_total)}:null,
        precios: {
            precio_minimo: Math.round(costo_total/(1-0.05)*(1+cfg.iva)),
            precio_cierre: precio_final,
            precio_objetivo: Math.round(costo_total/(1-0.50)*(1+cfg.iva))
        }
    });
}

async function ejecutar(){
    const elementos=parseInt(document.getElementById("elementos").value)||1;
    const zona=document.getElementById("zona").value;
    const precio_cliente=parseFloat(document.getElementById("precio_cliente").value)||0;
    const areas={
        oficinas:parseInt(document.getElementById("a-oficinas").value)||0,
        banos:parseInt(document.getElementById("a-banos").value)||0,
        almacen:parseInt(document.getElementById("a-almacen").value)||0,
        produccion:parseInt(document.getElementById("a-produccion").value)||0,
        comedor:parseInt(document.getElementById("a-comedor").value)||0,
        estacionamiento:parseInt(document.getElementById("a-estacionamiento").value)||0,
        laboratorio:parseInt(document.getElementById("a-laboratorio").value)||0,
        general:parseInt(document.getElementById("a-general").value)||0
    };

    // Filtrar areas en 0
    const areas_activas={};
    Object.keys(areas).forEach(k=>{if(areas[k]>0)areas_activas[k]=areas[k];});
    if(Object.keys(areas_activas).length===0)areas_activas["general"]=1;

    try{
        const res=await fetch(API+"/financiero/cotizar",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({elementos,zona,areas:areas_activas,precio_cliente})
        });
        const d=await res.json();
        renderResultado(d);
    }catch(e){
        // Fallback local si el endpoint no existe aún
        const tarifa=zona==="frontera"?19800:15500;
        const iva=zona==="frontera"?0.08:0.16;
        const total_areas=Object.values(areas_activas).reduce((a,b)=>a+b,0);
        const factores={"oficinas":1.0,"banos":1.30,"almacen":0.85,"produccion":1.20,"comedor":1.10,"estacionamiento":0.70,"laboratorio":1.50,"general":1.0};
        const factor=Object.entries(areas_activas).reduce((s,[k,v])=>s+((factores[k]||1)*v),0)/total_areas;
        const costo=elementos*tarifa*factor;
        const p_min=Math.round(costo*1.05*(1+iva));
        const p_cierre=Math.round(costo*1.15*(1+iva));
        const p_ideal=Math.round(costo*1.35*(1+iva));
        const margen=precio_cliente?Math.round(((precio_cliente/(1+iva)-costo)/( precio_cliente/(1+iva)))*100):Math.round(((p_cierre/(1+iva)-costo)/(p_cierre/(1+iva)))*100);
        let clas="RENTABLE",dec="ACEPTAR",msg="Margen saludable — operacion viable";
        if(precio_cliente){
            if(margen<10){clas="EN-RIESGO";dec="RECHAZAR";msg="Margen insuficiente — perdida probable";}
            else if(margen<30){clas="AJUSTADO";dec="REVISAR";msg="Margen bajo — evaluar optimizacion";}
        }
        renderResultado({
            clasificacion:clas,decision:{decision:dec,mensaje:msg},
            zona:zona==="frontera"?"Zona Frontera":"Zona Interior",
            iva:(iva*100)+"%",elementos,
            costo_operativo:Math.round(costo),
            margen_cierre:margen,
            financiero:precio_cliente?{ingreso:precio_cliente,costo_total:Math.round(costo),utilidad:Math.round(precio_cliente-costo),margen}:null,
            precios:{precio_minimo:p_min,precio_cierre:p_cierre,precio_objetivo:p_ideal}
        });
    }
}

function renderResultado(d){
    const pane=document.getElementById("resultado");
    pane.style.display="block";
    const clsKey=(d.clasificacion||"RENTABLE").replace(" ","-");
    let html=`<div class="clasificacion ${clsKey}">${d.clasificacion||"RENTABLE"}</div>`;
    html+=`<p style="font-size:13px;color:#5E7A94;margin-bottom:15px;">${d.decision?.mensaje||""}</p>`;
    html+=`<div class="precio-recomendado"><div class="precio-val">$${(d.precios?.precio_cierre||d.recomendado||0).toLocaleString()}</div><div class="precio-lbl">PRECIO RECOMENDADO / MES · IVA ${d.iva||"16%"} INCLUIDO</div></div>`;
    html+=`<div class="data-row"><span class="data-label">Rango de Precios</span><div class="metric-grid">`;
    html+=`<div class="metric-box"><div class="metric-val">$${(d.precios?.precio_minimo||0).toLocaleString()}</div><div class="metric-sub">Precio minimo</div></div>`;
    html+=`<div class="metric-box"><div class="metric-val">$${(d.precios?.precio_objetivo||d.precios?.precio_ideal||0).toLocaleString()}</div><div class="metric-sub">Precio ideal</div></div>`;
    html+=`</div></div>`;
    html+=`<div class="data-row"><span class="data-label">Desglose Operativo</span><div class="metric-grid">`;
    html+=`<div class="metric-box"><div class="metric-val">$${(d.costo_operativo||0).toLocaleString()}</div><div class="metric-sub">Costo operativo</div></div>`;
    html+=`<div class="metric-box"><div class="metric-val">${d.margen_cierre||0}%</div><div class="metric-sub">Margen de ganancia</div></div>`;
    html+=`</div></div>`;
    if(d.financiero&&d.financiero.ingreso){
        html+=`<div class="data-row"><span class="data-label">Evaluacion del Precio del Cliente</span><div class="metric-grid">`;
        html+=`<div class="metric-box"><div class="metric-val">$${(d.financiero.ingreso||0).toLocaleString()}</div><div class="metric-sub">Precio ofrecido</div></div>`;
        html+=`<div class="metric-box"><div class="metric-val">$${(d.financiero.utilidad||0).toLocaleString()}</div><div class="metric-sub">Utilidad estimada</div></div>`;
        html+=`</div></div>`;
    }
    pane.innerHTML=html;
    pane.scrollIntoView({behavior:"smooth"});
}
</script>
</body>
</html>
