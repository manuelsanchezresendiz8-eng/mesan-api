<script>
async function diagnostico(){
    const precio = parseFloat(document.getElementById("precio").value);
    const empleados = parseInt(document.getElementById("empleados").value);
    const zona = document.getElementById("zona").value;
    const box = document.getElementById("resultado");

    if(!precio || !empleados){
        alert("Completa todos los campos");
        return;
    }

    box.style.display = "block";
    box.innerHTML = "Analizando...";

    try{
        const res = await fetch("https://mesan-api.onrender.com/pro/diagnostico", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                precio_cliente: precio,
                empleados: empleados,
                zona: zona
            })
        });

        const r = await res.json();
        const f = r.financiero || {};
        const p = r.precios || {};
        const d = r.decision || {};
        const c = r.clasificacion || "BAJO";

        const color =
            c === "CRITICO" ? "#ff0000" :
            c === "ALTO" ? "#ff4d4d" :
            c === "MEDIO" ? "#ffaa00" : "#00ff88";

        box.innerHTML = `
            <h2 style="color:${color}">● ${c}</h2>
            <p>${r.mensaje || ""}</p>
            <p><b>Decisión:</b> ${d.decision || ""} — ${d.mensaje || ""}</p>
            <hr style="border-color:#333;margin:10px 0">
            <p>Ingreso: $${(f.ingreso||0).toLocaleString()}</p>
            <p>Costo total: $${(f.costo_total||0).toLocaleString()}</p>
            <p>Utilidad: $${(f.utilidad||0).toLocaleString()}</p>
            <p>Margen: ${f.margen||0}%</p>
            <p>Reserva: $${(f.reserva||0).toLocaleString()}</p>
            <hr style="border-color:#333;margin:10px 0">
            <p>Precio mínimo: $${(p.precio_minimo||0).toLocaleString()}</p>
            <p>Precio cierre: $${(p.precio_cierre||0).toLocaleString()}</p>
            <p>Precio ideal: $${(p.precio_objetivo||0).toLocaleString()}</p>
        `;

    }catch(e){
        box.innerHTML = "<span style='color:#ef4444'>Error de conexión</span>";
    }
}
</script>
