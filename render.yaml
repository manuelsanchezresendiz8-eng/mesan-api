services:
  - type: web
    name: mesan-omega
    env: docker
    plan: free
    region: oregon
    branch: main

    healthCheckPath: /health

    envVars:
      - key: ENV
        value: production

      - key: LOG_LEVEL
        value: info

      - key: ENABLE_OBSERVABILITY
        value: "true"

      - key: MESAN_SECRET_KEY
        sync: false

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: TENANT_ISOLATION_MODE
        value: strict
