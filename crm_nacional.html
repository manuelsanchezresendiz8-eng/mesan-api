<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Control Nacional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    overflow:hidden;
}

#mapa {
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://upload.wikimedia.org/wikipedia/commons/5/5c/Mexico_states_map.svg') no-repeat center;
    background-size:80%;
    opacity:0.2;
}

.grid {
    position:fixed;
    width:100%;
    height:100%;
    background-image: radial-gradient(#0f1c2e 1px, transparent 1px);
    background-size:20px 20px;
    opacity:0.3;
}

.topbar {
    position:absolute;
    width:100%;
    padding:15px;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.5);
    border-bottom:1px solid #1f2a40;
    box-sizing:border-box;
}

.kpis {
    display:flex;
    gap:20px;
    align-items:center;
}

.node {
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    cursor:pointer;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0% { transform:scale(1); opacity:1; }
    50% { transform:scale(1.5); opacity:0.6; }
    100% { transform:scale(1); opacity:1; }
}

.alto { background:#ff3b3b; box-shadow:0 0 15px #ff3b3b; }
.medio { background:#ff914d; box-shadow:0 0 15px #ff914d; }
.bajo { background:#00ffd5; box-shadow:0 0 15px #00ffd5; }

.radar {
    position:absolute;
    bottom:20px;
    left:20px;
    width:220px;
    height:220px;
    background:rgba(0,0,0,0.7);
    border-radius:10px;
    padding:10px;
    border:1px solid #1f2a40;
}

.modal {
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.85);
    z-index:100;
}

.modal-box {
    background:#0d1930;
    padding:20px;
    border-radius:10px;
    width:300px;
    border:1px solid #1f2a40;
}

.modal-box h3 { color:#00c3ff; margin-bottom:15px; }
.modal-box p { margin:8px 0; font-size:13px; }

.btn {
    border:none;
    padding:10px;
    margin-top:8px;
    width:100%;
    color:white;
    cursor:pointer;
    border-radius:4px;
    font-size:13px;
}

.btn-blue { background:#007bff; }
.btn-green { background:#25D366; }
.btn-gray { background:#333; }

.login-box {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#0d1930;
    padding:30px;
    border-radius:10px;
    border:1px solid #1f2a40;
    z-index:200;
    text-align:center;
    width:280px;
}

.login-box h3 { color:#00c3ff; margin-bottom:20px; }

.login-box input {
    width:100%;
    padding:10px;
    background:#111;
    border:1px solid #333;
    color:white;
    margin-bottom:10px;
    box-sizing:border-box;
    border-radius:4px;
}

#debug {
    position:fixed;
    bottom:10px;
    right:10px;
    background:rgba(0,0,0,0.8);
    color:#00c3ff;
    font-size:11px;
    padding:10px;
    border-radius:6px;
    max-width:300px;
    word-break:break-all;
    z-index:999;
}
</style>
</head>

<body>

<div id="mapa"></div>
<div class="grid"></div>
<div id="debug">Cargando...</div>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
    <h3>🌎 MESAN Ω</h3>
    <input id="apiKeyInput" type="password" placeholder="Ingresa API Key">
    <button class="btn btn-blue" onclick="iniciarSesion()">ACCEDER</button>
</div>

<!-- TOPBAR -->
<div class="topbar" id="topbar" style="display:none;">
    <div style="font-size:13px;">🌎 MESAN Ω — Centro Nacional</div>
    <div class="kpis">
        <div style="font-size:12px;">Empresas <b id="total" style="color:#00c3ff;">0</b></div>
        <div style="font-size:12px;">Críticos <b id="riesgo" style="color:#ff3b3b;">0</b></div>
        <div style="font-size:12px;">Impacto <b id="impacto" style="color:#ff914d;">$0</b></div>
    </div>
    <button class="btn btn-gray" onclick="logout()" style="width:auto;padding:5px 15px;">Salir</button>
</div>

<!-- RADAR -->
<div class="radar" id="radar" style="display:none;">
    <canvas id="chart"></canvas>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="m-nombre">—</h3>
        <p>Score: <b id="m-score">—</b></p>
        <p>Nivel: <b id="m-nivel">—</b></p>
        <p>Impacto: <b id="m-impacto">—</b></p>
        <p>Email: <span id="m-email">—</span></p>
        <p>Tel: <span id="m-tel">—</span></p>
        <a id="m-wa" href="#" target="_blank">
            <button class="btn btn-green">WhatsApp</button>
        </a>
        <button class="btn btn-gray" onclick="cerrar()">Cerrar</button>
    </div>
</div>

<script>
const API = "https://mesan-api.onrender.com";
let API_KEY = localStorage.getItem("mesan_key");

const coords = {
    CDMX: [54, 58], MTY: [68, 28], GDL: [38, 53],
    TIJ:  [8,  18], PUE: [58, 63], QRO: [53, 52],
    MXL:  [10, 20], HMO: [18, 23], CUL: [23, 38],
    MZT:  [26, 46], AGS: [46, 48], SLP: [53, 43],
    VER:  [63, 58], MER: [78, 63], CUN: [85, 60],
    OAX:  [60, 70], CHI: [35, 25], DGO: [38, 35]
};

function debug(msg) {
    document.getElementById("debug").innerText = msg;
}

if (API_KEY) {
    document.getElementById("loginBox").style.display = "none";
    cargar();
}

function iniciarSesion() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if (!key) { alert("Ingresa la API Key"); return; }
    localStorage.setItem("mesan_key", key);
    API_KEY = key;
    document.getElementById("loginBox").style.display = "none";
    cargar();
}

function logout() {
    localStorage.removeItem("mesan_key");
    location.reload();
}

async function cargar() {
    try {
        debug("Conectando a API...");

        const res = await fetch(API + "/leads", {
            headers: { "api-key": API_KEY }
        });

        debug("Status: " + res.status);

        if (res.status === 403) {
            alert("API Key inválida");
            logout();
            return;
        }

        const json = await res.json();
        debug("Respuesta: " + JSON.stringify(json).substring(0, 100));

        const leads = Array.isArray(json)
            ? json
            : (json.leads || json.data || []);

        debug("Leads: " + leads.length);

        document.getElementById("topbar").style.display = "flex";
        document.getElementById("radar").style.display = "block";
        document.getElementById("total").innerText = leads.length;

        const criticosLista = ["ALTO","CRISIS FINANCIERA","RIESGO OPERATIVO","RIESGO LEGAL"];
        const criticos = leads.filter(l => criticosLista.includes(l.clasificacion));
        document.getElementById("riesgo").innerText = criticos.length;

        let impacto = 0;
        leads.forEach(l => { impacto += (l.impacto_max || 0); });
        document.getElementById("impacto").innerText = "$" + impacto.toLocaleString();

        leads.forEach(l => {
            const nivel = criticosLista.includes(l.clasificacion) ? "alto"
                        : l.clasificacion === "MEDIO" ? "medio"
                        : "bajo";

            const nodo = document.createElement("div");
            nodo.className = "node " + nivel;

            const pos = coords[
                (l.giro || "").toUpperCase().substring(0, 3)
            ] || [10 + Math.random() * 75, 15 + Math.random() * 65];

            nodo.style.left = pos[0] + "%";
            nodo.style.top  = pos[1] + "%";
            nodo.onclick = () => abrirModal(l);
            document.body.appendChild(nodo);
        });

        radar(leads, criticos.length);

    } catch(e) {
        debug("ERROR: " + e.message);
        document.getElementById("topbar").style.display = "flex";
    }
}

function radar(leads, altos) {
    const medios = leads.filter(l => l.clasificacion === "MEDIO").length;
    const bajos  = leads.length - altos - medios;

    new Chart(document.getElementById("chart"), {
        type: "radar",
        data: {
            labels: ["Crítico", "Medio", "Estable"],
            datasets: [{
                data: [altos, medios, bajos],
                borderColor: "#00c3ff",
                backgroundColor: "rgba(0,195,255,0.1)",
                pointBackgroundColor: "#00c3ff"
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                r: {
                    ticks: { color: "#666", font: { size: 9 } },
                    grid: { color: "#1f2a40" },
                    pointLabels: { color: "#aaa", font: { size: 10 } }
                }
            }
        }
    });
}

function abrirModal(l) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("m-nombre").innerText  = l.nombre || "Sin nombre";
    document.getElementById("m-score").innerText   = l.score || 0;
    document.getElementById("m-nivel").innerText   = l.clasificacion || "N/A";
    document.getElementById("m-impacto").innerText = "$" + (l.impacto_max || 0).toLocaleString() + " MXN";
    document.getElementById("m-email").innerText   = l.email || "-";
    document.getElementById("m-tel").innerText     = l.telefono || "-";

    const tel = (l.telefono || "").replace(/\D/g, "");
    const msg = encodeURIComponent(
        "Hola " + (l.nombre || "") + ", revisé tu diagnóstico MESAN Omega.\n" +
        "Score: " + (l.score || 0) + " — " + (l.clasificacion || "") + "\n" +
        "¿Tienes 15 minutos para hablar?"
    );
    document.getElementById("m-wa").href = tel
        ? `https://wa.me/52${tel}?text=${msg}`
        : "#";
}

function cerrar() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
