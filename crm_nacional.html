<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Control Nacional</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --neon-cyan: #00f2ff;
    --dark-void: #050a12;
    --card-bg: rgba(6, 15, 28, 0.95);
    --border-glow: rgba(0, 242, 255, 0.3);
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--dark-void);
    color: white;
    overflow: hidden;
}

#background-layer {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/5/5c/Mexico_states_map.svg') no-repeat center;
    background-size: 70%;
    opacity: 0.1;
    filter: invert(1) hue-rotate(180deg);
    z-index: -1;
}

.grid-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(var(--neon-cyan) 0.5px, transparent 0.5px);
    background-size: 25px 25px;
    opacity: 0.1;
    z-index: -1;
}

/* LOGIN */
.login-box {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card-bg);
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--neon-cyan);
    box-shadow: 0 0 25px var(--border-glow);
    text-align: center;
    width: 320px;
    backdrop-filter: blur(10px);
    z-index: 200;
}

.login-box h3 {
    color: var(--neon-cyan);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 25px;
    text-shadow: 0 0 10px var(--border-glow);
}

.login-box input {
    width: 100%;
    padding: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #1f2a40;
    color: var(--neon-cyan);
    margin-bottom: 20px;
    box-sizing: border-box;
    border-radius: 8px;
    text-align: center;
    outline: none;
    transition: 0.3s;
}

.login-box input:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 10px var(--border-glow);
}

.btn-omega {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    padding: 14px;
    width: 100%;
    color: var(--neon-cyan);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.4s;
}

.btn-omega:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 20px var(--neon-cyan);
}

/* TOPBAR */
.topbar {
    position: absolute;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(5,10,18,0.9);
    border-bottom: 1px solid var(--neon-cyan);
    box-sizing: border-box;
}

.topbar-title {
    color: var(--neon-cyan);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.kpis {
    display: flex;
    gap: 30px;
}

.kpi {
    text-align: center;
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.kpi b {
    display: block;
    font-size: 20px;
    color: var(--neon-cyan);
}

.kpi b.red { color: #ff3b3b; }
.kpi b.orange { color: #ff914d; }

.btn-salir {
    background: transparent;
    border: 1px solid #333;
    color: #888;
    padding: 6px 15px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 1px;
    transition: 0.3s;
}

.btn-salir:hover {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
}

/* NODOS */
.node {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    cursor: pointer;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.8); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
}

.alto  { background: #ff3b3b; box-shadow: 0 0 12px #ff3b3b; }
.medio { background: #ff914d; box-shadow: 0 0 12px #ff914d; }
.bajo  { background: #00ffd5; box-shadow: 0 0 12px #00ffd5; }

/* RADAR */
.radar {
    position: absolute;
    bottom: 40px;
    left: 30px;
    width: 200px;
    height: 200px;
    background: var(--card-bg);
    border-radius: 10px;
    padding: 10px;
    border: 1px solid var(--border-glow);
}

/* MODAL */
.modal {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    z-index: 100;
}

.modal-box {
    background: var(--card-bg);
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    border: 1px solid var(--neon-cyan);
    box-shadow: 0 0 25px var(--border-glow);
}

.modal-box h3 {
    color: var(--neon-cyan);
    letter-spacing: 2px;
    margin-bottom: 15px;
    text-transform: uppercase;
}

.modal-box p {
    margin: 8px 0;
    font-size: 13px;
    color: #aaa;
}

.modal-box p b { color: white; }

.btn-modal {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    padding: 10px;
    margin-top: 8px;
    width: 100%;
    color: var(--neon-cyan);
    cursor: pointer;
    border-radius: 6px;
    font-size: 12px;
    letter-spacing: 1px;
    transition: 0.3s;
}

.btn-modal:hover {
    background: var(--neon-cyan);
    color: #000;
}

.btn-wa {
    border-color: #25D366;
    color: #25D366;
}

.btn-wa:hover {
    background: #25D366;
    color: #000;
}

.btn-cerrar {
    border-color: #333;
    color: #666;
}

/* STATUS */
#status-tag {
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 10px;
    color: var(--neon-cyan);
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.6;
}

#debug {
    position: fixed;
    bottom: 35px;
    right: 15px;
    font-size: 10px;
    color: #666;
    letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="background-layer"></div>
<div class="grid-overlay"></div>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
    <h3>MESAN Ω</h3>
    <input id="apiKeyInput" type="password" placeholder="INGRESA API KEY">
    <button class="btn-omega" onclick="iniciarSesion()">ACCEDER AL SISTEMA</button>
</div>

<!-- TOPBAR -->
<div class="topbar" id="topbar" style="display:none;">
    <div class="topbar-title">🌎 MESAN Ω — Centro Nacional</div>
    <div class="kpis">
        <div class="kpi">Empresas<b id="total">0</b></div>
        <div class="kpi">Críticos<b id="riesgo" class="red">0</b></div>
        <div class="kpi">Impacto<b id="impacto" class="orange">$0</b></div>
    </div>
    <button class="btn-salir" onclick="logout()">SALIR</button>
</div>

<!-- RADAR -->
<div class="radar" id="radar" style="display:none;">
    <canvas id="chart"></canvas>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="m-nombre">—</h3>
        <p>Score: <b id="m-score">—</b></p>
        <p>Nivel: <b id="m-nivel">—</b></p>
        <p>Impacto: <b id="m-impacto">—</b></p>
        <p>Email: <b id="m-email">—</b></p>
        <p>Tel: <b id="m-tel">—</b></p>
        <a id="m-wa" href="#" target="_blank" style="text-decoration:none;">
            <button class="btn-modal btn-wa">WHATSAPP</button>
        </a>
        <button class="btn-modal btn-cerrar" onclick="cerrar()">CERRAR</button>
    </div>
</div>

<div id="status-tag">SISTEMA EN LÍNEA // SOBERANÍA EMPRESARIAL</div>
<div id="debug"></div>

<script>
const API = "https://mesan-api.onrender.com";
let API_KEY = localStorage.getItem("mesan_key");

const coords = {
    CDMX: [54,58], MTY: [68,28], GDL: [38,53],
    TIJ:  [8,18],  PUE: [58,63], QRO: [53,52],
    MXL:  [10,20], HMO: [18,23], CUL: [23,38],
    MZT:  [26,46], AGS: [46,48], SLP: [53,43],
    VER:  [63,58], MER: [78,63], CUN: [85,60],
    OAX:  [60,70], CHI: [35,25], DGO: [38,35]
};

if (API_KEY) {
    document.getElementById("loginBox").style.display = "none";
    cargar();
}

function iniciarSesion() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if (!key) { alert("Ingresa la API Key"); return; }
    localStorage.setItem("mesan_key", key);
    API_KEY = key;
    document.getElementById("loginBox").style.display = "none";
    cargar();
}

function logout() {
    localStorage.removeItem("mesan_key");
    location.reload();
}

async function cargar() {
    try {
        document.getElementById("debug").innerText = "Conectando...";

        const res = await fetch(API + "/leads", {
            headers: { "api-key": API_KEY }
        });

        if (res.status === 403) {
            alert("API Key inválida");
            logout();
            return;
        }

        const json = await res.json();
        const leads = Array.isArray(json) ? json : (json.leads || json.data || []);

        document.getElementById("debug").innerText = leads.length + " leads cargados";
        document.getElementById("topbar").style.display = "flex";
        document.getElementById("radar").style.display = "block";
        document.getElementById("total").innerText = leads.length;

        const criticosLista = ["ALTO","CRISIS FINANCIERA","RIESGO OPERATIVO","RIESGO LEGAL"];
        const criticos = leads.filter(l => criticosLista.includes(l.clasificacion));
        document.getElementById("riesgo").innerText = criticos.length;

        let impacto = 0;
        leads.forEach(l => { impacto += (l.impacto_max || 0); });
        document.getElementById("impacto").innerText = "$" + impacto.toLocaleString();

        leads.forEach(l => {
            const nivel = criticosLista.includes(l.clasificacion) ? "alto"
                        : l.clasificacion === "MEDIO" ? "medio"
                        : "bajo";

            const nodo = document.createElement("div");
            nodo.className = "node " + nivel;

            const pos = coords[
                (l.giro || "").toUpperCase().substring(0,3)
            ] || [10 + Math.random()*75, 25 + Math.random()*55];

            nodo.style.left = pos[0] + "%";
            nodo.style.top  = pos[1] + "%";
            nodo.onclick = () => abrirModal(l);
            document.body.appendChild(nodo);
        });

        radar(leads, criticos.length);

    } catch(e) {
        document.getElementById("debug").innerText = "Error: " + e.message;
        document.getElementById("topbar").style.display = "flex";
    }
}

function radar(leads, altos) {
    const medios = leads.filter(l => l.clasificacion === "MEDIO").length;
    const bajos  = leads.length - altos - medios;

    new Chart(document.getElementById("chart"), {
        type: "radar",
        data: {
            labels: ["Crítico", "Medio", "Estable"],
            datasets: [{
                data: [altos, medios, bajos],
                borderColor: "#00f2ff",
                backgroundColor: "rgba(0,242,255,0.08)",
                pointBackgroundColor: "#00f2ff"
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                r: {
                    ticks: { color: "#444", font: { size: 8 } },
                    grid: { color: "#0f1c2e" },
                    pointLabels: { color: "#888", font: { size: 9 } }
                }
            }
        }
    });
}

function abrirModal(l) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("m-nombre").innerText  = (l.nombre || "Sin nombre").toUpperCase();
    document.getElementById("m-score").innerText   = l.score || 0;
    document.getElementById("m-nivel").innerText   = l.clasificacion || "N/A";
    document.getElementById("m-impacto").innerText = "$" + (l.impacto_max || 0).toLocaleString() + " MXN";
    document.getElementById("m-email").innerText   = l.email || "-";
    document.getElementById("m-tel").innerText     = l.telefono || "-";

    const tel = (l.telefono || "").replace(/\D/g, "");
    const msg = encodeURIComponent(
        "Hola " + (l.nombre || "") + ", revisé tu diagnóstico MESAN Omega.\n" +
        "Score: " + (l.score || 0) + " — " + (l.clasificacion || "") + "\n" +
        "¿Tienes 15 minutos para hablar?"
    );
    document.getElementById("m-wa").href = tel
        ? `https://wa.me/52${tel}?text=${msg}`
        : "#";
}

function cerrar() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
