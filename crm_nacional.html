<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Control Nacional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* PALETA UNIFICADA IMAGEN 3 */
:root {
    --primary-cyan: #00f2ff;
    --dark-deep: #050a12;
    --card-bg: rgba(6, 15, 28, 0.9);
    --border-glow: rgba(0, 242, 255, 0.4);
    --text-gray: #a0aec0;
}

body {
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--dark-deep);
    color:white;
    overflow:hidden;
}

#mapa {
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://upload.wikimedia.org/wikipedia/commons/5/5c/Mexico_states_map.svg') no-repeat center;
    background-size:80%;
    opacity:0.1;
    filter: invert(1) brightness(0.8) sepia(1) hue-rotate(150deg) saturate(3);
}

.grid {
    position:fixed;
    width:100%;
    height:100%;
    background-image: radial-gradient(var(--primary-cyan) 0.5px, transparent 0.5px);
    background-size:25px 25px;
    opacity:0.05;
}

.topbar {
    position:absolute;
    width:100%;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    background: rgba(5, 10, 18, 0.9);
    border-bottom: 1px solid var(--primary-cyan);
    box-sizing:border-box;
    z-index: 50;
}

/* NODOS CON EL COLOR DE LA IMAGEN 3 */
.node {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    cursor:pointer;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0% { transform:scale(1); opacity:1; }
    50% { transform:scale(1.6); opacity:0.5; }
    100% { transform:scale(1); opacity:1; }
}

.alto { background:#ff3b3b; box-shadow:0 0 15px #ff3b3b; }
.medio { background:#ff914d; box-shadow:0 0 15px #ff914d; }
.bajo { background: var(--primary-cyan); box-shadow:0 0 15px var(--primary-cyan); }

.radar {
    position:absolute;
    bottom:20px;
    left:20px;
    width:220px;
    height:220px;
    background: var(--card-bg);
    border-radius:12px;
    padding:10px;
    border:1px solid var(--primary-cyan);
}

/* MODAL Y LOGIN UNIFICADOS */
.modal-box, .login-box {
    background: var(--card-bg);
    padding:30px;
    border-radius:12px;
    border: 1px solid var(--primary-cyan);
    box-shadow: 0 0 20px var(--border-glow);
    text-align: center;
}

.login-box {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:200;
    width:280px;
}

.login-box h3, .modal-box h3 { 
    color: var(--primary-cyan); 
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

.login-box input {
    width:100%;
    padding:12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #1f2a40;
    color: var(--primary-cyan);
    margin-bottom:15px;
    box-sizing:border-box;
    border-radius:6px;
    text-align: center;
}

/* BOTÓN ESTILO "INICIAR DIAGNÓSTICO" */
.btn {
    border: 1px solid var(--primary-cyan);
    padding: 12px;
    background: transparent;
    color: var(--primary-cyan);
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
    width: 100%;
    transition: 0.3s;
    text-transform: uppercase;
}

.btn:hover {
    background: var(--primary-cyan);
    color: black;
    box-shadow: 0 0 15px var(--primary-cyan);
}

.btn-green { background:#25D366; color:white; border:none; }

#debug {
    position:fixed;
    bottom:10px;
    right:10px;
    background:rgba(0,0,0,0.8);
    color: var(--primary-cyan);
    font-size:10px;
    padding:5px 10px;
    border-radius:4px;
}
</style>
</head>

<body>

<div id="mapa"></div>
<div class="grid"></div>
<div id="debug">SISTEMA Ω LISTO</div>

<div id="loginBox" class="login-box">
    <h3>🌎 MESAN Ω</h3>
    <input id="apiKeyInput" type="password" placeholder="API KEY">
    <button class="btn" onclick="iniciarSesion()">ACCEDER</button>
</div>

</body>
</html>
