<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Centro Nacional</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --accent: #38BDF8;
    --bg: #000000;
    --bg-deep: #0A192F;
    --card: rgba(10,25,47,0.9);
    --border: rgba(56,189,248,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(circle at center, var(--bg-deep) 0%, var(--bg) 100%);
    color: var(--accent);
    font-family: 'Lexend', sans-serif;
    overflow: hidden;
    height: 100vh;
}

#mapa {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/5/5c/Mexico_states_map.svg') no-repeat center;
    background-size: 70%;
    opacity: 0.06;
    filter: invert(1) hue-rotate(180deg);
    z-index: 0;
}

.grid {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(rgba(56,189,248,0.3) 0.5px, transparent 0.5px);
    background-size: 25px 25px;
    opacity: 0.15;
    z-index: 0;
}

.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.85);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    box-sizing: border-box;
    z-index: 100;
    font-size: 11px;
    letter-spacing: 3px;
}

.kpis { display: flex; gap: 30px; }

.kpi { text-align: center; }

.kpi-val {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    display: block;
}

.kpi-lbl {
    font-size: 8px;
    letter-spacing: 2px;
    opacity: 0.5;
    text-transform: uppercase;
}

.btn-salir {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Lexend', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 3px;
    transition: 0.3s;
}

.btn-salir:hover {
    background: rgba(56,189,248,0.1);
    box-shadow: 0 0 10px rgba(56,189,248,0.2);
}

.node {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    cursor: pointer;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
    z-index: 10;
}

.node.critico {
    background: var(--accent);
    box-shadow: 0 0 20px var(--accent);
}

.node.medio {
    background: rgba(56,189,248,0.6);
    box-shadow: 0 0 12px rgba(56,189,248,0.6);
}

.node.estable {
    background: rgba(56,189,248,0.3);
    box-shadow: 0 0 8px rgba(56,189,248,0.3);
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.8); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
}

.radar {
    position: fixed;
    bottom: 30px;
    left: 30px;
    width: 200px;
    height: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    z-index: 50;
}

.modal {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    z-index: 200;
}

.modal-box {
    background: var(--card);
    border: 1px solid var(--accent);
    box-shadow: 0 0 30px rgba(56,189,248,0.2);
    border-radius: 8px;
    padding: 30px;
    width: 300px;
}

.modal-box h3 {
    color: var(--accent);
    letter-spacing: 3px;
    font-size: 13px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

.modal-box p {
    font-size: 11px;
    color: var(--accent);
    opacity: 0.8;
    margin: 8px 0;
    line-height: 1.6;
}

.modal-box p span { opacity: 1; font-weight: 600; }

.btn-modal {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Lexend', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    transition: 0.3s;
    text-decoration: none;
    display: block;
    text-align: center;
}

.btn-modal:hover {
    border-color: var(--accent);
    background: rgba(56,189,248,0.1);
}

.btn-modal.wa {
    border-color: var(--accent);
    background: rgba(56,189,248,0.08);
    font-weight: 600;
}

.status-tag {
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 9px;
    color: var(--accent);
    opacity: 0.4;
    letter-spacing: 3px;
    z-index: 50;
}

.login-box {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card);
    padding: 40px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    box-shadow: 0 0 30px rgba(56,189,248,0.15);
    text-align: center;
    width: 300px;
    z-index: 300;
}

.login-box h3 {
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 25px;
    font-size: 13px;
}

.login-box input {
    width: 100%;
    padding: 13px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Lexend', sans-serif;
    font-size: 13px;
    border-radius: 4px;
    margin-bottom: 15px;
    outline: none;
    text-align: center;
    box-sizing: border-box;
    transition: 0.3s;
}

.login-box input:focus { border-color: var(--accent); }

.btn-login {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Lexend', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: 0.3s;
}

.btn-login:hover {
    background: rgba(56,189,248,0.1);
    box-shadow: 0 0 15px rgba(56,189,248,0.3);
}
</style>
</head>
<body>

<div id="mapa"></div>
<div class="grid"></div>

<div id="loginBox" class="login-box">
    <h3>MESAN Ω</h3>
    <input id="apiKeyInput" type="password" placeholder="API KEY">
    <button class="btn-login" onclick="iniciarSesion()">ACCEDER AL SISTEMA</button>
</div>

<div class="topbar" id="topbar" style="display:none;">
    <div style="letter-spacing:3px;">MESAN Ω — CENTRO NACIONAL</div>
    <div class="kpis">
        <div class="kpi"><span class="kpi-val" id="total">0</span><div class="kpi-lbl">Empresas</div></div>
        <div class="kpi"><span class="kpi-val" id="criticos">0</span><div class="kpi-lbl">Críticos</div></div>
        <div class="kpi"><span class="kpi-val" id="impacto">$0</span><div class="kpi-lbl">Impacto</div></div>
    </div>
    <button class="btn-salir" onclick="logout()">SALIR</button>
</div>

<div class="radar" id="radar" style="display:none;">
    <canvas id="chart"></canvas>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="m-nombre">—</h3>
        <p>Score: <span id="m-score">—</span></p>
        <p>Nivel: <span id="m-nivel">—</span></p>
        <p>Impacto: <span id="m-impacto">—</span></p>
        <p>Email: <span id="m-email">—</span></p>
        <p>Tel: <span id="m-tel">—</span></p>
        <a id="m-wa" href="#" target="_blank" class="btn-modal wa">WHATSAPP</a>
        <button class="btn-modal" onclick="cerrar()">CERRAR</button>
    </div>
</div>

<div class="status-tag">SISTEMA EN LÍNEA // SOBERANÍA EMPRESARIAL</div>

<script>
const API = "https://mesan-api.onrender.com";
let API_KEY = localStorage.getItem("mesan_key");

const coords = {
    CDMX:[54,58], MTY:[68,28], GDL:[38,53],
    TIJ:[8,18],   PUE:[58,63], QRO:[53,52],
    MXL:[10,20],  HMO:[18,23], CUL:[23,38],
    MZT:[26,46],  AGS:[46,48], SLP:[53,43],
    VER:[63,58],  MER:[78,63], CUN:[85,60],
    OAX:[60,70],  CHI:[35,25], DGO:[38,35]
};

if (API_KEY) {
    document.getElementById("loginBox").style.display = "none";
    cargar();
}

function iniciarSesion() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if (!key) { alert("Ingresa la API Key"); return; }
    localStorage.setItem("mesan_key", key);
    API_KEY = key;
    document.getElementById("loginBox").style.display = "none";
    cargar();
}

function logout() {
    localStorage.removeItem("mesan_key");
    location.reload();
}

async function cargar() {
    try {
        const res = await fetch(API + "/leads", {
            headers: { "api-key": API_KEY }
        });
        if (res.status === 403) { alert("API Key inválida"); logout(); return; }

        const json = await res.json();
        const leads = Array.isArray(json) ? json : (json.leads || []);

        document.getElementById("topbar").style.display = "flex";
        document.getElementById("radar").style.display = "block";
        document.getElementById("total").innerText = leads.length;

        const criticosList = ["ALTO","CRISIS FINANCIERA","RIESGO OPERATIVO","RIESGO LEGAL"];
        const criticos = leads.filter(l => criticosList.includes(l.clasificacion));
        document.getElementById("criticos").innerText = criticos.length;

        let impacto = 0;
        leads.forEach(l => { impacto += (l.impacto_max || 0); });
        document.getElementById("impacto").innerText = "$" + impacto.toLocaleString();

        leads.forEach(l => {
            const nivel = criticosList.includes(l.clasificacion) ? "critico"
                        : l.clasificacion === "MEDIO" ? "medio"
                        : "estable";

            const nodo = document.createElement("div");
            nodo.className = "node " + nivel;

            const pos = coords[(l.giro||"").toUpperCase().substring(0,3)]
                     || [10 + Math.random()*75, 25 + Math.random()*55];

            nodo.style.left = pos[0] + "%";
            nodo.style.top  = pos[1] + "%";
            nodo.onclick = () => abrirModal(l);
            document.body.appendChild(nodo);
        });

        radar(leads, criticos.length);

    } catch(e) {
        console.error(e);
    }
}

function radar(leads, altos) {
    const medios = leads.filter(l => l.clasificacion === "MEDIO").length;
    const bajos  = leads.length - altos - medios;

    new Chart(document.getElementById("chart"), {
        type: "radar",
        data: {
            labels: ["CRÍTICO","MEDIO","ESTABLE"],
            datasets: [{
                data: [altos, medios, bajos],
                borderColor: "#38BDF8",
                backgroundColor: "rgba(56,189,248,0.06)",
                pointBackgroundColor: "#38BDF8"
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                r: {
                    ticks: { color: "rgba(56,189,248,0.4)", font: { size: 8 } },
                    grid: { color: "rgba(56,189,248,0.1)" },
                    pointLabels: { color: "rgba(56,189,248,0.7)", font: { size: 9 } }
                }
            }
        }
    });
}

function abrirModal(l) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("m-nombre").innerText  = (l.nombre||"Sin nombre").toUpperCase();
    document.getElementById("m-score").innerText   = l.score || 0;
    document.getElementById("m-nivel").innerText   = l.clasificacion || "N/A";
    document.getElementById("m-impacto").innerText = "$" + (l.impacto_max||0).toLocaleString() + " MXN";
    document.getElementById("m-email").innerText   = l.email || "-";
    document.getElementById("m-tel").innerText     = l.telefono || "-";

    const tel = (l.telefono||"").replace(/\D/g,"");
    const msg = encodeURIComponent(
        "Hola " + (l.nombre||"") + ", revisé tu diagnóstico MESAN Omega.\n" +
        "Score: " + (l.score||0) + " — " + (l.clasificacion||"") + "\n" +
        "¿Tienes 15 minutos?"
    );
    document.getElementById("m-wa").href = tel ? `https://wa.me/52${tel}?text=${msg}` : "#";
}

function cerrar() {
    document.getElementById("modal").style.display = "none";
}
</script>
</body>
</html>
