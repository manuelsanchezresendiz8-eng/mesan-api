<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Control Nacional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    overflow:hidden;
}

/* MAPA */
#mapa {
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://upload.wikimedia.org/wikipedia/commons/5/5c/Mexico_states_map.svg') no-repeat center;
    background-size:80%;
    opacity:0.2;
}

/* GRID */
.grid {
    position:fixed;
    width:100%;
    height:100%;
    background-image: radial-gradient(#0f1c2e 1px, transparent 1px);
    background-size:20px 20px;
    opacity:0.3;
}

/* TOP BAR */
.topbar {
    position:absolute;
    width:100%;
    padding:15px;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.5);
    border-bottom:1px solid #1f2a40;
}

/* KPIs */
.kpis {
    display:flex;
    gap:20px;
}

.kpi span {
    font-size:20px;
    font-weight:bold;
}

/* NODOS */
.node {
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    cursor:pointer;
    box-shadow:0 0 15px currentColor;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0% { transform:scale(1); opacity:1; }
    50% { transform:scale(1.5); opacity:0.6; }
    100% { transform:scale(1); opacity:1; }
}

.alto { background:#ff3b3b; }
.medio { background:#ff914d; }
.bajo { background:#00ffd5; }

/* RADAR */
.radar {
    position:absolute;
    bottom:20px;
    left:20px;
    width:250px;
    height:250px;
    background:rgba(0,0,0,0.6);
    border-radius:10px;
    padding:10px;
}

/* MODAL */
.modal {
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.85);
}

.modal-box {
    background:#0d1930;
    padding:20px;
    border-radius:10px;
    width:320px;
}

button {
    background:#007bff;
    border:none;
    padding:10px;
    margin-top:10px;
    width:100%;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="mapa"></div>
<div class="grid"></div>

<div class="topbar">
    <div>🌎 MESAN Ω — Centro Nacional</div>
    <div class="kpis">
        <div>Empresas <span id="total">0</span></div>
        <div>Riesgo <span id="riesgo">0</span></div>
        <div>Impacto <span id="impacto">$0</span></div>
    </div>
</div>

<!-- RADAR -->
<div class="radar">
    <canvas id="chart"></canvas>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="nombre"></h3>
        <p>Score: <span id="score"></span></p>
        <p>Nivel: <span id="nivel"></span></p>
        <p>Impacto: <span id="impacto_m"></span></p>

        <button onclick="irPago()">Desbloquear completo</button>
        <button onclick="cerrar()">Cerrar</button>
    </div>
</div>

<script>

const API = "https://mesan-api.onrender.com";

/* COORDENADAS MÉXICO */
const coords = {
    CDMX:[55,60],
    MTY:[70,30],
    GDL:[40,55],
    TIJ:[10,20],
    PUE:[60,65],
    QRO:[55,55]
};

async function cargar() {
    const res = await fetch(API + "/crm");
    const data = await res.json();

    document.getElementById("total").innerText = data.length;

    let impacto = 0;

    data.forEach(c => {
        impacto += c.impacto_anual_max || 0;

        const nodo = document.createElement("div");
        nodo.className = "node " + c.nivel.toLowerCase();

        let pos = coords[c.ciudad] || [Math.random()*80, Math.random()*80];

        nodo.style.left = pos[0] + "%";
        nodo.style.top = pos[1] + "%";

        nodo.onclick = () => abrir(c);

        document.body.appendChild(nodo);
    });

    document.getElementById("impacto").innerText =
        "$" + impacto.toLocaleString();

    radar(data);
}

/* RADAR */
function radar(data) {
    let altos = data.filter(x=>x.nivel==="ALTO").length;
    let medios = data.filter(x=>x.nivel==="MEDIO").length;
    let bajos = data.filter(x=>x.nivel==="BAJO").length;

    new Chart(document.getElementById("chart"), {
        type:"radar",
        data:{
            labels:["Alto","Medio","Bajo"],
            datasets:[{
                label:"Distribución",
                data:[altos,medios,bajos]
            }]
        }
    });
}

/* MODAL */
function abrir(c){
    document.getElementById("modal").style.display="flex";
    nombre.innerText = c.cliente;
    score.innerText = c.score;
    nivel.innerText = c.nivel;
    impacto_m.innerText = "$"+c.impacto_anual_max;
}

function cerrar(){
    modal.style.display="none";
}

/* STRIPE */
async function irPago(){
    const res = await fetch(API+"/crear-sesion-pago",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            cliente_id:"crm",
            sector:"PRIVADO"
        })
    });

    const data = await res.json();
    window.location.href = data.url;
}

cargar();

</script>

</body>
</html>
