<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Soberanía Operativa</title>

<style>
:root {
    --neon-cyan: #00f2ff;
    --dark-void: #050a12;
    --card-bg: rgba(6, 15, 28, 0.95);
    --border-glow: rgba(0, 242, 255, 0.3);
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--dark-void);
    color: white;
    overflow: hidden;
}

/* Fondo Unificado: Mapa + Rejilla */
#background-layer {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/5/5c/Mexico_states_map.svg') no-repeat center;
    background-size: 70%;
    opacity: 0.1;
    filter: invert(1) hue-rotate(180deg);
    z-index: -1;
}

.grid-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(var(--neon-cyan) 0.5px, transparent 0.5px);
    background-size: 25px 25px;
    opacity: 0.1;
    z-index: -1;
}

/* Caja de Acceso / Contenedor de Información */
.main-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card-bg);
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--neon-cyan);
    box-shadow: 0 0 25px var(--border-glow);
    text-align: center;
    width: 320px;
    backdrop-filter: blur(10px);
}

h3 {
    color: var(--neon-cyan);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 25px;
    text-shadow: 0 0 10px var(--border-glow);
}

input {
    width: 100%;
    padding: 12px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid #1f2a40;
    color: var(--neon-cyan);
    margin-bottom: 20px;
    box-sizing: border-box;
    border-radius: 8px;
    text-align: center;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 10px var(--border-glow);
}

/* Botón Estilo "Iniciar Diagnóstico" */
.btn-omega {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    padding: 14px;
    width: 100%;
    color: var(--neon-cyan);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.4s;
}

.btn-omega:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 20px var(--neon-cyan);
}

/* Elementos de la Consola */
.topbar {
    position: absolute;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(5, 10, 18, 0.9);
    border-bottom: 1px solid var(--neon-cyan);
    box-sizing: border-box;
}

#status-tag {
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 10px;
    color: var(--neon-cyan);
    letter-spacing: 1px;
    text-transform: uppercase;
}
</style>
</head>
<body>

<div id="background-layer"></div>
<div class="grid-overlay"></div>

<div class="main-container">
    <h3>MESAN Ω</h3>
    <input type="password" placeholder="INGRESA API KEY">
    <button class="btn-omega">ACCEDER AL SISTEMA</button>
</div>

<div id="status-tag">SISTEMA EN LÍNEA // SOBERANÍA EMPRESARIAL</div>

</body>
</html>
