!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MESAN Ω | Centro de Prevención de Pérdidas Empresariales</title>
  <style>
    :root {
      --bg: #0A0B0D;
      --gold: #C5A059;
      --text: #EAEAEA;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
    
    .hero {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      background: var(--bg);
      overflow: hidden;
    }

    .hero-visual-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image: url('watermarked_img_13351919239569379463.png');
      background-size: cover;
      background-position: center;
      filter: brightness(0.6) contrast(1.1);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      margin-left: 8%;
      max-width: 600px;
    }

    .hero-tag { color: var(--gold); letter-spacing: 4px; font-size: 12px; margin-bottom: 20px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 20px; }
    em { color: var(--gold); font-style: normal; }
    
    .btn-group { display: flex; gap: 20px; margin-top: 30px; }
    .btn { padding: 12px 24px; text-decoration: none; border: 1px solid var(--gold); color: white; }
    .btn-primary { background: var(--gold); color: black; }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-visual-layer"></div>

  <div class="hero-content">
    <div class="hero-tag">SOVEREIGN-FIRST OPERATIONS</div>
    <h1>¿Cuánto dinero podría perder <em>tu empresa</em> sin saberlo?</h1>
    <p>MESAN Ω es el sistema que detecta riesgos antes de que una empresa colapse.</p>
    
    <div class="btn-group">
      <a href="#diagnostico" class="btn btn-primary">Solicitar Diagnóstico</a>
      <a href="#contacto" class="btn">Hablar con un Especialista</a>
    </div>
  </div>
</div>

</body>
</html>
