<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Predictive Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:#020617;
    color:#fff;
    font-family:'DM Sans',sans-serif;
    text-align:center;
}

/* HERO */
.hero {
    padding:80px 20px;
}

h1 {
    font-family:'Syne',sans-serif;
    font-size:42px;
}

p {
    color:rgba(255,255,255,0.6);
}

/* INPUT */
textarea {
    width:90%;
    max-width:500px;
    height:120px;
    margin-top:20px;
    padding:12px;
    border-radius:8px;
    border:none;
}

/* BUTTON */
button {
    margin-top:20px;
    padding:14px 30px;
    background:#22D3EE;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* RESULT */
.result {
    display:none;
    margin-top:40px;
    padding:20px;
    background:#0f172a;
}

/* CARDS */
.grid {
    margin-top:60px;
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
    padding:0 20px;
}

.card {
    padding:20px;
    background:#0f172a;
}
</style>
</head>

<body>

<div class="hero">
    <h1>MESAN Ω</h1>
    <p>Arquitectura y Soberanía Empresarial</p>

    <textarea id="input" placeholder="Describe tu situación empresarial..."></textarea>

    <br>
    <button onclick="analizar()">INICIAR DIAGNÓSTICO</button>

    <div class="result" id="resultado"></div>
</div>

<div class="grid">
    <div class="card">🛡️ Blindaje Fiscal</div>
    <div class="card">⚖️ Blindaje Laboral</div>
    <div class="card">📈 Inteligencia Financiera</div>
    <div class="card">🔐 Soberanía de Datos</div>
</div>

<script>
const API = "https://mesan-api.onrender.com/ai/diagnostico";

async function analizar() {
    const texto = document.getElementById("input").value;

    if (!texto) {
        alert("Describe tu situación primero");
        return;
    }

    document.getElementById("resultado").style.display = "block";
    document.getElementById("resultado").innerHTML = "⏳ Analizando...";

    try {
        const res = await fetch(API, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ texto: texto })
        });

        const data = await res.json();

        document.getElementById("resultado").innerHTML = `
            <h3>Resultado</h3>
            <p><b>Sector:</b> ${data.industria}</p>
            <p><b>Riesgo:</b> ${data.riesgo}</p>
            <p><b>Impacto:</b> $${data.impacto_min.toLocaleString()} - $${data.impacto_max.toLocaleString()}</p>

            <h4>Causas:</h4>
            ${data.causas.map(c => `<p>⚠ ${c}</p>`).join("")}

            <h4>Consecuencias:</h4>
            ${data.consecuencias.map(c => `<p>→ ${c}</p>`).join("")}

            <h4>Plan 30 días:</h4>
            ${data.plan_30_dias.map(p => `<p>• ${p}</p>`).join("")}
        `;

    } catch (e) {
        document.getElementById("resultado").innerHTML = "❌ Error conectando con el servidor";
    }
}
</script>

</body>
</html>
