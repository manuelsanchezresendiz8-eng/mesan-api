<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#020617;
    color:#fff;
    font-family:'DM Sans';
}

/* HERO */
.hero{
    text-align:center;
    padding:100px 20px 60px;
}

.logo{font-family:'Syne';letter-spacing:4px;}
.tag{font-size:12px;color:#64748B;margin-bottom:20px;}

h1{font-family:'Syne';font-size:40px;margin-bottom:10px;}
.sub{color:#94A3B8;max-width:600px;margin:auto;}

textarea{
    width:90%;max-width:600px;height:120px;
    background:#0B1220;border:1px solid rgba(255,255,255,.1);
    border-radius:12px;padding:15px;color:#fff;
}

.btn{
    margin-top:20px;padding:14px 40px;
    background:linear-gradient(90deg,#22D3EE,#3B82F6);
    border:none;border-radius:10px;color:white;
    cursor:pointer;font-weight:600;
}

/* RESULTADO */
.result{
    display:none;
    margin-top:40px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:#0B1220;
    padding:20px;
    border-radius:10px;
    width:200px;
}

.big{font-size:28px;color:#EF4444;}

/* SCANNER */
.scanner{
    margin-top:30px;
    font-size:14px;
    color:#22D3EE;
    display:none;
}

/* REFINAR */
.preguntas{
    margin-top:30px;
    display:none;
}

.pregunta button{
    margin:5px;
    padding:8px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* WA */
.btn-wa{
    margin-top:20px;
    background:#25D366;
    color:#000;
}
</style>
</head>

<body>

<section class="hero">

<div class="logo">MESAN Ω</div>
<div class="tag">Predictive Analytics</div>

<h1>Detectamos riesgos antes de que te cuesten millones</h1>

<p class="sub">
Modelos matemáticos para anticipar problemas fiscales, laborales y financieros.
</p>

<textarea id="input" placeholder="Describe tu situación empresarial..."></textarea><br>
<button class="btn" onclick="analizar()">Iniciar Diagnóstico Matemático</button>

<div class="scanner" id="scanner">⚡ Analizando estructura empresarial...</div>

<!-- RESULTADO -->
<div class="result" id="resultado">

<div class="cards">
    <div class="card">
        <div class="big" id="score">0%</div>
        <p>Índice de Riesgo</p>
    </div>

    <div class="card">
        <div class="big" id="impacto">$0</div>
        <p>Impacto Estimado</p>
    </div>
</div>

<!-- REFINAR -->
<div class="preguntas" id="preguntas"></div>

<button class="btn" onclick="refinar()" id="btnRefinar">Refinar Diagnóstico</button>

<button class="btn btn-wa" onclick="enviarWhats()">Enviar a WhatsApp</button>

</div>

</section>

<script>
const API = "https://mesan-api.onrender.com"; // CAMBIA SI ES NECESARIO

let respuestas = {};
let mensaje = "";

// ANALIZAR
async function analizar(){
    const texto = document.getElementById("input").value;

    document.getElementById("scanner").style.display = "block";

    setTimeout(async ()=>{
        const res = await fetch(API + "/diagnostico",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({texto})
        });

        const data = await res.json();

        document.getElementById("scanner").style.display = "none";
        document.getElementById("resultado").style.display = "block";

        document.getElementById("score").innerText = data.score + "%";
        document.getElementById("impacto").innerText =
            "$" + data.impacto.toLocaleString();

        mensaje = `MESAN Ω\nRiesgo: ${data.riesgo}\nImpacto: $${data.impacto}`;

        generarPreguntas();
    },1500);
}

// PREGUNTAS
function generarPreguntas(){
    const cont = document.getElementById("preguntas");
    cont.style.display = "block";

    cont.innerHTML = `
    <div class="pregunta">
    <p>¿Recibiste notificación del SAT o IMSS?</p>
    <button onclick="setResp('notificacion','Si')">Si</button>
    <button onclick="setResp('notificacion','No')">No</button>
    <button onclick="setResp('notificacion','No se')">No sé</button>
    </div>

    <div class="pregunta">
    <p>¿Cuántos empleados tienes?</p>
    <button onclick="setResp('empleados','1-5')">1-5</button>
    <button onclick="setResp('empleados','6-20')">6-20</button>
    <button onclick="setResp('empleados','Mas de 20')">+20</button>
    </div>
    `;
}

function setResp(k,v){
    respuestas[k]=v;
}

// REFINAR
async function refinar(){
    const texto = document.getElementById("input").value;

    const res = await fetch(API + "/diagnostico",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({texto,respuestas})
    });

    const data = await res.json();

    document.getElementById("score").innerText = data.score + "%";
    document.getElementById("impacto").innerText =
        "$" + data.impacto.toLocaleString();

    mensaje = `MESAN Ω\nRiesgo: ${data.riesgo}\nImpacto: $${data.impacto}`;
}

// WHATSAPP
function enviarWhats(){
    window.open("https://wa.me/526861629643?text=" + encodeURIComponent(mensaje));
}
</script>

</body>
</html>
