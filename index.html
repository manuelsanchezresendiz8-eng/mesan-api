<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1 class="logo">MESAN <span>Ω</span></h1>
    <h2 class="headline">
        ¿Tu empresa está <span class="highlight">perdiendo dinero</span> sin que lo sepas?
    </h2>
    <p class="sub">
        Tu empresa puede estar perdiendo entre
        <span class="highlight">$80,000 y $500,000 MXN al año</span>
        por errores invisibles.
    </p>
    <div id="money-loss">
        Pérdida estimada en tiempo real:
        <span id="counter">$0 MXN</span>
    </div>
    <input id="inputRFC" placeholder="Ingresa RFC o datos de empresa">
    <button class="btn-primary" onclick="iniciarDiagnostico()">
        INICIAR DIAGNÓSTICO
    </button>
    <button class="btn-danger" onclick="activarRepse()">
        BOTÓN REPSE — Validación STPS
    </button>
    <div id="chat-output"></div>
    <div class="alert-box">
        ⚠️ SAT / IMSS pueden sancionar sin previo aviso.
    </div>
    <div class="urgency">
        ⏳ Este análisis se elimina en 15 minutos.
    </div>
    <button class="btn-pay" onclick="irPago()">
        🔓 Ver diagnóstico completo ahora — $299 MXN
    </button>
</div>
<script src="app.js"></script>
</body>
</html>
