<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - CRM Principal</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
        }

        /* Contenedor Principal con la imagen de fondo del CRM */
        .dashboard-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: url('https://i.ibb.co/vzrK8G0/CRM-BACKGROUND.png') no-repeat center center;
            background-size: contain;
        }

        /* Botones Invisibles pero Funcionales sobre la imagen */
        .overlay-button {
            position: absolute;
            cursor: pointer;
            border: none;
            background: rgba(0, 212, 255, 0.1); /* Sutil brillo para saber dónde tocar */
            border-radius: 5px;
            transition: 0.3s;
        }

        .overlay-button:active { background: rgba(0, 212, 255, 0.4); }

        /* Posicionamiento exacto según tu captura del CRM */
        #btn-diagnostico {
            width: 40%; height: 5%;
            top: 61%; left: 30%;
        }

        #btn-repse {
            width: 40%; height: 6%;
            top: 67%; left: 30%;
        }

        /* Panel de Alerta interno para que no use ventanas del sistema */
        #status-panel {
            position: absolute;
            bottom: 15%; left: 50%;
            transform: translateX(-50%);
            width: 80%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00d4ff;
            color: #00ff88;
            font-size: 14px;
            display: none;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>

    <audio id="coreSound">
        <source src="https://www.myinstants.com/media/sounds/netflix-ta-dum-sound-effect.mp3" type="audio/mpeg">
    </audio>

    <div class="dashboard-container">
        <button class="overlay-button" id="btn-diagnostico" onclick="runCore()"></button>
        <button class="overlay-button" id="btn-repse" onclick="runCore()"></button>

        <div id="status-panel">
            <span id="msg">Sincronizando con Sentinel Core...</span>
        </div>
    </div>

    <script>
        function runCore() {
            // Activar Sonido
            const audio = document.getElementById('coreSound');
            audio.play().catch(e => console.log("Permiso requerido"));

            // Activar Visual
            const panel = document.getElementById('status-panel');
            const msg = document.getElementById('msg');
            
            panel.style.display = 'block';
            msg.innerHTML = "<b>PROCESANDO...</b><br>Analizando vulnerabilidades fiscales.";

            setTimeout(() => {
                msg.innerHTML = "<span style='color:white'>CONEXIÓN OMEGA ESTABLECIDA</span><br>Riesgo detectado: $450k MXN";
            }, 2000);
        }
    </script>
</body>
</html>
