  <style>
    /* ============================================================
       VARIABLES & RESET
    ============================================================ */
    :root {
      --bg-void: #010508;
      --bg-deep: #020a10;
      --bg-panel: #071523;
      --bg-card: #0a1e30;
      --bg-hover: #0d2840;

      --cyan: #00d4ff;
      --cyan-dim: rgba(0,212,255,0.12);
      --cyan-mid: rgba(0,212,255,0.25);
      --amber: #ff9500;
      --amber-dim: rgba(255,149,0,0.12);
      --green: #00e87a;
      --green-dim: rgba(0,232,122,0.12);
      --red: #ff3055;
      --red-dim: rgba(255,48,85,0.12);
      --gold: #d4a843;

      --text-prime: #ddeef5;
      --text-body: #8ab0c0;
      --text-dim: #3d6070;
      --text-muted: #1d3545;

      --border: rgba(0,212,255,0.08);
      --border-mid: rgba(0,212,255,0.18);
      --border-hi: rgba(0,212,255,0.40);

      --font-display: 'Orbitron', monospace;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-body: 'DM Sans', sans-serif;

      --radius-sm: 2px;
      --radius: 4px;
      --radius-md: 8px;

      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background: var(--bg-void);
      color: var(--text-prime);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      cursor: none;
      overflow-x: hidden;
    }

    ::selection {
      background: var(--cyan);
      color: var(--bg-void);
    }

    /* ============================================================
       CUSTOM CURSOR
    ============================================================ */
    #cursor-dot {
      position: fixed;
      width: 6px; height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
    }
    #cursor-ring {
      position: fixed;
      width: 28px; height: 28px;
      border: 1px solid rgba(0,212,255,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear, width 0.2s, height 0.2s, border-color 0.2s;
    }
    body:has(a:hover, button:hover) #cursor-dot { width: 10px; height: 10px; background: var(--amber); }
    body:has(a:hover, button:hover) #cursor-ring { width: 40px; height: 40px; border-color: var(--amber); }

    /* ============================================================
       GLOBAL NOISE OVERLAY
    ============================================================ */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9990;
      opacity: 0.6;
    }

    /* ============================================================
       NAVIGATION
    ============================================================ */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      height: 60px;
      background: rgba(1,5,8,0.85);
      backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .nav-logo-mark {
      width: 32px; height: 32px;
      border: 1.5px solid var(--cyan);
      display: grid; place-items: center;
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700;
      color: var(--cyan);
      position: relative;
    }
    .nav-logo-mark::before {
      content: '';
      position: absolute; inset: 3px;
      background: var(--cyan-dim);
    }
    .nav-logo-text {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-prime);
    }
    .nav-logo-text span { color: var(--cyan); }

    .nav-status {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--green);
      letter-spacing: 0.1em;
    }
    .nav-status-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .nav-links {
      display: flex; align-items: center; gap: 8px;
    }
    .nav-link {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-body);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid transparent;
      transition: var(--transition);
      text-transform: uppercase;
    }
    .nav-link:hover {
      color: var(--cyan);
      border-color: var(--border-mid);
      background: var(--cyan-dim);
    }
    .nav-cta {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--bg-void);
      background: var(--cyan);
      border: none;
      padding: 8px 20px;
      cursor: none;
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      transition: var(--transition);
      display: inline-block;
    }
    .nav-cta:hover { background: #33ddff; transform: translateY(-1px); }

    /* ============================================================
       SECTION BASE
    ============================================================ */
    section { position: relative; }

    .section-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-tag::before {
      content: '';
      width: 24px; height: 1px;
      background: var(--cyan);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.15;
      color: var(--text-prime);
    }

    .section-subtitle {
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text-body);
      max-width: 540px;
      line-height: 1.7;
    }

    /* ============================================================
       HERO — COMMAND CENTER
    ============================================================ */
    #hero {
      position: relative;
      height: 100vh; min-height: 700px;
      display: flex; align-items: center;
      padding-top: 60px; /* compensar nav fijo */
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background: url('hero.jpg') center center / cover no-repeat;
      transform: scale(1.05);
      animation: hero-zoom 30s ease-in-out infinite alternate;
    }

    @keyframes hero-zoom {
      from { transform: scale(1.05); }
      to { transform: scale(1.12); }
    }

    .hero-overlay {
      position: absolute; inset: 0;
      background:
        linear-gradient(to right, rgba(1,5,8,0.97) 38%, rgba(1,5,8,0.70) 65%, rgba(1,5,8,0.40) 100%),
        linear-gradient(to top, rgba(1,5,8,0.90) 0%, transparent 50%);
    }

    /* Scanlines */
    .hero-scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
    }

    /* Grid */
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-content {
      position: relative; z-index: 2;
      padding: 0 60px;
      max-width: 680px;
      animation: fade-up 1.2s ease forwards;
      opacity: 0;
      animation-delay: 0.3s;
    }

    .hero-system-id {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .hero-system-id::before {
      content: '▸';
      color: var(--cyan);
    }
    .blink { animation: blink 1.2s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .hero-headline {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 4.5vw, 3.8rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: 0.02em;
      color: var(--text-prime);
      margin-bottom: 20px;
    }
    .hero-headline em {
      font-style: normal;
      color: var(--cyan);
    }

    .hero-sub {
      font-family: var(--font-body);
      font-size: 16px;
      color: var(--text-body);
      line-height: 1.75;
      margin-bottom: 36px;
      max-width: 500px;
    }

    .hero-actions {
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bg-void);
      background: var(--cyan);
      border: none;
      padding: 14px 32px;
      cursor: none;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 10px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }
    .btn-primary::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .btn-primary:hover::before { left: 100%; }
    .btn-primary:hover { background: #22e8ff; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.3); }

    .btn-secondary {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-body);
      background: transparent;
      border: 1px solid var(--border-mid);
      padding: 13px 28px;
      cursor: none;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 10px;
      transition: var(--transition);
    }
    .btn-secondary:hover { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); }

    /* HERO INDICATORS BAR */
    .hero-indicators {
      display: flex; align-items: center; gap: 24px;
      flex-wrap: wrap;
    }
    .hero-ind {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .hero-ind-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .hero-ind-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-dot 2s infinite; }
    .hero-ind-dot.warn { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse-dot 3s infinite; }
    .hero-ind-dot.alert { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse-dot 1.5s infinite; }

    /* FLOATING RISK PANEL */
    .hero-risk-panel {
      position: absolute;
      right: 80px; top: 50%;
      transform: translateY(-50%);
      width: 300px;
      background: rgba(7,21,35,0.92);
      border: 1px solid var(--border-mid);
      backdrop-filter: blur(24px);
      z-index: 3;
      animation: fade-left 1.4s ease forwards;
      opacity: 0;
      animation-delay: 0.7s;
    }

    .risk-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .risk-panel-title {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--cyan);
      text-transform: uppercase;
    }
    .risk-panel-live {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--green);
      letter-spacing: 0.1em;
    }
    .risk-panel-live::before {
      content: '';
      width: 5px; height: 5px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse-dot 1.5s infinite;
    }

    /* Big Score */
    .risk-score-big {
      padding: 24px 18px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .score-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .score-number {
      font-family: var(--font-display);
      font-size: 3.6rem;
      font-weight: 900;
      line-height: 1;
      color: var(--amber);
      text-shadow: 0 0 40px rgba(255,149,0,0.4);
    }
    .score-max {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-dim);
    }
    .score-status {
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--amber);
      text-transform: uppercase;
    }

    /* Dimension bars */
    .risk-dimensions {
      padding: 16px 18px;
    }
    .risk-dim {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .risk-dim:last-child { margin-bottom: 0; }
    .risk-dim-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-body);
      text-transform: uppercase;
      width: 78px; flex-shrink: 0;
    }
    .risk-dim-bar {
      flex: 1;
      height: 3px;
      background: var(--bg-void);
      position: relative;
      overflow: hidden;
    }
    .risk-dim-fill {
      position: absolute; top: 0; left: 0; bottom: 0;
      transition: width 1.8s cubic-bezier(0.4,0,0.2,1);
      width: 0;
    }
    .risk-dim-fill.c-amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .risk-dim-fill.c-red { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .risk-dim-fill.c-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .risk-dim-fill.c-cyan { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
    .risk-dim-val {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-body);
      width: 26px; text-align: right; flex-shrink: 0;
    }

    .risk-panel-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-left {
      from { opacity: 0; transform: translate(30px, -50%); }
      to { opacity: 1; transform: translate(0, -50%); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes scan-line {
      0% { top: 0; opacity: 0.6; }
      100% { top: 100%; opacity: 0; }
    }
    @keyframes rotate-ring {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes counter-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       EXECUTIVE DASHBOARD
    ============================================================ */
    #dashboard {
      padding: 100px 60px;
      background: var(--bg-deep);
      position: relative;
    }

    #dashboard::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,212,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .dashboard-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 48px;
      flex-wrap: wrap; gap: 20px;
    }

    .dashboard-meta {
      display: flex; align-items: center; gap: 20px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }
    .dashboard-meta span { color: var(--text-body); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .score-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      cursor: default;
    }
    .score-card::before {
      content: '';
      position: absolute; top:
