<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - Full Interface</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 30%, #0d1b2a 0%, #000 80%);
        }

        .phone-frame {
            width: 360px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 35px;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo { font-size: 18px; font-weight: bold; margin-bottom: 25px; letter-spacing: 1px; }
        .logo span { color: #8a2be2; text-shadow: 0 0 10px #8a2be2; }

        h1 { text-align: center; font-size: 21px; font-weight: 300; line-height: 1.2; margin-bottom: 15px; }
        h1 b { color: #00d4ff; text-shadow: 0 0 15px rgba(0, 212, 255, 0.7); }

        .loss { color: #ff4d4d; text-align: center; font-size: 13px; margin-bottom: 20px; }

        /* Panel Superior Sentinel */
        .sentinel-bar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #8892b0;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Botones de Módulos (Los que faltaban) */
        .module {
            background: rgba(10, 25, 47, 0.6);
            border: 1px solid rgba(28, 45, 77, 0.8);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            transition: 0.3s;
        }
        .module:hover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.05); }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-blue {
            background: linear-gradient(180deg, #00a2ff 0%, #005bb5 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 162, 255, 0.3);
        }
        .btn-red {
            background: linear-gradient(180deg, #d00000 0%, #800000 100%);
            color: white;
            border: 1px solid #ff4d4d;
        }

        /* Alerta de Procesamiento Integrada */
        #status-area {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            border-radius: 4px;
            font-size: 12px;
            display: none;
            text-align: left;
        }

        .btn-pay {
            background: #00ff88;
            color: #00331a;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="logo">MESAN <span>Ω</span></div>

        <h1>¿Tu empresa está <b>perdiendo dinero</b> sin que lo sepas?</h1>
        <div class="loss">Pérdida estimada en tiempo real: $6,862 MXN</div>

        <div class="sentinel-bar">
            <div>SENTINEL CORE<br><span style="color:#00ff88">ACTIVE</span></div>
            <div style="text-align:right">AETHER CORE<br>READY</div>
        </div>

        <div class="module"><span>MESAN ENTERPRISE</span> <span style="color:#00d4ff">◆</span></div>
        <div class="module"><span>MESAN OMEGA</span> <span style="color:#a155ff">❖</span></div>
        <div class="module"><span>SOPORTE Ω</span> <span style="color:#ff914d">▲</span></div>

        <button class="btn btn-blue" id="actionBtn">INICIAR DIAGNÓSTICO</button>
        <button class="btn btn-red">🛡️ BOTÓN REPSE</button>

        <div id="status-area">
            <span id="status-text">Sincronizando con Sentinel Core...</span>
        </div>

        <button class="btn btn-pay">🔒 Ver diagnóstico completo — $299 MXN</button>
    </div>

    <audio id="netflixSound">
        <source src="https://www.myinstants.com/media/sounds/netflix-ta-dum-sound-effect.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('actionBtn');
        const status = document.getElementById('status-area');
        const txt = document.getElementById('status-text');
        const audio = document.getElementById('netflixSound');

        btn.addEventListener('click', () => {
            // Sonido
            audio.play().catch(() => console.log("Interacción requerida"));
            
            // Visual
            btn.innerText = "PROCESANDO...";
            status.style.display = "block";
            
            setTimeout(() => {
                txt.innerHTML = "<strong>CONEXIÓN ESTABLECIDA</strong><br>Analizando vulnerabilidades...";
                txt.style.color = "#00ff88";
            }, 2000);
        });
    </script>
</body>
</html>
