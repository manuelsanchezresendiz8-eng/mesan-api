<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#020617;
    color:#E2E8F0;
    font-family:'Inter';
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{font-weight:600;letter-spacing:2px;color:#fff;}

.cta-top{
    border:1px solid rgba(255,255,255,.1);
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
}

/* HERO */
.hero{
    text-align:center;
    padding:120px 20px 80px;
}

.hero h1{
    font-size:48px;
    color:#fff;
    margin-bottom:10px;
}

.hero p{
    color:#94A3B8;
    max-width:600px;
    margin:auto;
    margin-bottom:40px;
}

/* INPUT */
.input-box{
    max-width:600px;
    margin:auto;
}

textarea{
    width:100%;
    height:120px;
    background:#0B1220;
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;
    padding:15px;
    color:#fff;
}

.btn{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563EB;
    color:#fff;
    font-weight:500;
    cursor:pointer;
}

/* RESULT */
.result{
    display:none;
    margin-top:50px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    max-width:800px;
    margin:auto;
}

.card{
    background:#0B1220;
    padding:20px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.05);
}

.value{
    font-size:28px;
    color:#22C55E;
}

/* ANALYSIS BOX */
.analysis{
    max-width:800px;
    margin:40px auto;
    padding:25px;
    background:#0B1220;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.05);
    text-align:left;
    line-height:1.6;
}

/* FEATURES */
.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    max-width:1000px;
    margin:80px auto;
    padding:0 20px;
}

.feature{
    padding:20px;
    background:#0B1220;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.05);
}

/* FOOTER */
.footer{
    text-align:center;
    padding:40px;
    font-size:12px;
    color:#64748B;
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">MESAN Ω</div>
    <div class="cta-top">Acceso Enterprise</div>
</div>

<section class="hero">
<h1>Diagnóstico Empresarial en Tiempo Real</h1>
<p>Detecta riesgos fiscales, laborales y financieros antes de que generen pérdidas.</p>

<div class="input-box">
<textarea id="input" placeholder="Ej: El IMSS bloqueó cuentas y tengo empleados sin registrar..."></textarea>
<button class="btn" onclick="analizar()">Analizar</button>
</div>

<div class="result" id="result">

<div class="grid">
<div class="card">
<div class="value" id="score">0%</div>
<p>Riesgo</p>
</div>

<div class="card">
<div class="value" id="impacto">$0</div>
<p>Impacto mensual</p>
</div>

<div class="card">
<div class="value" id="nivel">-</div>
<p>Nivel</p>
</div>
</div>

<div class="analysis" id="analysis"></div>

<button class="btn" onclick="whatsapp()">Hablar con Consultor</button>

</div>
</section>

<section class="features">
<div class="feature">🛡️ Blindaje Fiscal</div>
<div class="feature">⚖️ Blindaje Laboral</div>
<div class="feature">📈 Inteligencia Financiera</div>
<div class="feature">🔐 Soberanía de Datos</div>
</section>

<div class="footer">MESAN Ω © 2026</div>

<script>
const API = "https://mesan-api.onrender.com";
let mensaje = "";

async function analizar(){
    const texto = document.getElementById("input").value;

    const res = await fetch(API + "/diagnostico",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({texto})
    });

    const data = await res.json();

    document.getElementById("result").style.display = "block";

    document.getElementById("score").innerText = data.score + "%";
    document.getElementById("impacto").innerText = "$" + data.impacto.toLocaleString();
    document.getElementById("nivel").innerText = data.riesgo;

    document.getElementById("analysis").innerHTML = `
    <b>Diagnóstico:</b><br>
    Riesgo ${data.riesgo} detectado con impacto financiero relevante.<br>
    Se recomienda intervención inmediata para evitar escalamiento.
    `;

    mensaje = `MESAN Ω\nRiesgo: ${data.riesgo}\nImpacto: $${data.impacto}`;
}

function whatsapp(){
    window.open("https://wa.me/526861629643?text=" + encodeURIComponent(mensaje));
}
</script>

</body>
</html>
