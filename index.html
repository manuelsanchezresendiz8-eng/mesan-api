<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#000;
color:white;
text-align:center;
}

.container{
padding:40px 20px;
max-width:400px;
margin:auto;
}

.logo{
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}
.logo span{color:#7b42ff;}

.hero{
margin-top:30px;
font-size:22px;
}
.hero span{
color:#00c3ff;
text-shadow:0 0 10px #00c3ff;
}

.btn{
margin-top:20px;
padding:15px;
width:100%;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#007bff,#00c3ff);
color:white;
font-size:16px;
cursor:pointer;
}

.modules{
margin-top:30px;
}

.module{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0d1930;
border-radius:10px;
margin-bottom:10px;
border:1px solid #233554;
cursor:pointer;
transition:0.3s;
}
.module:hover{
border-color:#00c3ff;
background:#0a1f3a;
}

.blue span{color:#00c3ff;}
.purple span{color:#7b42ff;}
.red span{color:#ff4d4d;}

.chat{
margin-top:20px;
background:#020c1b;
border:1px solid #233554;
padding:15px;
border-radius:10px;
display:none;
text-align:left;
font-size:14px;
line-height:1.6;
}

.pay{
margin-top:15px;
padding:12px 20px;
background:linear-gradient(90deg,#00c3ff,#007bff);
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
font-size:14px;
width:100%;
}
.pay:hover{
box-shadow:0 0 20px rgba(0,195,255,0.5);
}
</style>
</head>

<body>

<div class="container">

<div class="logo">MESAN <span>Ω</span></div>

<div class="hero">
¿Tu empresa está <span>perdiendo dinero</span> sin que lo sepas?
</div>

<button class="btn" onclick="iniciarDiagnostico()">
INICIAR DIAGNÓSTICO
</button>

<div class="modules">

<div class="module blue" onclick="iniciarDiagnostico()">
<div><b>MESAN ENTERPRISE</b><br><small>Auditoría completa</small></div>
<span>◆</span>
</div>

<div class="module purple" onclick="iniciarDiagnostico()">
<div><b>MESAN Ω</b><br><small>Predicción avanzada</small></div>
<span>❖</span>
</div>

<div class="module red" onclick="activarRepse()">
<div><b>BOTÓN REPSE</b><br><small>Validación STPS</small></div>
<span>🛡️</span>
</div>

</div>

<div class="chat" id="chat"></div>

</div>

<script>
const API = "https://mesan-api.onrender.com";
let cliente_id = "cliente_" + Date.now();

function iniciarDiagnostico(){
    const chat = document.getElementById("chat");
    chat.style.display = "block";
    chat.innerHTML = "⏳ Analizando...";

    setTimeout(()=>{
        chat.innerHTML = `
        🚨 <b>ALERTA DETECTADA</b><br><br>
        Riesgos fiscales y laborales identificados.<br><br>
        Impacto estimado:<br>
        <b style="color:#ff4d4d">$120,000 - $450,000 MXN</b><br><br>
        <button class="pay" onclick="irPago()">
            🔒 Desbloquear diagnóstico completo — $299 MXN
        </button>
        `;
    }, 1500);
}

async function activarRepse(){
    const chat = document.getElementById("chat");
    chat.style.display = "block";
    chat.innerHTML = "⏳ Consultando STPS...";

    try{
        const res = await fetch(API + "/api/verificar", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({rfc: "ABC123456XYZ"})
        });

        const data = await res.json();
        chat.innerHTML = data.analisis_ia || "✅ Consulta completada";
    } catch {
        chat.innerHTML = "❌ Error de conexión";
    }
}

async function irPago(){
    try {
        const res = await fetch(API + "/crear-sesion-omega", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                cliente_id: cliente_id,
                sector: "PRIVADO",
                monto: 299,
                indice: 75
            })
        });

        const data = await res.json();
        if(data.url) window.location.href = data.url;
        else alert("Error generando pago");

    } catch(e) {
        alert("Error de conexión");
    }
}
</script>

</body>
</html>
