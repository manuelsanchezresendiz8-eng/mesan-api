<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - Executive</title>
    <style>
        :root {
            /* Colores premium de la imagen de referencia */
            --bg-master: #020b16; 
            --cyan-neon: #00d4ff; 
            --accent-glow: rgba(0, 212, 255, 0.6);
            --card-glass: rgba(10, 25, 47, 0.7);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 50% 35%, #0a1e35 0%, #020b16 100%);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-layout {
            width: 100%;
            max-width: 390px;
            padding: 30px 25px;
            text-align: center;
        }

        /* LOGO SUPERIOR */
        .brand-logo {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 50px;
            color: #fff;
        }
        .brand-logo span { 
            color: var(--cyan-neon); 
            text-shadow: 0 0 12px var(--cyan-neon); 
        }

        /* TÍTULO CON EFECTO SOBERANÍA */
        .title-h1 {
            font-size: 34px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }
        .title-h1 span {
            color: var(--cyan-neon);
            text-shadow: 0 0 25px var(--accent-glow);
            display: block;
        }

        .desc-text {
            font-size: 14px;
            color: #8892b0;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* BOTÓN CON AURA NEÓN */
        .action-btn {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 2px solid var(--cyan-neon);
            color: var(--cyan-neon);
            font-weight: 700;
            letter-spacing: 2.5px;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.25);
            cursor: pointer;
            margin-bottom: 40px;
        }

        /* MÓDULOS ESTILO CRISTAL */
        .module-item {
            background: var(--card-glass);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            text-align: left;
        }
        .module-item h3 { margin: 0; font-size: 14px; color: #ccd6f6; }
        .module-item p { margin: 4px 0 0; font-size: 11px; color: #64748b; }

        /* ALERTA DE RIESGO PROFESIONAL */
        .alert-ui {
            margin-top: 30px;
            padding: 22px;
            background: rgba(220, 38, 38, 0.08);
            border-left: 4px solid #ef4444;
            border-radius: 6px;
            text-align: left;
        }
        .alert-ui h4 { color: #ef4444; font-size: 12px; margin: 0; letter-spacing: 1px; }
        .alert-ui .price { font-size: 30px; font-weight: 900; color: #fff; margin: 10px 0; }
    </style>
</head>
<body>

<div class="phone-layout">
    <div class="brand-logo">MESAN <span>Ω</span></div>

    <h1 class="title-h1">Arquitectura y<br><span>Soberanía</span><br>Empresarial</h1>

    <p class="desc-text">Análisis predictivo de vulnerabilidades diseñado para la toma de decisiones nivel C-Suite.</p>

    <button class="action-btn">Iniciar Diagnóstico</button>

    <div class="module-item">
        <div>
            <h3>MESAN ENTERPRISE</h3>
            <p>Auditoría de Cumplimiento</p>
        </div>
        <span style="color:var(--cyan-neon)">◆</span>
    </div>

    <div class="alert-ui">
        <h4>🚨 EXPOSICIÓN DETECTADA</h4>
        <div style="color: #8892b0; font-size: 13px;">Riesgo estimado en estructura:</div>
        <div class="price">$450,000 MXN</div>
        <small style="color: #475569; font-size: 10px;">Validación directa STPS/SAT ejecutada.</small>
    </div>
</div>

</body>
</html>
