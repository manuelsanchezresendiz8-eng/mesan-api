<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω - Réplica Oficial</title>

<style>
    body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        background-color: #000;
        font-family: 'Segoe UI', sans-serif;
    }

    /* EL CONTENEDOR USA TU IMAGEN PREMIUM COMO BASE TOTAL */
    .viewport {
        position: relative;
        width: 100vw; height: 100vh;
        background: url('https://images2.imgbox.com/71/97/BUnuAueO_o.png') no-repeat center center;
        background-size: contain;
    }

    /* CAPA DE INTERACCIÓN: Zonas invisibles sobre los botones de la imagen */
    .hit-box {
        position: absolute;
        cursor: pointer;
        background: rgba(0,0,0,0); /* Invisible */
        border: none;
        outline: none;
    }

    /* Posicionamiento preciso sobre los botones integrados en la imagen */
    #btn-enterprise { width: 25%; height: 6%; top: 43%; left: 65%; }
    #btn-omega      { width: 25%; height: 6%; top: 49%; left: 65%; }
    #btn-soporte    { width: 25%; height: 6%; top: 55%; left: 65%; }
    
    #btn-diagnostico { width: 40%; height: 7%; top: 61.5%; left: 30%; }
    #btn-repse       { width: 40%; height: 7%; top: 67.5%; left: 30%; }

    /* EL CONTADOR Y EL CHAT SE INTEGRAN EN LAS PANTALLAS DEL DISEÑO */
    .display-counter {
        position: absolute;
        top: 28%; left: 50%;
        transform: translateX(-50%);
        color: #00c3ff;
        font-size: 1.3rem;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(0, 195, 255, 0.6);
    }

    .consultor-ia {
        position: absolute;
        bottom: 12%; right: 6%;
        width: 260px;
        background: rgba(2, 12, 27, 0.9);
        padding: 15px;
        border-radius: 10px;
        font-size: 0.8rem;
        border: 1px solid #233554;
        display: none;
        color: #00ff88;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .pay-btn {
        margin-top: 10px;
        padding: 8px;
        background: #00c3ff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
    }
</style>
</head>

<body>

<div class="viewport">
    <div class="display-counter" id="counter">$0 MXN</div>

    <button class="hit-box" id="btn-enterprise" onclick="runMod('ENTERPRISE')"></button>
    <button class="hit-box" id="btn-omega"      onclick="runMod('OMEGA')"></button>
    <button class="hit-box" id="btn-soporte"    onclick="runMod('SOPORTE')"></button>
    
    <button class="hit-box" id="btn-diagnostico" onclick="iniciarDiagnostico()"></button>
    <button class="hit-box" id="btn-repse"       onclick="activarRepse()"></button>

    <div class="consultor-ia" id="chat"></div>
</div>

<script>
const API = "https://mesan-api.onrender.com";
let perdida = 0;

/* LÓGICA DE CONTADOR */
setInterval(() => {
    perdida += Math.floor(Math.random() * 500 + 200);
    document.getElementById("counter").innerText = "$" + perdida.toLocaleString() + " MXN";
}, 1500);

/* LÓGICA DE DIAGNÓSTICO (TU CÓDIGO) */
function iniciarDiagnostico() {
    const chat = document.getElementById("chat");
    chat.style.display = "block";
    chat.innerHTML = "⏳ Sincronizando con Sentinel Core...";

    setTimeout(() => {
        chat.innerHTML = `
        🚨 <b>ALERTA CRÍTICA</b><br><br>
        Riesgo fiscal detectado: <b>$450,000 MXN</b><br><br>
        <button class="pay-btn" onclick="alert('Redirigiendo a Stripe...')">DESBLOQUEAR ($299)</button>
        `;
    }, 1500);
}

/* LÓGICA REPSE (TU CÓDIGO) */
async function activarRepse() {
    const chat = document.getElementById("chat");
    chat.style.display = "block";
    chat.innerHTML = "📡 Consultando STPS...";
    // ... resto de tu lógica fetch ...
}

function runMod(name) {
    console.log("Activando módulo: " + name);
}
</script>

</body>
</html>
