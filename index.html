<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω | Vista Previa</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    /* --- CONFIGURACIÓN DE SOBERANÍA EMPRESARIAL --- */
    :root {
        --bg: #010508;               /* Fondo Negro Absoluto */
        --panel: #06121D;            /* Azul Profundo */
        --accent: #00BFFF;           /* Cian Eléctrico */
        --border: #1A3B61;           /* Azul Metálico */
        --text: #FFFFFF;             /* Blanco Puro */
        --dim: #5E7A94;              /* Gris Técnico */
        --glow: rgba(0, 191, 255, 0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
        background-color: var(--bg);
        /* Textura unificada de consola */
        background-image: radial-gradient(circle at top right, rgba(26, 59, 97, 0.05), transparent);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        min-height: 100vh;
    }

    .preview-frame {
        max-width: 440px;
        width: 100%;
    }

    /* Cabecera del Sistema */
    .sys-header {
        font-size: 11px;
        color: var(--dim);
        letter-spacing: 2.5px;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    h1 {
        font-family: 'Orbitron', monospace;
        font-size: 28px;
        color: var(--accent);
        margin-bottom: 20px;
        letter-spacing: 1.5px;
    }

    .intro {
        font-size: 14px;
        color: var(--dim);
        line-height: 1.6;
        margin-bottom: 40px;
    }

    /* Marcadores 01, 02 */
    .step-marker {
        font-family: 'Orbitron', monospace;
        font-size: 11px;
        color: var(--accent);
        border-bottom: 1px solid rgba(26, 59, 97, 0.4);
        padding-bottom: 10px;
        margin: 30px 0 25px 0;
        letter-spacing: 2px;
    }

    /* Terminal Inputs */
    .field { margin-bottom: 25px; }
    
    label {
        display: block;
        font-size: 10px;
        color: var(--dim);
        margin-bottom: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }

    input {
        width: 100%;
        background: #0A1929;
        border: 1px solid var(--border);
        padding: 16px;
        color: var(--text);
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: 0.3s ease;
    }

    input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 15px var(--glow);
    }

    /* Módulos de Selección (Cards) */
    .card {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 24px;
        border-radius: 10px;
        margin-bottom: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .card.active {
        border-color: var(--accent);
        background: rgba(0, 191, 255, 0.04);
        box-shadow: 0 0 20px var(--glow);
    }

    .card-title {
        font-family: 'Orbitron', monospace;
        color: var(--accent);
        font-size: 14px;
        margin-bottom: 8px;
        letter-spacing: 1px;
    }

    .card-info {
        font-size: 11px;
        color: var(--dim);
        line-height: 1.5;
    }

    /* Footer de Advertencia */
    .footer {
        margin-top: 50px;
        text-align: center;
        font-size: 10px;
        color: #2D3E4F;
        line-height: 1.8;
    }

    .whatsapp {
        position: fixed;
        bottom: 30px;
        right: 25px;
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 12px 25px;
        border-radius: 50px;
        font-size: 12px;
        text-decoration: none;
        background: rgba(6, 18, 29, 0.8);
        backdrop-filter: blur(5px);
    }
</style>
</head>
