<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - Experience</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Fondo de nebulosa sutil */
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #000000 100%);
        }

        /* Capa de partículas/estrellas */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            z-index: 0;
        }

        .interface-container {
            position: relative;
            z-index: 1;
            width: 380px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0, 162, 255, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }
        .logo span { color: #7b42ff; text-shadow: 0 0 10px #7b42ff; }

        .headline {
            font-size: 22px;
            line-height: 1.3;
            margin-bottom: 20px;
            font-weight: 300;
        }
        .headline b { 
            color: #00d4ff; 
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
            font-weight: 600;
        }

        .sub-text {
            font-size: 13px;
            color: #8892b0;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        /* Botón Estilo "Netflix" / Premium */
        .btn-main {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 15px 40px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-main:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .footer-brand {
            margin-top: 60px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="interface-container">
        <div class="logo">MESAN <span>Ω</span></div>

        <div class="headline">
            Arquitectura y<br>
            <b>Soberanía Empresarial</b>
        </div>

        <div class="sub-text">
            Modelos matemáticos avanzados diseñados para detectar vulnerabilidades fiscales y laborales.
        </div>

        <button class="btn-main" onclick="playNetflixSound()">
            INICIAR DIAGNÓSTICO
        </button>

        <div class="footer-brand">MESAN Ω © 2026</div>
    </div>

    <audio id="netflixSound">
        <source src="https://www.myinstants.com/media/sounds/netflix-ta-dum-sound-effect.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playNetflixSound() {
            const sound = document.getElementById('netflixSound');
            sound.currentTime = 0;
            sound.play();
            
            // Simulación de carga después del sonido
            setTimeout(() => {
                alert("Sincronizando con Sentinel Core...");
            }, 1000);
        }
    </script>

</body>
</html>
