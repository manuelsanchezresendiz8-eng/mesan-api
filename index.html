<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - Centro de Control</title>
    <style>
        body {
            margin: 0; background: #000; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 30%, #0d1b2a 0%, #000 90%);
        }

        /* Panel Izquierdo: Botonera MESAN */
        .sidebar {
            width: 250px; background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
            backdrop-filter: blur(10px);
        }

        .sidebar-header { font-weight: bold; font-size: 14px; color: #8a2be2; margin-bottom: 20px; text-shadow: 0 0 10px #8a2be2; }

        .nav-btn {
            background: rgba(10, 25, 47, 0.8); border: 1px solid rgba(0, 212, 255, 0.2);
            color: white; padding: 12px; border-radius: 8px; text-align: left;
            font-size: 12px; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between;
        }
        .nav-btn:hover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        .nav-btn.red { border-color: #ff4d4d; color: #ff4d4d; }

        /* Centro: Cuestionario Operativo */
        .main-content {
            flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center;
            overflow-y: auto;
        }

        .questionnaire-box {
            width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 300; color: #00d4ff; margin-bottom: 25px; text-align: center; }

        .q-item { margin-bottom: 20px; }
        .q-item label { display: block; font-size: 13px; color: #8892b0; margin-bottom: 8px; }
        .q-input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(28, 45, 77, 1);
            padding: 12px; color: white; border-radius: 5px; outline: none;
        }
        .q-input:focus { border-color: #00d4ff; }

        .btn-action {
            width: 100%; padding: 15px; background: linear-gradient(180deg, #00a2ff 0%, #005bb5 100%);
            border: none; border-radius: 8px; color: white; font-weight: bold;
            cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }

        #sentinel-alert {
            margin-top: 20px; padding: 15px; border-radius: 5px;
            background: rgba(0, 255, 136, 0.1); border-left: 4px solid #00ff88;
            display: none; font-size: 13px; color: #00ff88;
        }
    </style>
</head>
<body>

    <audio id="netflixSound">
        <source src="https://www.myinstants.com/media/sounds/netflix-ta-dum-sound-effect.mp3" type="audio/mpeg">
    </audio>

    <div class="sidebar">
        <div class="sidebar-header">MESAN Ω CORE</div>
        <button class="nav-btn">MESAN ENTERPRISE <span>◆</span></button>
        <button class="nav-btn">MESAN OMEGA <span>❖</span></button>
        <button class="nav-btn">SOPORTE Ω <span>▲</span></button>
        <button class="nav-btn red">🛡️ SISTEMA REPSE</button>
        <div style="margin-top: auto; font-size: 10px; color: #444;">V.2026.04.19</div>
    </div>

    <div class="main-content">
        <div class="questionnaire-box">
            <h2>Diagnóstico de Soberanía</h2>
            
            <div class="q-item">
                <label>RFC de la Empresa / Cliente</label>
                <input type="text" class="q-input" placeholder="Ej: ABC123456XYZ">
            </div>

            <div class="q-item">
                <label>Número de Empleados en Nómina</label>
                <input type="number" class="q-input" placeholder="0">
            </div>

            <div class="q-item">
                <label>Estatus Actual REPSE</label>
                <select class="q-input">
                    <option>Vigente</option>
                    <option>En Proceso</option>
                    <option>Vencido / Alerta</option>
                </select>
            </div>

            <button class="btn-action" onclick="activarDiagnostico()">Ejecutar Análisis Sentinel</button>

            <div id="sentinel-alert">
                <b>> PROCESANDO DATOS...</b><br>
                Sincronizando con Aether-Quantum Core.<br>
                Resultado: Inconsistencias detectadas en sector primario.
            </div>
        </div>
    </div>

    <script>
        function activarDiagnostico() {
            const audio = document.getElementById('netflixSound');
            const alert = document.getElementById('sentinel-alert');
            
            audio.play().catch(e => console.log("Audio listo"));
            
            alert.style.display = 'block';
            setTimeout(() => {
                alert.innerHTML = `✅ <b>ANÁLISIS COMPLETADO</b><br>
                                   Riesgo Fiscal: Moderado<br>
                                   Sugerencia: Revisar deducibilidad de servicios externos.`;
            }, 2000);
        }
    </script>
</body>
</html>
