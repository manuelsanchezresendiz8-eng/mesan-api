<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Omega</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#05070d;color:white;font-family:'Inter',sans-serif;}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;}
.hero h1{font-family:'Syne';font-size:clamp(32px,6vw,48px);line-height:1.1;}
.hero span{color:#00d4ff;}
.hero p{margin-top:15px;opacity:0.7;max-width:500px;}
textarea{margin-top:30px;width:100%;max-width:500px;height:100px;background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:15px;color:white;font-family:'Inter';font-size:13px;resize:none;}
button{margin-top:20px;background:linear-gradient(90deg,#00ff88,#00d4ff);border:none;padding:14px 30px;border-radius:10px;cursor:pointer;font-weight:bold;font-size:14px;}
.result{margin-top:40px;text-align:center;max-width:600px;width:100%;}
.metric{font-size:36px;margin:10px 0;}
.red{color:#ff4d4d;}
.impacto{font-size:18px;opacity:0.8;margin:8px 0;}
.causa{font-size:13px;opacity:0.6;margin-top:10px;line-height:1.6;}
.wa-btn{margin-top:20px;background:#25d366;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;color:white;font-weight:bold;font-size:13px;}
.loading{opacity:0.5;font-size:12px;margin-top:8px;}
.footer{text-align:center;padding:20px;font-size:10px;opacity:0.2;letter-spacing:2px;}
</style>
</head>
<body>
<div class="hero">
    <h1>Detecta riesgos antes de <span>perder dinero</span></h1>
    <p>IA estrategica para CEOs — diagnostico en 15 minutos</p>
    <textarea id="texto" placeholder="Ej: El IMSS bloqueo mis cuentas y no puedo pagar nomina..."></textarea>
    <button onclick="analizar()" id="btn">Analizar ahora</button>
    <div class="loading" id="loading" style="display:none">Analizando... puede tardar unos segundos</div>
    <div class="result" id="resultado"></div>
</div>
<div class="footer">MESAN Omega © 2026 — SOBERANIA EMPRESARIAL</div>
<script>
const API="https://mesan-api.onrender.com";
async function analizar(){
    const texto=document.getElementById("texto").value.trim();
    if(!texto){alert("Describe la situacion de tu empresa");return;}
    const btn=document.getElementById("btn");
    btn.disabled=true;btn.innerText="Analizando...";
    document.getElementById("loading").style.display="block";
    try{
        const res=await fetch(API+"/ai/diagnostico",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({texto:texto,respuestas:{}})
        });
        const d=await res.json();
        const waMsg=encodeURIComponent(d.whatsapp||"Hola, acabo de hacer el diagnostico MESAN Omega. Quiero resolver el riesgo detectado.");
        document.getElementById("resultado").innerHTML=
            '<div class="metric red">'+(d.riesgo||"--")+'</div>'+
            '<div class="impacto">$'+(d.impacto_min||0).toLocaleString()+' — $'+(d.impacto_max||0).toLocaleString()+' MXN</div>'+
            '<div class="causa">'+(d.causas||[]).slice(0,2).join("<br>")||""+'</div>'+
            '<br><button class="wa-btn" onclick="window.open(\'https://wa.me/526861629643?text='+waMsg+'\',\'_blank\')">Resolver por WhatsApp</button>';
    }catch(e){
        alert("Error de conexion. Intenta de nuevo.");
    }finally{
        btn.disabled=false;btn.innerText="Analizar ahora";
        document.getElementById("loading").style.display="none";
    }
}
</script>
</body>
</html>
