:root{--n:#05060a;--s:#0c0d12;--g:#C5A059;--t:#e2e0db;--d:rgba(226,224,219,.45);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--n);color:var(--t);font-family:'Inter',sans-serif;font-weight:300;line-height:1.8;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:72px;padding:0 72px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,6,10,.94);backdrop-filter:blur(20px);border-bottom:1px solid rgba(197,160,89,.1);}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:6px;}
.logo em{font-style:normal;color:var(--g);}
.nav-r{display:flex;align-items:center;gap:48px;}
.nav-r a{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--d);text-decoration:none;transition:color .3s;}
.nav-r a:hover{color:var(--t);}
.nav-btn{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--n);background:var(--g);text-decoration:none;padding:10px 28px;transition:opacity .3s;}
.nav-btn:hover{opacity:.85;}
