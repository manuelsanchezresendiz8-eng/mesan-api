<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω</title>
    <style>
        :root {
            /* Colores exactos de la imagen premium */
            --electric-cyan: #00f2ff; 
            --deep-black-blue: #010812;
            --aura-glow: rgba(0, 242, 255, 0.7);
            --text-gray: #8ba2ad;
        }

        body {
            margin: 0;
            background-color: var(--deep-black-blue);
            /* Gradiente de profundidad idéntico */
            background: radial-gradient(circle at 50% 35%, #081b33 0%, #010812 100%);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-layout {
            width: 100%;
            max-width: 390px;
            padding: 40px 25px;
            text-align: center;
        }

        /* LOGO MESAN - Color y Espaciado Exacto */
        .brand-header {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 7px;
            margin-bottom: 60px;
            color: #ffffff;
            text-transform: uppercase;
        }
        .brand-header span { 
            color: var(--electric-cyan); 
            text-shadow: 0 0 15px var(--aura-glow); 
        }

        /* TÍTULOS - El "Soberanía" debe resaltar con fuego azul */
        .hero-title {
            font-size: 36px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }
        .hero-title .soberania {
            color: var(--electric-cyan);
            /* Doble resplandor para intensidad total */
            text-shadow: 0 0 10px var(--aura-glow), 0 0 30px rgba(0, 242, 255, 0.4);
            display: block;
            margin: 5px 0;
        }

        .hero-desc {
            font-size: 14px;
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 45px;
            font-weight: 400;
        }

        /* BOTÓN DE DIAGNÓSTICO */
        .btn-main {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 2.5px solid var(--electric-cyan);
            color: var(--electric-cyan);
            font-weight: 800;
            letter-spacing: 3px;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            margin-bottom: 50px;
            cursor: pointer;
        }

        /* TARJETAS GLASSMORPISM */
        .glass-card {
            background: rgba(10, 25, 47, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.25);
            border-radius: 8px;
            padding: 22px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            text-align: left;
        }
        .glass-card h3 { margin: 0; font-size: 15px; letter-spacing: 1px; color: #ffffff; }
        .glass-card p { margin: 5px 0 0; font-size: 11px; color: var(--text-gray); }

        /* PANEL DE ALERTA - Rojo Impacto */
        .alert-panel {
            background: rgba(255, 49, 49, 0.07);
            border-left: 5px solid #ff3131;
            border-radius: 4px;
            padding: 25px;
            text-align: left;
            margin-top: 35px;
        }
        .alert-panel h4 { 
            color: #ff3131; 
            margin: 0; 
            font-size: 12px; 
            font-weight: 900; 
            letter-spacing: 1.5px;
        }
        .alert-panel .amount { 
            font-size: 32px; 
            font-weight: 900; 
            color: #ffffff; 
            margin: 12px 0; 
        }
    </style>
</head>
<body>

<div class="phone-layout">
    <div class="brand-header">MESAN <span>Ω</span></div>

    <h1 class="hero-title">
        Arquitectura y<br>
        <span class="soberania">Soberanía</span>
        Empresarial
    </h1>

    <p class="hero-desc">Análisis predictivo de vulnerabilidades diseñado para la toma de decisiones nivel C-Suite.</p>

    <button class="btn-main">Iniciar Diagnóstico</button>

    <div class="glass-card">
        <div>
            <h3>MESAN ENTERPRISE</h3>
            <p>Auditoría de Cumplimiento Total</p>
        </div>
        <span style="color:var(--electric-cyan); font-size: 18px;">◆</span>
    </div>

    <div class="alert-panel">
        <h4>🚨 EXPOSICIÓN DETECTADA</h4>
        <div style="color: var(--text-gray); font-size: 13px; margin-top: 10px;">Riesgo estimado en estructura:</div>
        <div class="amount">$450,000 MXN</div>
        <div style="color: #4b5a63; font-size: 10px; font-weight: bold;">Validación directa STPS/SAT ejecutada.</div>
    </div>
</div>

</body>
</html>
