<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - SISTEMA PREMIER</title>
    <style>
        /* FONTO ESTELAR Y CONFIGURACIÓN BASE */
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000 url('https://i.ibb.co/vBPr0P5/espacio-bg.jpg') no-repeat center center;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%; max-width: 400px;
            text-align: center; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* LOGO MESAN Ω */
        .logo {
            font-size: 1.2rem; font-weight: bold; letter-spacing: 3px;
            margin-bottom: 60px;
        }
        .logo span { color: #00c3ff; }

        /* TÍTULOS CON LOS COLORES DE LA IMAGEN */
        .titulo {
            font-size: 2.3rem; font-weight: bold; line-height: 1.1;
            margin-bottom: 20px;
        }
        .highlight { color: #00c3ff; }

        .subtitulo {
            font-size: 0.9rem; color: #b0b0b0;
            line-height: 1.6; margin-bottom: 50px;
            padding: 0 30px;
        }

        /* BOTÓN EXACTO: INICIAR DIAGNÓSTICO */
        .btn-main {
            width: 85%;
            padding: 18px 0;
            background: transparent;
            border: 2px solid #00c3ff;
            color: #00c3ff;
            font-size: 1rem; font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 195, 255, 0.2);
        }

        .btn-main:active {
            background: rgba(0, 195, 255, 0.1);
            transform: scale(0.98);
        }

        /* VENTANA DE ALERTA (SENTINEL CORE) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .alert-box {
            background: #2b2e33;
            width: 80%; max-width: 320px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .alert-box h3 { margin: 0 0 10px 0; font-size: 1.2rem; font-weight: 500; }
        .alert-box p { color: #d0d0d0; margin-bottom: 30px; font-size: 0.95rem; }

        .alert-btn {
            float: right; color: #00c3ff;
            font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 0.9rem;
        }

        .footer {
            position: absolute; bottom: 30px;
            font-size: 0.6rem; color: #555; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">MESAN <span>Ω</span></div>

    <div class="titulo">
        Arquitectura y<br><span class="highlight">Soberanía</span><br>Empresarial
    </div>

    <div class="subtitulo">
        Modelos matemáticos avanzados diseñados para detectar vulnerabilidades fiscales y laborales antes de que se conviertan en pasivos críticos.
    </div>

    <button class="btn-main" onclick="activarSentinel()">INICIAR DIAGNÓSTICO</button>

    <div class="footer">MESAN Ω © 2026</div>
</div>

<div class="overlay" id="sentinelOverlay">
    <div class="alert-box">
        <h3>mesanomega.com dice</h3>
        <p>Sincronizando con Sentinel Core...</p>
        <div class="alert-btn" onclick="cerrarSentinel()">Aceptar</div>
    </div>
</div>

<script>
    function activarSentinel() {
        document.getElementById('sentinelOverlay').style.display = 'flex';
    }
    function cerrarSentinel() {
        document.getElementById('sentinelOverlay').style.display = 'none';
        // Aquí puedes redirigir o mostrar los resultados del riesgo de $450k
    }
</script>

</body>
</html>
