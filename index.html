<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Intelligence Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#050816;
    color:#fff;
    font-family:'Inter',sans-serif;
}

/* HERO */
.hero{
    padding:80px 20px;
    text-align:center;
}

.logo{
    font-size:22px;
    letter-spacing:3px;
    font-weight:800;
    margin-bottom:10px;
}

.tag{
    font-size:12px;
    color:#6b7280;
    letter-spacing:3px;
    margin-bottom:40px;
}

h1{
    font-size:32px;
    font-weight:800;
    margin-bottom:16px;
}

p{
    color:#9ca3af;
    max-width:500px;
    margin:auto;
}

/* INPUT */
.box{
    margin-top:40px;
}

textarea{
    width:100%;
    max-width:500px;
    height:100px;
    background:#0b1222;
    border:1px solid #1f2937;
    color:#fff;
    padding:12px;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:14px 30px;
    background:#06b6d4;
    border:none;
    color:#000;
    font-weight:700;
    cursor:pointer;
}

/* SCAN */
.scan{
    margin-top:40px;
    display:none;
}

.bar{
    width:300px;
    height:6px;
    background:#1f2937;
    margin:20px auto;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    background:#06b6d4;
    animation:scan 2s forwards;
}

@keyframes scan{
    to{width:100%}
}

.log{
    font-size:12px;
    color:#6b7280;
}

/* RESULT */
.result{
    display:none;
    margin-top:40px;
}

.money{
    font-size:36px;
    color:#ef4444;
    font-weight:800;
}

.risk{
    margin-top:10px;
    font-size:18px;
}

/* CTA */
.cta{
    margin-top:30px;
}

.cta button{
    padding:14px 30px;
    background:#ef4444;
    border:none;
    color:#fff;
    font-weight:700;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">

<div class="logo">MESAN Ω</div>
<div class="tag">INTELLIGENCE ENGINE</div>

<h1>Detecta dónde estás perdiendo dinero</h1>
<p>Analizamos tu operación en segundos y proyectamos pérdidas reales en MXN.</p>

<div class="box">
<textarea id="input" placeholder="Ejemplo: IMSS bloqueó cuentas, empleados sin registrar..."></textarea>
<br>
<button class="btn" onclick="analizar()">ANALIZAR</button>
</div>

<div class="scan" id="scan">
<div class="log">Inicializando motor...</div>
<div class="bar"><div class="fill"></div></div>
<div class="log">Cruzando datos SAT / IMSS...</div>
</div>

<div class="result" id="result">
<div class="money" id="money">$0 MXN</div>
<div class="risk" id="risk">RIESGO ALTO</div>

<div class="cta">
<button onclick="alert('Aquí conectas Stripe o WhatsApp')">
RESOLVER ESTO AHORA
</button>
</div>
</div>

</div>

<script>
function analizar(){
    document.getElementById("scan").style.display="block";

    setTimeout(()=>{
        document.getElementById("scan").style.display="none";
        document.getElementById("result").style.display="block";

        document.getElementById("money").innerText="$230,000 MXN";
    },2000);
}
</script>

</body>
</html>
