<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω | Diagnóstico Unificado</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010508;
            --panel: #06121D;
            --accent: #00BFFF;
            --border: #1A3B61;
            --text: #FFFFFF;
            --dim: #5E7A94;
            --glow: rgba(0, 191, 255, 0.25);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 400px; width: 100%; }

        /* HEADER IDENTIDAD */
        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .main-title span { color: var(--accent); }

        /* BOTÓN DE ACCIÓN */
        .btn-main {
            border: 1px solid var(--accent);
            background: rgba(0, 191, 255, 0.05);
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            padding: 15px;
            text-align: center;
            border-radius: 4px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px var(--glow);
            margin-bottom: 30px;
            cursor: pointer;
        }

        /* TARJETAS DE SELECCIÓN */
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 6px;
            margin-bottom: 12px;
            position: relative;
            cursor: pointer;
        }

        .card.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--glow);
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .card-subtitle {
            color: var(--dim);
            font-size: 11px;
        }

        /* ICONOS DE ESTADO */
        .status-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: var(--accent);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        /* WHATSAPP FLOTANTE */
        .whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 20px;
            color: var(--accent);
            font-size: 12px;
            background: var(--bg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">MESAN <span style="color:var(--accent)">Ω</span></div>
        
        <h1 class="main-title">Arquitectura y <br><span>Soberanía Empresarial</span></h1>

        <div class="btn-main">INICIAR DIAGNÓSTICO</div>

        <div class="card">
            <div class="card-title">MESAN ENTERPRISE</div>
            <div class="card-subtitle">Auditoría completa</div>
            <div class="status-icon"></div>
        </div>

        <div class="card active">
            <div class="card-title" style="color:var(--accent)">MESAN Ω</div>
            <div class="card-subtitle">Predicción avanzada</div>
            <div class="status-icon" style="background:#8A2BE2"></div>
        </div>
    </div>
    
    <div class="whatsapp">WhatsApp</div>
</body>
</html>
