<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - Intelligence Engine</title>
    <style>
        :root {
            --accent-cyan: #00d4ff;
            --bg-deep: #020617;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --border-tech: rgba(0, 212, 255, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top, #0c1e35 0%, #020617 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-view {
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
        }

        /* HEADER EJECUTIVO */
        .brand {
            font-size: 14px;
            letter-spacing: 6px;
            color: #94a3b8;
            margin-bottom: 40px;
            text-align: center;
        }
        .brand span { color: var(--accent-cyan); text-shadow: 0 0 10px var(--accent-cyan); }

        .headline {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
            text-align: left;
        }
        .headline em { 
            font-style: normal; 
            color: var(--accent-cyan);
            background: linear-gradient(90deg, #00d4ff, #0082ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-headline {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 35px;
            text-align: left;
        }

        /* BOTÓN DE ALTO IMPACTO */
        .btn-action {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1);
        }
        .btn-action:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
        }

        /* TARJETAS DE MÓDULOS */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--border-tech);
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .card-info b { display: block; font-size: 13px; letter-spacing: 1px; color: #f1f5f9; }
        .card-info span { font-size: 11px; color: #64748b; text-transform: uppercase; }
        
        .status-icon { color: var(--accent-cyan); font-size: 18px; }

        /* SECCIÓN DE ALERTA */
        .alert-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(220, 38, 38, 0.05);
            border-left: 3px solid #ef4444;
            border-radius: 4px;
        }
        .alert-title { color: #ef4444; font-size: 12px; font-weight: 900; letter-spacing: 1px; margin-bottom: 10px; }
        .alert-val { font-size: 24px; font-weight: 700; color: #fff; margin: 10px 0; }
    </style>
</head>
<body>

<div class="phone-view">
    <div class="brand">MESAN <span>Ω</span></div>

    <h1 class="headline">Arquitectura y<br><em>Soberanía</em></h1>
    <p class="sub-headline">Análisis predictivo de vulnerabilidades fiscales y laborales para toma de decisiones nivel C-Suite.</p>

    <button class="btn-action">Iniciar Diagnóstico</button>

    <div class="card">
        <div class="card-info">
            <span>Core Intelligence</span>
            <b>MESAN ENTERPRISE</b>
        </div>
        <div class="status-icon">⌬</div>
    </div>

    <div class="alert-box">
        <div class="alert-title">⚠️ EXPOSICIÓN DETECTADA</div>
        <div style="color: #94a3b8; font-size: 13px;">Riesgo estimado en estructura operativa:</div>
        <div class="alert-val">$450,000 MXN</div>
        <small style="color: #475569;">Basado en validación STPS/SAT directa.</small>
    </div>
</div>

</body>
</html>
