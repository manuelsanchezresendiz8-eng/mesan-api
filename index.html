<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω | Inteligencia Empresarial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #02060a; --panel: #0a1118; --accent: #00f3ff;
            --magenta: #ff0055; --text: #e2e8f0; --dim: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(1.8rem, 5vw, 2.8rem); margin-bottom: 15px; line-height: 1.1; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .btn-primary { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 15px 30px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; width: 100%;
        }
        .btn-primary:hover { background: var(--accent); color: var(--bg); }
        #resultado { margin-top: 30px; display: none; padding: 20px; border: 1px solid var(--accent); border-radius: 8px; }
        #resultado.show { display: block; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 10px; border-radius: 50px; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<section class="hero container">
    <div class="hero-tag">// Sistema de Inteligencia Empresarial</div>
    <h1>MESAN Ω</h1>
    <form id="diagnostico-form">
        <input type="text" id="nombre" placeholder="Nombre completo" required style="width:100%; padding:12px; margin-bottom:10px; background:#111; border:1px solid #333; color:white;">
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; background:#111; border:1px solid #333; color:white;">
        <input type="tel" id="tel" placeholder="WhatsApp (10 dígitos)" required style="width:100%; padding:12px; margin-bottom:20px; background:#111; border:1px solid #333; color:white;">
        
        <div id="preguntas_placeholder"></div>

        <button type="button" id="btn-diagnostico" class="btn-primary" onclick="ejecutar()">
            <span>EJECUTAR DIAGNÓSTICO</span>
        </button>
    </form>

    <div id="resultado">
        <h2 id="clasificacion"></h2>
        <p id="impacto-min"></p>
        <p id="impacto-max"></p>
        <p id="anual-line"></p>
        <ul id="soluciones"></ul>
        <a id="btn-agenda" href="#" target="_blank" class="btn-primary" style="display:block; margin-top:20px; text-align:center;">🚨 AGENDA TU LLAMADA GRATUITA DE 15 MIN</a>
    </div>
</section>

<a href="https://wa.me/526861629643" id="btn-wa" target="_blank" class="wa-float">WhatsApp</a>

<script>
async function ejecutar() {
    const btn = document.getElementById("btn-diagnostico");
    const div = document.getElementById("resultado");
    const nombre = document.getElementById("nombre").value.trim();
    const email = document.getElementById("email").value.trim();
    const telefono = document.getElementById("tel").value.trim();

    if (!nombre || !telefono) {
        alert("Por favor completa nombre y teléfono.");
        return;
    }

    btn.disabled = true;
    btn.querySelector("span").textContent = "GENERANDO... ⏳";

    try {
        const response = await fetch('https://mesan-api.onrender.com/enterprise', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nombre: nombre,
                email: email,
                telefono: telefono
            })
        });

        const data = await response.json();

        const resultado = data.resultado || data;
        const cl = data.clasificacion || resultado?.clasificacion || "N/A";
        const score = resultado?.diagnostico?.score || data.score || 0;
        const impacto = data.impacto || resultado?.impacto || {};
        const impMin = impacto.impacto_min || 0;
        const impMax = impacto.impacto_max || 0;
        const soluciones = data.soluciones || resultado?.soluciones || [];

        document.getElementById("clasificacion").textContent = "RESULTADO: " + cl;
        document.getElementById("clasificacion").style.color = cl === "ALTO" ? "#ff3b5c" : cl === "MEDIO" ? "#ffaa00" : "#00e5a0";

        document.getElementById("impacto-min").textContent = "Exposición mínima: $" + impMin.toLocaleString() + " MXN";
        document.getElementById("impacto-max").textContent = "Exposición máxima: $" + impMax.toLocaleString() + " MXN";
        document.getElementById("anual-line").textContent = "Riesgo estimado: hasta $" + impMax.toLocaleString() + " MXN";

        const lista = document.getElementById("soluciones");
        lista.innerHTML = "";
        soluciones.forEach(s => {
            const li = document.createElement("li");
            li.textContent = typeof s === "string" ? s : `${s.area || ""} — ${s.accion || ""}`;
            lista.appendChild(li);
        });

        const msg = encodeURIComponent(
            "Hola, hice el diagnóstico MESAN-Ω.\n" +
            "Cliente: " + nombre + "\n" +
            "Teléfono: " + telefono + "\n" +
            "Resultado: " + cl + " (score " + score + ")"
        );

        const waUrl = "https://wa.me/526861629643?text=" + msg;
        document.getElementById("btn-wa").href = waUrl;
        document.getElementById("btn-agenda").href = waUrl;

        div.classList.add("show");
        div.scrollIntoView({ behavior: "smooth" });

        btn.disabled = false;
        btn.querySelector("span").textContent = "DIAGNÓSTICO COMPLETADO ✅";

    } catch (e) {
        console.error(e);
        btn.disabled = false;
        btn.querySelector("span").textContent = "Error - Reintentar";
    }
}
</script>
</body>
</html>
