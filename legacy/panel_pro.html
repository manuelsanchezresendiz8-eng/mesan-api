<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Panel Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #05070A;
    --panel: #080E15;
    --panel2: #0A1520;
    --accent: #00E5FF;
    --text: #00B8CC;
    --dim: #008B99;
    --border: #008B99;
    --border-glow: rgba(0,229,255,0.2);
    --danger: #FF3B30;
    --warning: #FF8C00;
    --success: #00FF9C;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: #05070A;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 80px 20px 40px;
}

.nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    background: rgba(5,7,10,0.97);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    box-sizing: border-box;
    z-index: 100;
}

.nav a {
    color: var(--dim);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 2px;
    transition: 0.3s;
}

.nav a:hover { color: var(--accent); }

.container { max-width: 500px; margin: 0 auto; }

h2 {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 30px;
    text-align: center;
    text-transform: uppercase;
    text-shadow: 0 0 6px rgba(0,229,255,0.5), 0 0 16px rgba(0,229,255,0.25);
}

.field { margin-bottom: 16px; }

.field label {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
}

.field input,
.field select {
    width: 100%;
    padding: 12px 14px;
    background: linear-gradient(145deg, #080E15, #0A1520);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    border-radius: 6px;
    outline: none;
    transition: 0.3s;
    box-shadow: inset 0 0 8px rgba(0,229,255,0.04);
}

.field input:focus,
.field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--border-glow);
}

.field select option { background: var(--panel); color: var(--text); }

.btn-main {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
    margin-top: 8px;
    box-shadow: 0 0 12px rgba(0,229,255,0.12);
}

.btn-main:hover {
    background: rgba(0,229,255,0.06);
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
}

.result-card {
    display: none;
    margin-top: 25px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 25px;
    box-shadow: 0 0 20px rgba(0,229,255,0.05);
}

.result-card.visible { display: block; }

.nivel {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 5px;
    text-transform: uppercase;
    text-shadow: 0 0 6px rgba(0,229,255,0.4);
}

.decision {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
}

.metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
}

.metric {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
}

.metric-label {
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 4px;
}

.metric-value {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--accent);
}

.metric-value.ok { color: var(--success); }
.metric-value.warn { color: var(--warning); }
.metric-value.alert { color: var(--danger); }

.precios {
    padding-top: 15px;
    border-top: 1px solid var(--border);
}

.precio-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--dim);
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,139,153,0.2);
}

.precio-row:last-child { border-bottom: none; }
.precio-row span:last-child { color: var(--accent); font-weight: 600; font-family: 'Orbitron', monospace; font-size: 12px; }

.footer {
    text-align: center;
    margin-top: 40px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--dim);
    opacity: 0.4;
    letter-spacing: 4px;
}
</style>
</head>
<body>

<div class="nav">
    <div>MESAN Ω — MOTOR FINANCIERO</div>
    <a href="/crm.html">← CRM</a>
</div>

<div class="container">

    <h2>Panel Pro</h2>

    <div class="field">
        <label>Precio del servicio ($)</label>
        <input id="precio" type="number" placeholder="27200">
    </div>
    <div class="field">
        <label>Número de empleados</label>
        <input id="empleados" type="number" placeholder="1" value="1">
    </div>
    <div class="field">
        <label>Zona</label>
        <select id="zona">
            <option value="general">General</option>
            <option value="frontera">Frontera (BC, Son, Chih)</option>
        </select>
    </div>

    <button class="btn-main" onclick="diagnostico()">EJECUTAR DIAGNÓSTICO</button>

    <div class="result-card" id="resultado">
        <div class="nivel" id="nivel">—</div>
        <div class="decision" id="decision">—</div>
        <div class="metrics">
            <div class="metric"><div class="metric-label">Ingreso</div><div class="metric-value" id="ingreso">—</div></div>
            <div class="metric"><div class="metric-label">Costo Total</div><div class="metric-value" id="costo">—</div></div>
            <div class="metric"><div class="metric-label">Utilidad</div><div class="metric-value" id="utilidad">—</div></div>
            <div class="metric"><div class="metric-label">Margen</div><div class="metric-value" id="margen">—</div></div>
            <div class="metric"><div class="metric-label">Reserva</div><div class="metric-value" id="reserva">—</div></div>
            <div class="metric"><div class="metric-label">Salario Base</div><div class="metric-value" id="salario">—</div></div>
        </div>
        <div class="precios">
            <div class="precio-row"><span>Precio mínimo</span><span id="p-min">—</span></div>
            <div class="precio-row"><span>Precio cierre</span><span id="p-cierre">—</span></div>
            <div class="precio-row"><span>Precio ideal</span><span id="p-ideal">—</span></div>
        </div>
    </div>

</div>

<div class="footer">MESAN Ω © 2026 — MOTOR FINANCIERO</div>

<script>
const API = "https://mesan-api.onrender.com";

async function diagnostico() {
    const precio    = parseFloat(document.getElementById("precio").value);
    const empleados = parseInt(document.getElementById("empleados").value);
    const zona      = document.getElementById("zona").value;

    if (!precio || !empleados) { alert("Completa todos los campos"); return; }

    const btn = document.querySelector(".btn-main");
    btn.innerText = "PROCESANDO...";
    btn.disabled = true;

    try {
        const res = await fetch(API + "/pro/diagnostico-financiero", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ precio_cliente: precio, empleados, zona })
        });

        const r = await res.json();
        const f = r.financiero || {};
        const p = r.precios    || {};
        const d = r.decision   || {};

        document.getElementById("resultado").classList.add("visible");
        document.getElementById("nivel").innerText    = "● " + (r.clasificacion || "—");
        document.getElementById("decision").innerText = (d.decision||"") + (d.mensaje ? " — " + d.mensaje : "");

        const utilidad = f.utilidad || 0;
        document.getElementById("ingreso").innerText  = "$" + (f.ingreso||0).toLocaleString();
        document.getElementById("costo").innerText    = "$" + (f.costo_total||0).toLocaleString();
        document.getElementById("utilidad").className = "metric-value " + (utilidad > 0 ? "ok" : "alert");
        document.getElementById("utilidad").innerText = "$" + utilidad.toLocaleString();
        document.getElementById("margen").innerText   = (f.margen||0) + "%";
        document.getElementById("reserva").innerText  = "$" + (f.reserva||0).toLocaleString();
        document.getElementById("salario").innerText  = "$" + (f.salario||0).toLocaleString();
        document.getElementById("p-min").innerText    = "$" + (p.precio_minimo||0).toLocaleString();
        document.getElementById("p-cierre").innerText = "$" + (p.precio_cierre||0).toLocaleString();
        document.getElementById("p-ideal").innerText  = "$" + (p.precio_objetivo||0).toLocaleString();

        document.getElementById("resultado").scrollIntoView({ behavior:"smooth", block:"start" });

    } catch(e) {
        alert("Error de conexión");
    } finally {
        btn.innerText = "EJECUTAR DIAGNÓSTICO";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
