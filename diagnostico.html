<style>
:root {
    --bg: #010508;               /* Negro Medianoche */
    --panel: #06121D;            /* Azul Marino Profundo */
    --accent: #00BFFF;           /* Cian Eléctrico */
    --text: #FFFFFF;             /* Blanco Puro */
    --dim: #5E7A94;              /* Gris Azu-leado */
    --border: #1A3B61;           /* Azul Oscuro Metálico */
    --border-glow: rgba(0, 191, 255, 0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
}

.nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text); /* Texto de navegación en blanco */
    background: rgba(1, 5, 8, 0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    box-sizing: border-box;
    z-index: 100;
}

.nav a {
    color: var(--dim);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 2px;
    transition: 0.3s;
}

.nav a:hover { color: var(--accent); }

.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 100px 20px 60px;
}

.hero-tag {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 10px;
    text-transform: uppercase;
}

h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    margin-bottom: 12px;
    line-height: 1.1;
    color: var(--accent);
    letter-spacing: 2px;
}

.subtitulo {
    color: var(--text);
    margin-bottom: 35px;
    font-size: 13px;
    line-height: 1.7;
    font-weight: 300;
}

.form-group { margin-bottom: 16px; }

.form-group label {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
}

input, select {
    width: 100%;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    border-radius: 6px;
    transition: 0.3s;
    outline: none;
    box-sizing: border-box;
}

input::placeholder { color: var(--dim); opacity: 0.7; }

input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--border-glow);
}

select option { background: var(--panel); color: var(--text); }

.btn-primary {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 15px 30px;
    cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s;
    width: 100%;
    margin-top: 15px;
    border-radius: 6px;
}

.btn-primary:hover {
    border-color: var(--accent);
    background: rgba(0, 191, 255, 0.05);
    box-shadow: 0 0 20px var(--border-glow);
}

.tipo-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 18px 20px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    text-align: left;
    transition: all 0.3s;
    border-radius: 6px;
    display: block;
}

.tipo-btn:hover {
    border-color: var(--accent);
}

.tipo-btn.selected {
    border-color: var(--accent);
    background: rgba(0, 191, 255, 0.03);
    box-shadow: 0 0 15px var(--border-glow);
}

.tipo-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
}

.tipo-desc {
    font-size: 11px;
    color: var(--dim);
    line-height: 1.4;
    font-weight: 300;
}

.seccion-titulo {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    margin: 28px 0 14px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    text-transform: uppercase;
}

#resultado {
    margin-top: 30px;
    display: none;
    padding: 25px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 8px;
}

#resultado.show { display: block; }

.score-big {
    font-family: 'Orbitron', monospace;
    font-size: 4rem;
    color: var(--accent);
    text-align: center;
    letter-spacing: 5px;
}

.clasificacion {
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    margin: 10px 0 20px;
    letter-spacing: 4px;
    color: var(--accent);
}

.impacto-box {
    background: rgba(26, 59, 97, 0.15);
    border: 1px solid var(--border);
    padding: 20px;
    margin: 15px 0;
    text-align: center;
    border-radius: 6px;
}

.impacto-val {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    color: #FF3B30; /* Color de riesgo/pérdida mantenido para impacto */
}

.impacto-lbl {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-top: 4px;
    text-transform: uppercase;
}

.btn-agenda {
    display: block;
    text-align: center;
    padding: 16px;
    margin-top: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

.btn-agenda:hover {
    border-color: var(--accent);
    background: rgba(0, 191, 255, 0.08);
    box-shadow: 0 0 20px var(--border-glow);
}

.btn-wa {
    display: block;
    text-align: center;
    padding: 13px;
    margin-top: 10px;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    font-size: 11px;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

.btn-wa:hover { border-color: var(--accent); color: var(--accent); }

.legal {
    margin-top: 40px;
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    line-height: 1.7;
}

.wa-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    color: #25D366; /* Verde original WhatsApp por confianza */
    text-decoration: none;
    border: 1px solid rgba(37, 211, 102, 0.3);
    padding: 10px 15px;
    border-radius: 50px;
    background: rgba(1, 5, 8, 0.9);
    font-size: 11px;
    letter-spacing: 1px;
    transition: 0.3s;
    z-index: 200;
}

.footer {
    text-align: center;
    margin-top: 50px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--dim);
    opacity: 0.4;
    letter-spacing: 4px;
}
