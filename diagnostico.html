<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω | Diagnóstico Empresarial</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #020709;
    --surface: #040D14;
    --panel: #071520;
    --accent: #00C8FF;
    --border: #0A2035;
    --border2: #123050;
    --text: #BFE9FF;
    --dim: #4A7A9B;
    --dim2: #2A5A7B;
    --alert: #FF3B30;
    --warn: #FF9500;
    --ok: #00D09E;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

/* NAV */
.nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:0 40px;height:64px;background:rgba(2,7,9,0.7);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);}
.nav-logo{font-family:'Syne';font-weight:800;color:var(--accent);letter-spacing:3px;text-decoration:none;}
.nav-back{font-size:12px;color:var(--dim);text-decoration:none;}

/* CONTAINER */
.container{max-width:620px;margin:0 auto;padding:88px 24px 60px;}

/* HEADER */
.page-title{
    font-family:'Syne';
    font-size:clamp(28px,5vw,42px);
    font-weight:800;
    color:var(--accent);
    letter-spacing:2px;
    text-transform:uppercase;
    text-shadow:0 0 10px rgba(0,200,255,0.4),0 0 20px rgba(0,200,255,0.2);
    margin-bottom:12px;
}
.page-title span{color:var(--accent);opacity:0.85;}
.page-sub{font-size:14px;color:var(--dim);margin-bottom:36px;}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:7px;display:block;}

.form-input,.form-select{
    width:100%;
    padding:13px 16px;
    background:rgba(7,21,32,0.7);
    border:1px solid rgba(18,48,80,0.6);
    border-radius:8px;
    color:var(--text);
    outline:none;
}
.form-input:focus,.form-select:focus{
    border-color:var(--accent);
    box-shadow:0 0 12px rgba(0,200,255,0.2);
}

/* CARDS */
.tipo-card{
    background:rgba(4,13,20,0.7);
    border:1px solid rgba(10,32,53,0.6);
    border-radius:12px;
    padding:20px;
    cursor:pointer;
    margin-bottom:10px;
}
.tipo-card.selected{
    border-color:var(--accent);
    box-shadow:0 0 20px rgba(0,200,255,0.2);
}

/* BTN */
.btn-ejecutar{
    width:100%;
    padding:16px;
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
    border-radius:10px;
    cursor:pointer;
}
.btn-ejecutar:hover{
    background:rgba(0,200,255,0.08);
}

/* RESULT */
.score-num{
    color:var(--accent);
    text-shadow:0 0 20px rgba(0,200,255,0.3);
}
</style>
</head>
<body>

<nav class="nav">
<a href="/" class="nav-logo">MESAN Ω</a>
<a href="/" class="nav-back">← INICIO</a>
</nav>

<div class="container">

<h1 class="page-title">MESAN <span>Omega</span></h1>
<p class="page-sub">Responde y detecta tu riesgo empresarial.</p>

<div class="form-group">
<label class="form-label">Empresa</label>
<input class="form-input">
</div>

<div class="form-group">
<label class="form-label">Email</label>
<input class="form-input">
</div>

<div class="form-group">
<label class="form-label">Teléfono</label>
<input class="form-input">
</div>

<div class="tipo-card">PRESTO SERVICIOS</div>
<div class="tipo-card">SUBCONTRATO</div>
<div class="tipo-card">NUEVA EMPRESA</div>

<button class="btn-ejecutar">EJECUTAR DIAGNÓSTICO</button>

</div>

</body>
</html>
