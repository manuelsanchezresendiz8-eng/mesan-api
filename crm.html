<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Intelligence Command</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04060A;
  --bg1:#060C14;
  --bg2:#08121E;
  --bg3:#0A1828;
  --a:#00E5FF;
  --ag:rgba(0,229,255,0.08);
  --ah:rgba(0,229,255,0.15);
  --r:#FF3B3B;
  --rg:rgba(255,59,59,0.1);
  --w:#FF9500;
  --wg:rgba(255,149,0,0.1);
  --g:#00D09E;
  --gg:rgba(0,208,158,0.1);
  --b:rgba(0,229,255,0.07);
  --bh:rgba(0,229,255,0.14);
  --t:#C8F0FF;
  --t2:#4A8FA8;
  --t3:#1E4A5F;
  --f:'DM Sans',sans-serif;
  --fm:'DM Mono',monospace;
  --fs:'Syne',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;-webkit-font-smoothing:antialiased;}

body{
  background:var(--bg);
  color:var(--t);
  font-family:var(--f);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(0,229,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 85% 75%, rgba(0,229,255,0.03) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

/* ══ LOGIN ══ */
#L{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
}

.lw{
  width:420px;
  background:linear-gradient(145deg,var(--bg2),var(--bg));
  border:1px solid var(--b);
  border-radius:2px;
  padding:52px 44px;
  position:relative;
  overflow:hidden;
}

.lw::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--a),transparent);
  opacity:0.6;
}

.lw::after{
  content:'';
  position:absolute;
  top:-50%;left:-50%;
  width:200%;height:200%;
  background:radial-gradient(circle at center,rgba(0,229,255,0.03),transparent 60%);
  animation:glow 6s ease-in-out infinite alternate;
}

@keyframes glow{
  from{opacity:0.5;transform:scale(0.9);}
  to{opacity:1;transform:scale(1.1);}
}

.ll{
  display:flex;align-items:center;gap:12px;
  margin-bottom:36px;
  position:relative;z-index:1;
}

.lm{
  width:38px;height:38px;
  border:1px solid var(--a);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fm);font-size:15px;font-weight:500;
  color:var(--a);
  position:relative;
}

.lm::before,.lm::after{
  content:'';position:absolute;
  width:6px;height:6px;
  border-color:var(--a);border-style:solid;
}
.lm::before{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.lm::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}

.ln{font-family:var(--fs);font-size:16px;font-weight:700;color:var(--a);letter-spacing:2px;}
.ls{font-size:9px;color:var(--t3);letter-spacing:3px;margin-top:1px;}

.lt{
  font-family:var(--fs);
  font-size:22px;font-weight:700;
  color:var(--t);letter-spacing:-0.5px;
  margin-bottom:6px;
  position:relative;z-index:1;
}

.ld{font-size:12px;color:var(--t2);margin-bottom:28px;line-height:1.5;position:relative;z-index:1;}

.llb{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;display:block;position:relative;z-index:1;}

.li{
  width:100%;padding:12px 14px;
  background:rgba(0,229,255,0.04);
  border:1px solid var(--b);
  border-radius:1px;
  color:var(--a);
  font-family:var(--fm);font-size:12px;
  outline:none;margin-bottom:14px;
  letter-spacing:1px;
  transition:all 0.2s;
  position:relative;z-index:1;
}

.li:focus{border-color:rgba(0,229,255,0.4);background:rgba(0,229,255,0.06);}

.lb{
  width:100%;padding:13px;
  background:transparent;
  border:1px solid var(--a);
  color:var(--a);
  font-family:var(--fs);font-size:11px;font-weight:700;
  cursor:pointer;letter-spacing:2px;text-transform:uppercase;
  transition:all 0.2s;
  position:relative;z-index:1;
}

.lb:hover{background:var(--ah);box-shadow:0 0 20px rgba(0,229,255,0.15);}

/* ══ APP ══ */
#A{display:none;min-height:100vh;position:relative;z-index:1;}

/* SIDEBAR */
.sb{
  position:fixed;top:0;left:0;bottom:0;width:228px;
  background:var(--bg1);
  border-right:1px solid var(--b);
  display:flex;flex-direction:column;
  z-index:100;
}

.sh{
  padding:20px;
  border-bottom:1px solid var(--b);
  display:flex;align-items:center;gap:10px;
}

.sm{
  width:30px;height:30px;
  border:1px solid var(--a);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fm);font-size:12px;color:var(--a);
  position:relative;flex-shrink:0;
}

.sm::before,.sm::after{
  content:'';position:absolute;
  width:5px;height:5px;
  border-color:var(--a);border-style:solid;
}
.sm::before{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.sm::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}

.sn{font-family:var(--fs);font-size:13px;font-weight:700;color:var(--a);letter-spacing:1px;}
.sv{font-size:9px;color:var(--t3);font-family:var(--fm);margin-top:1px;}

.snv{flex:1;padding:14px 10px;overflow-y:auto;}

.nsc{
  font-size:9px;font-weight:700;color:var(--t3);
  letter-spacing:2px;text-transform:uppercase;
  padding:10px 10px 6px;
}

.ni{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;
  border-radius:2px;cursor:pointer;
  color:var(--t2);font-size:12px;font-weight:500;
  margin-bottom:1px;
  transition:all 0.15s;
  border-left:2px solid transparent;
}

.ni:hover{background:var(--ag);color:var(--t);}
.ni.on{background:var(--ag);color:var(--a);border-left-color:var(--a);}
.ni span{font-size:13px;width:16px;text-align:center;}

.nbdg{
  margin-left:auto;
  background:var(--r);color:white;
  font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:1px;
  font-family:var(--fm);display:none;
}

.sft{padding:14px;border-top:1px solid var(--b);}

.uc{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;background:var(--bg3);border-radius:2px;
}

.ua{
  width:28px;height:28px;
  border:1px solid var(--a);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fm);font-size:11px;color:var(--a);flex-shrink:0;
}

.un{font-size:11px;font-weight:600;color:var(--a);}
.ur{font-size:9px;color:var(--t3);margin-top:1px;}
.ux{background:none;border:none;color:var(--t3);cursor:pointer;margin-left:auto;font-size:13px;transition:0.15s;}
.ux:hover{color:var(--r);}

/* MAIN */
.mn{margin-left:228px;min-height:100vh;display:flex;flex-direction:column;}

.tb{
  height:54px;
  background:rgba(4,6,10,0.95);
  border-bottom:1px solid var(--b);
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 22px;
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);
}

.tt{font-family:var(--fs);font-size:13px;font-weight:700;color:var(--a);letter-spacing:1px;}

.tr{display:flex;align-items:center;gap:8px;}

.tp{
  padding:3px 9px;
  background:var(--bg3);border:1px solid var(--b);
  font-family:var(--fm);font-size:10px;color:var(--t3);
  animation:blink2 2s infinite;
}

@keyframes blink2{0%,100%{opacity:1;}50%{opacity:0.5;}}

.bi{
  width:32px;height:32px;
  background:transparent;border:1px solid var(--b);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;color:var(--t2);
  transition:all 0.15s;
}
.bi:hover{border-color:var(--a);color:var(--a);}

.ct{flex:1;padding:20px 22px;}

/* ALERT */
.ab{
  display:none;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--rg);
  border:1px solid rgba(255,59,59,0.2);
  margin-bottom:18px;
  animation:slideIn 0.3s ease;
}

@keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

.ad{width:7px;height:7px;background:var(--r);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
.at{font-size:12px;color:var(--r);flex:1;font-weight:500;}
.ac{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;}
.ac:hover{color:var(--r);}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}

.kc{
  background:linear-gradient(145deg,var(--bg2),var(--bg1));
  border:1px solid var(--b);
  padding:18px 20px;
  position:relative;overflow:hidden;
  transition:all 0.2s;
}

.kc::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--a),transparent);
  opacity:0;transition:0.3s;
}

.kc:hover{border-color:var(--bh);transform:translateY(-2px);}
.kc:hover::before{opacity:0.5;}

.kc::after{
  content:'';position:absolute;
  top:-30px;right:-30px;
  width:80px;height:80px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,255,0.04),transparent 70%);
}

.kh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.kl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase;}
.ki{font-size:16px;opacity:0.6;}
.kv{font-family:var(--fm);font-size:26px;font-weight:500;line-height:1;margin-bottom:5px;}
.ks{font-size:10px;color:var(--t3);}

/* TABS */
.tbr{
  display:flex;gap:0;
  border:1px solid var(--b);
  width:fit-content;
  margin-bottom:18px;
  overflow:hidden;
}

.tbb{
  padding:7px 18px;
  background:transparent;border:none;
  border-right:1px solid var(--b);
  color:var(--t2);
  font-family:var(--fs);font-size:10px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;
}

.tbb:last-child{border-right:none;}
.tbb:hover{color:var(--t);background:var(--ag);}
.tbb.on{color:var(--a);background:var(--ag);}

.tp2{display:none;}
.tp2.on{display:block;}

/* PIPELINE */
.pp{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

.pc{
  background:var(--bg1);
  border:1px solid var(--b);
  min-height:460px;
  transition:0.2s;
}

.pc.dv{border-color:var(--a);box-shadow:inset 0 0 20px rgba(0,229,255,0.03);}

.ph{
  padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--b);
}

.pt{
  display:flex;align-items:center;gap:6px;
  font-family:var(--fs);font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--t2);
}

.pd{width:5px;height:5px;border-radius:50%;}
.pn{font-family:var(--fm);font-size:10px;color:var(--t3);background:var(--bg3);padding:2px 7px;}

.pb{padding:10px;display:flex;flex-direction:column;gap:7px;}

/* LEAD CARD */
.lc2{
  background:linear-gradient(145deg,var(--bg3),var(--bg2));
  border:1px solid var(--b);
  border-left:2px solid var(--b);
  padding:13px;cursor:pointer;
  transition:all 0.2s;
  position:relative;overflow:hidden;
}

.lc2::after{
  content:'';
  position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,0.04),transparent);
  transition:0.4s;
}

.lc2:hover::after{left:100%;}
.lc2:hover{border-color:var(--bh);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.3);}

.lc2.pc2{border-left-color:var(--r);}
.lc2.pa{border-left-color:var(--w);}
.lc2.pm{border-left-color:var(--a);}

.ln{font-family:var(--fs);font-size:11px;font-weight:700;color:var(--a);margin-bottom:2px;letter-spacing:0.3px;}
.lg{font-size:9px;color:var(--t3);margin-bottom:8px;letter-spacing:0.5px;}

.bxx{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}

.bd{
  padding:2px 7px;font-size:8px;font-weight:700;
  font-family:var(--fm);letter-spacing:0.5px;
}

.ba{background:var(--rg);color:var(--r);}
.bm{background:var(--wg);color:var(--w);}
.bb{background:var(--gg);color:var(--g);}

.lii{
  font-family:var(--fm);font-size:14px;font-weight:500;
  color:var(--t);margin-bottom:8px;letter-spacing:-0.3px;
}

.pr{height:2px;background:var(--b);margin-bottom:8px;overflow:hidden;}
.pf{height:100%;transition:width 0.6s ease;}

.lmt{display:flex;align-items:center;justify-content:space-between;}
.lddt{font-family:var(--fm);font-size:9px;color:var(--t3);}

.la{
  display:flex;gap:3px;
  padding:8px 0 0;border-top:1px solid var(--b);margin-top:8px;
}

.ab2{
  flex:1;padding:5px;
  background:transparent;border:1px solid var(--b);
  color:var(--t3);font-size:10px;cursor:pointer;
  text-align:center;transition:all 0.15s;
}

.ab2:hover{border-color:var(--a);color:var(--a);}
.ab2.wa{color:var(--t2);}

.es{
  display:flex;flex-direction:column;
  align-items:center;padding:36px 16px;
  color:var(--t3);gap:6px;
}

.ei{font-size:20px;opacity:0.25;}
.et{font-size:9px;letter-spacing:2px;text-transform:uppercase;}

/* LISTA */
.lt2{display:flex;gap:8px;margin-bottom:14px;align-items:center;}

.sw{flex:1;position:relative;}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none;}

.sx{
  width:100%;padding:8px 10px 8px 30px;
  background:var(--bg2);border:1px solid var(--b);
  color:var(--a);font-family:var(--f);font-size:12px;outline:none;
  transition:0.15s;
}
.sx:focus{border-color:rgba(0,229,255,0.3);}

.fg{display:flex;gap:0;border:1px solid var(--b);overflow:hidden;}
.fp{
  padding:5px 12px;background:transparent;border:none;
  border-right:1px solid var(--b);
  color:var(--t2);font-size:11px;cursor:pointer;transition:0.15s;
  font-family:var(--fs);font-weight:600;letter-spacing:0.5px;
}
.fp:last-child{border-right:none;}
.fp:hover{color:var(--t);background:var(--ag);}
.fp.on{color:var(--a);background:var(--ag);}

.tbl{background:var(--bg1);border:1px solid var(--b);overflow:hidden;}

.th{
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 100px;
  padding:9px 16px;border-bottom:1px solid var(--b);
  background:var(--bg2);
}

.thh{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;}

.tr2{
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 100px;
  padding:13px 16px;border-bottom:1px solid var(--b);
  align-items:center;cursor:pointer;transition:0.15s;
  position:relative;
}

.tr2:last-child{border-bottom:none;}
.tr2:hover{background:var(--ag);}
.tr2::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.tr2.c::before{background:var(--r);}
.tr2.a::before{background:var(--w);}
.tr2.m::before{background:var(--a);}

.rn{font-size:12px;font-weight:600;color:var(--a);}
.rs{font-size:10px;color:var(--t3);margin-top:2px;}
.rm{font-family:var(--fm);font-size:11px;}
.ra{display:flex;gap:5px;justify-content:flex-end;}

.rb{
  padding:4px 8px;
  background:var(--bg3);border:1px solid var(--b);
  color:var(--t2);font-size:10px;cursor:pointer;transition:0.15s;
}
.rb:hover{border-color:var(--a);color:var(--a);}
.rb.wa{color:var(--t2);}

/* MODAL */
.mo{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(6px);
  z-index:500;display:none;
  align-items:center;justify-content:center;
  padding:20px;
}

.mb{
  background:linear-gradient(145deg,var(--bg2),var(--bg1));
  border:1px solid var(--b);
  width:100%;max-width:540px;max-height:82vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(0,0,0,0.6),0 0 30px rgba(0,229,255,0.04);
  animation:mIn 0.2s cubic-bezier(0.16,1,0.3,1);
  position:relative;
}

.mb::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--a),transparent);
  opacity:0.4;
}

@keyframes mIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}

.mh{
  padding:18px 22px;
  border-bottom:1px solid var(--b);
  display:flex;align-items:center;justify-content:space-between;
}

.mt{font-family:var(--fs);font-size:14px;font-weight:700;color:var(--a);letter-spacing:0.5px;}
.ms{font-size:10px;color:var(--t2);margin-top:2px;}

.mx{
  width:28px;height:28px;background:transparent;
  border:1px solid var(--b);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--t2);transition:0.15s;
}
.mx:hover{border-color:var(--r);color:var(--r);}

.md{padding:18px 22px;overflow-y:auto;flex:1;}

.ml{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}

.mv{
  font-size:12px;color:var(--t);
  background:var(--bg3);border:1px solid var(--b);
  padding:9px 12px;margin-bottom:12px;line-height:1.5;
}

.mdi{
  font-size:11px;color:var(--t2);
  background:var(--bg3);border:1px solid var(--b);
  padding:10px 12px;max-height:130px;overflow-y:auto;
  white-space:pre-wrap;font-family:var(--fm);margin-bottom:12px;line-height:1.6;
}

.mf{
  padding:14px 22px;border-top:1px solid var(--b);
  display:flex;gap:7px;flex-wrap:wrap;
}

.mbtn{
  padding:7px 14px;background:transparent;
  border:1px solid var(--b);color:var(--t2);
  font-family:var(--fs);font-size:9px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:0.15s;
}

.mbtn:hover{border-color:var(--a);color:var(--a);}
.mbtn.pr2{border-color:var(--a);color:var(--a);}
.mbtn.dn{border-color:var(--r);color:var(--r);}
.mbtn.wa2{border-color:var(--t2);color:var(--t2);}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--t3);}
::-webkit-scrollbar-thumb:hover{background:var(--t2);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="L">
  <div class="lw">
    <div class="ll">
      <div class="lm">Ω</div>
      <div>
        <div class="ln">MESAN Ω</div>
        <div class="ls">INTELLIGENCE COMMAND</div>
      </div>
    </div>
    <div class="lt">Acceso al sistema</div>
    <div class="ld">Ingresa tu API key para acceder al centro de inteligencia empresarial.</div>
    <label class="llb">API Key</label>
    <input class="li" type="password" id="ki" placeholder="••••••••••••••••">
    <button class="lb" id="kb">INICIAR SESIÓN →</button>
  </div>
</div>

<!-- APP -->
<div id="A">

  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sh">
