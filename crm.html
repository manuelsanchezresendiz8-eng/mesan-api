<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Omega CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#04060A;color:#C8F0FF;font-family:sans-serif;}
#L{position:fixed;inset:0;background:#04060A;display:flex;align-items:center;justify-content:center;}
.box{background:#060C14;border:1px solid rgba(0,229,255,0.1);padding:40px;width:360px;}
.box h1{color:#00E5FF;margin-bottom:20px;font-size:22px;}
.box input{width:100%;padding:11px;background:#08121E;border:1px solid rgba(0,229,255,0.1);color:#00E5FF;margin-bottom:12px;outline:none;}
.box button{width:100%;padding:12px;border:1px solid #00E5FF;background:transparent;color:#00E5FF;cursor:pointer;}
#A{display:none;padding:20px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kc{background:#060C14;border:1px solid rgba(0,229,255,0.1);padding:16px;}
.kl{font-size:9px;color:#1E4A5F;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.kv{font-size:22px;color:#00E5FF;font-family:monospace;}
#leads{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.lc{background:#060C14;border:1px solid rgba(0,229,255,0.1);border-left:3px solid #00E5FF;padding:14px;cursor:pointer;}
.lc.alto{border-left-color:#FF3B3B;}
.lc.medio{border-left-color:#FF9500;}
.ln{font-size:13px;font-weight:600;color:#00E5FF;margin-bottom:4px;}
.li{font-family:monospace;font-size:14px;margin-bottom:6px;}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.top h2{color:#00E5FF;}
.rbtn{padding:8px 14px;border:1px solid rgba(0,229,255,0.2);background:transparent;color:#4A8FA8;cursor:pointer;margin-left:6px;}
.rbtn:hover{border-color:#00E5FF;color:#00E5FF;}
</style>
</head>
<body>
<div id="L">
<div class="box">
<h1>MESAN Omega</h1>
<input type="password" id="ki" placeholder="API Key">
<button onclick="entrar()">ENTRAR</button>
</div>
</div>
<div id="A">
<div class="top">
<h2>CRM PIPELINE</h2>
<div>
<button class="rbtn" onclick="cargar()">Actualizar</button>
<button class="rbtn" onclick="window.open('/admin.html')">Consultor IA</button>
<button class="rbtn" onclick="salir()">Salir</button>
</div>
</div>
<div class="kpis">
<div class="kc"><div class="kl">Leads</div><div class="kv" id="k1">0</div></div>
<div class="kc"><div class="kl">Criticos</div><div class="kv" id="k2" style="color:#FF3B3B">0</div></div>
<div class="kc"><div class="kl">Pipeline</div><div class="kv" id="k3" style="color:#FF9500">$0</div></div>
<div class="kc"><div class="kl">Cerrados</div><div class="kv" id="k4" style="color:#00D09E">0</div></div>
</div>
<div id="leads"></div>
</div>
<script>
console.log("CRM CARGADO OK");
window.onerror=function(msg,url,line){alert("JS ERROR linea "+line+": "+msg);};
var API="https://mesan-api.onrender.com",K="",leads=[];
var saved=localStorage.getItem("mk");
console.log("KEY GUARDADA:",saved?"si":"no");
if(saved){K=saved;ini();}
function entrar(){
  console.log("BOTON ENTRAR CLICK");
  K=document.getElementById("ki").value.trim();
  console.log("KEY INGRESADA:",K?"si":"no");
  if(!K){alert("Ingresa tu API key");return;}
  localStorage.setItem("mk",K);
  ini();
}
function ini(){
  console.log("INICIANDO APP");
  document.getElementById("L").style.display="none";
  document.getElementById("A").style.display="block";
  cargar();
}
function salir(){localStorage.removeItem("mk");location.reload();}
async function cargar(){
  try{
    var r=await fetch(API+"/leads",{headers:{"api-key":K}});
    if(r.status===403){alert("API Key invalida");salir();return;}
    var d=await r.json();
    leads=d.leads||[];
    leads.sort(function(a,b){return(b.impacto_max||0)-(a.impacto_max||0);});
    kpi();render();
  }catch(e){console.error(e);}
}
function kpi(){
  document.getElementById("k1").innerText=leads.length;
  document.getElementById("k2").innerText=leads.filter(function(l){return(l.clasificacion||"").toUpperCase()==="ALTO";}).length;
  document.getElementById("k4").innerText=leads.filter(function(l){return l.estatus==="cerrado";}).length;
  var t=leads.reduce(function(s,l){return s+(l.impacto_max||0);},0);
  document.getElementById("k3").innerText=t>=1000000?"$"+(t/1000000).toFixed(1)+"M":"$"+(t/1000).toFixed(0)+"K";
}
function render(){
  var c=document.getElementById("leads");
  c.innerHTML="";
  leads.forEach(function(l){
    var cls=(l.clasificacion||"").toUpperCase()==="ALTO"?"alto":(l.clasificacion||"").toUpperCase()==="MEDIO"?"medio":"";
    var tel=(l.telefono||"").replace(/\D/g,"");
    var el=document.createElement("div");
    el.className="lc "+cls;
    el.innerHTML="<div class='ln'>"+(l.nombre||"Sin nombre")+"</div>"
      +"<div style='font-size:9px;color:#1E4A5F;margin-bottom:6px'>"+(l.giro||"—")+"</div>"
      +"<div class='li'>$"+(l.impacto_max||0).toLocaleString()+" MXN</div>"
      +"<div style='font-size:10px;color:#4A8FA8;margin-bottom:8px'>"+(l.clasificacion||"N/A")+" | "+(l.estatus||"nuevo")+"</div>"
      +(tel?"<button onclick='wa(\""+tel+"\")' style='padding:4px 8px;border:1px solid #4A8FA8;background:transparent;color:#4A8FA8;cursor:pointer;margin-right:4px;font-size:10px'>WA</button>":"")
      +"<button onclick='mover(\""+l.id+"\",\"contactado\")' style='padding:4px 8px;border:1px solid rgba(0,229,255,0.2);background:transparent;color:#4A8FA8;cursor:pointer;margin-right:4px;font-size:10px'>-></button>"
      +"<button onclick='mover(\""+l.id+"\",\"cerrado\")' style='padding:4px 8px;border:1px solid rgba(0,229,255,0.2);background:transparent;color:#4A8FA8;cursor:pointer;font-size:10px'>OK</button>";
    c.appendChild(el);
  });
  if(!leads.length)c.innerHTML="<p style='color:#1E4A5F;padding:20px'>Sin leads</p>";
}
function wa(tel){window.open("https://wa.me/52"+tel);}
async function mover(id,est){
  try{
    await fetch(API+"/lead/"+id,{method:"PUT",headers:{"Content-Type":"application/json","api-key":K},body:JSON.stringify({estatus:est})});
    cargar();
  }catch(e){console.error(e);}
}
document.getElementById("ki").onkeypress=function(e){if(e.key==="Enter")entrar();};
</script>
</body>
</html>
