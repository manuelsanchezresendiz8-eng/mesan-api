<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω CRM</title>

<style>
body{margin:0;font-family:sans-serif;background:#04060A;color:#C8F0FF}

/* LOGIN */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#04060A}
.box{width:340px;padding:40px;background:#060C14;border:1px solid rgba(0,229,255,0.15)}
.box h1{color:#00E5FF;margin-bottom:18px}
.box input{width:100%;padding:10px;margin-bottom:10px;background:#08121E;border:1px solid #00E5FF;color:#00E5FF}
.box button{width:100%;padding:10px;background:transparent;border:1px solid #00E5FF;color:#00E5FF;cursor:pointer}

/* APP */
#app{display:none;padding:16px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px}
.kc{background:#060C14;padding:14px;border:1px solid rgba(0,229,255,0.1)}
.kv{font-size:20px;color:#00E5FF;font-family:monospace}

/* LEADS */
#leads{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{background:#060C14;padding:12px;border:1px solid rgba(0,229,255,0.1);border-left:3px solid #00E5FF}
.card.alto{border-left-color:#FF3B3B}
.card.medio{border-left-color:#FF9500}
.title{color:#00E5FF;font-weight:600}
.small{font-size:11px;color:#4A8FA8}
.money{font-family:monospace;margin:6px 0}
.btn{margin-right:5px;font-size:10px;padding:4px 6px;border:1px solid #4A8FA8;background:transparent;color:#4A8FA8;cursor:pointer}

.top{display:flex;justify-content:space-between;margin-bottom:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h1>MESAN Ω</h1>
    <input type="password" id="key" placeholder="API KEY">
    <button onclick="login()">ENTRAR</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="top">
    <h2>CRM PIPELINE</h2>
    <div>
      <button onclick="load()">Actualizar</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpis">
    <div class="kc"><div>Leads</div><div class="kv" id="k1">0</div></div>
    <div class="kc"><div>Críticos</div><div class="kv" id="k2">0</div></div>
    <div class="kc"><div>Pipeline</div><div class="kv" id="k3">$0</div></div>
    <div class="kc"><div>Cerrados</div><div class="kv" id="k4">0</div></div>
  </div>

  <!-- LEADS -->
  <div id="leads"></div>

</div>

<script>

const API = "https://mesan-api.onrender.com";
let KEY = "";
let leads = [];

/* INIT */
const saved = localStorage.getItem("mk");
if(saved){ KEY = saved; start(); }

/* LOGIN */
function login(){
  KEY = document.getElementById("key").value.trim();
  if(!KEY){ alert("API KEY requerida"); return; }
  localStorage.setItem("mk", KEY);
  start();
}

function start(){
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  load();
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("mk");
  location.reload();
}

/* LOAD */
async function load(){
  try{
    const r = await fetch(API + "/leads", {
      headers: { "api-key": KEY }
    });

    if(!r.ok){
      alert("Error API / Key inválida");
      logout();
      return;
    }

    const d = await r.json();
    leads = Array.isArray(d.leads) ? d.leads : [];

    render();

  }catch(e){
    console.log("ERROR API", e);
    alert("No hay conexión con API");
  }
}

/* KPI */
function kpi(){
  document.getElementById("k1").innerText = leads.length;

  document.getElementById("k2").innerText =
    leads.filter(l => (l.clasificacion||"").toUpperCase()==="ALTO").length;

  document.getElementById("k4").innerText =
    leads.filter(l => l.estatus==="cerrado").length;

  const t = leads.reduce((s,l)=>s+(l.impacto_max||0),0);

  document.getElementById("k3").innerText =
    t >= 1000000 ? "$"+(t/1000000).toFixed(1)+"M" : "$"+(t/1000).toFixed(0)+"K";
}

/* RENDER */
function render(){
  kpi();

  const c = document.getElementById("leads");
  c.innerHTML = "";

  leads.forEach(l => {

    const cls =
      (l.clasificacion||"").toUpperCase()==="ALTO" ? "alto" :
      (l.clasificacion||"").toUpperCase()==="MEDIO" ? "medio" : "";

    const div = document.createElement("div");
    div.className = "card "+cls;

    const tel = (l.telefono||"").replace(/\D/g,"");

    div.innerHTML = `
      <div class="title">${l.nombre || "Sin nombre"}</div>
      <div class="small">${l.giro || "—"}</div>
      <div class="money">$${(l.impacto_max||0).toLocaleString()} MXN</div>
      <div class="small">${l.clasificacion || "N/A"} | ${l.estatus || "nuevo"}</div>

      ${tel ? `<button class="btn" onclick="wa('${tel}')">WA</button>` : ""}
      <button class="btn" onclick="move('${l.id}','contactado')">→</button>
      <button class="btn" onclick="move('${l.id}','cerrado')">OK</button>
    `;

    c.appendChild(div);
  });

  if(!leads.length){
    c.innerHTML = "<p style='color:#4A8FA8'>Sin leads</p>";
  }
}

/* WHATSAPP */
function wa(t){
  window.open("https://wa.me/52"+t);
}

/* MOVE */
async function move(id, est){
  try{
    await fetch(API+"/lead/"+id,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        "api-key":KEY
      },
      body:JSON.stringify({estatus:est})
    });

    load();

  }catch(e){
    console.log("MOVE ERROR",e);
  }
}

</script>
</body>
</html>
