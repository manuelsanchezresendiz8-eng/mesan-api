<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω CRM PRO</title>

<style>
body{margin:0;background:#04060A;color:#C8F0FF;font-family:Arial}
#login,#app{padding:20px}
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.box{width:340px;background:#060C14;padding:30px;border:1px solid #0ff3}
input{width:100%;padding:10px;background:#08121E;border:1px solid #0ff3;color:#0ff;outline:none;margin-bottom:10px}
button{padding:10px;border:1px solid #00E5FF;background:transparent;color:#00E5FF;cursor:pointer;width:100%}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kc{background:#060C14;padding:12px;border:1px solid #0ff2}
.kv{font-size:20px;color:#00E5FF}
.leads{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{background:#060C14;padding:12px;border:1px solid #0ff2}
.alto{border-left:3px solid #ff3b3b}
.medio{border-left:3px solid #ff9500}
small{color:#4A8FA8}
.btn{margin-top:6px;font-size:11px;padding:6px;border:1px solid #0ff3;background:transparent;color:#0ff;cursor:pointer}
</style>
</head>

<body>

<div id="login">
  <div class="box">
    <h3 style="color:#00E5FF">MESAN Ω</h3>
    <input id="key" placeholder="API KEY">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" style="display:none">

  <h2 style="color:#00E5FF">CRM PIPELINE</h2>

  <div class="kpis">
    <div class="kc">Leads <div class="kv" id="k1">0</div></div>
    <div class="kc">Criticos <div class="kv" id="k2">0</div></div>
    <div class="kc">Pipeline <div class="kv" id="k3">$0</div></div>
    <div class="kc">Cerrados <div class="kv" id="k4">0</div></div>
  </div>

  <button onclick="load()">Actualizar</button>

  <div class="leads" id="leads"></div>
</div>

<script>
const API="https://mesan-api.onrender.com";
let KEY="";
let leads=[];

function login(){
  KEY=document.getElementById("key").value;
  if(!KEY) return alert("API KEY requerida");
  localStorage.setItem("mk",KEY);
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

let saved=localStorage.getItem("mk");
if(saved){KEY=saved;start();}

async function load(){
  try{
    console.log("Cargando leads...");
    let r=await fetch(API+"/leads",{headers:{"api-key":KEY}});
    if(r.status===403) throw new Error("API KEY inválida");

    let d=await r.json();
    leads=d.leads||[];

    console.log("Leads:",leads);

    render();
    kpi();

  }catch(e){
    console.error("ERROR:",e);
    alert("Error cargando datos: "+e.message);
  }
}

function kpi(){
  document.getElementById("k1").innerText=leads.length;
  document.getElementById("k2").innerText=leads.filter(l=>l.clasificacion==="ALTO").length;
  document.getElementById("k4").innerText=leads.filter(l=>l.estatus==="cerrado").length;

  let t=leads.reduce((a,b)=>a+(b.impacto_max||0),0);
  document.getElementById("k3").innerText="$"+(t/1000).toFixed(0)+"K";
}

function render(){
  let c=document.getElementById("leads");
  c.innerHTML="";

  leads.forEach(l=>{
    let cls=l.clasificacion==="ALTO"?"alto":l.clasificacion==="MEDIO"?"medio":"";

    let div=document.createElement("div");
    div.className="card "+cls;

    div.innerHTML=`
      <b>${l.nombre||"Sin nombre"}</b><br>
      <small>${l.giro||""}</small><br>
      <div>$${l.impacto_max||0}</div>
      <small>${l.estatus||"nuevo"}</small><br>

      <button class="btn" onclick="wa('${(l.telefono||'').replace(/\D/g,'')}')">WA</button>
      <button class="btn" onclick="mover('${l.id}','contactado')">-></button>
      <button class="btn" onclick="mover('${l.id}','cerrado')">OK</button>
    `;

    c.appendChild(div);
  });
}

function wa(t){
  if(!t) return;
  window.open("https://wa.me/52"+t);
}

async function mover(id,estado){
  try{
    console.log("moviendo",id,estado);

    await fetch(API+"/lead/"+id,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        "api-key":KEY
      },
      body:JSON.stringify({estatus:estado})
    });

    load();

  }catch(e){
    console.error(e);
  }
}
</script>

</body>
</html>
