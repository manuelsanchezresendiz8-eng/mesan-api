<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω CRM Unified</title>

<style>
body{margin:0;background:#04060A;color:#C8F0FF;font-family:Arial}
#login,#app{padding:20px}
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#04060A}
.box{width:340px;background:#060C14;padding:30px;border:1px solid rgba(0,229,255,0.15)}
input{width:100%;padding:10px;margin-bottom:10px;background:#08121E;border:1px solid rgba(0,229,255,0.2);color:#00E5FF;outline:none}
button{padding:10px;border:1px solid #00E5FF;background:transparent;color:#00E5FF;cursor:pointer;width:100%}

#app{display:none}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kc{background:#060C14;padding:12px;border:1px solid rgba(0,229,255,0.1)}
.kv{font-size:20px;color:#00E5FF;font-family:monospace}

.leads{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{background:#060C14;padding:12px;border:1px solid rgba(0,229,255,0.1);border-left:3px solid #00E5FF}
.card.alto{border-left-color:#FF3B3B}
.card.medio{border-left-color:#FF9500}

small{color:#4A8FA8}
.btn{margin-top:6px;font-size:11px;padding:6px;border:1px solid rgba(0,229,255,0.2);background:transparent;color:#4A8FA8;cursor:pointer}
.btn:hover{border-color:#00E5FF;color:#00E5FF}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3 style="color:#00E5FF">MESAN Ω CRM</h3>
    <input id="key" placeholder="API KEY">
    <button onclick="login()">ENTRAR</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="top">
    <h2 style="color:#00E5FF">PIPELINE UNIFICADO</h2>
    <div>
      <button onclick="load()">Actualizar</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="kpis">
    <div class="kc">Leads <div class="kv" id="k1">0</div></div>
    <div class="kc">Críticos <div class="kv" id="k2">0</div></div>
    <div class="kc">Pipeline <div class="kv" id="k3">$0</div></div>
    <div class="kc">Cerrados <div class="kv" id="k4">0</div></div>
  </div>

  <div class="leads" id="leads"></div>
</div>

<script>
const API="https://mesan-api.onrender.com";
let KEY="";
let leads=[];

/* ================= LOGIN ================= */
function login(){
  KEY=document.getElementById("key").value.trim();
  if(!KEY) return alert("API KEY requerida");

  localStorage.setItem("mk",KEY);
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

/* auto login */
let saved=localStorage.getItem("mk");
if(saved){KEY=saved;start();}

/* ================= LOAD ================= */
async function load(){
  try{
    console.log("🔄 cargando leads...");

    const r=await fetch(API+"/leads",{
      headers:{"api-key":KEY}
    });

    if(r.status===403){
      alert("API KEY inválida");
      logout();
      return;
    }

    const d=await r.json();
    leads=d.leads||[];

    console.log("✔ leads:",leads);

    render();
    kpi();

  }catch(e){
    console.error("❌ ERROR LOAD:",e);
    alert("Error de conexión con API");
  }
}

/* ================= KPI ================= */
function kpi(){
  document.getElementById("k1").innerText=leads.length;

  document.getElementById("k2").innerText=
    leads.filter(l=>l.clasificacion==="ALTO").length;

  document.getElementById("k4").innerText=
    leads.filter(l=>l.estatus==="cerrado").length;

  let total=leads.reduce((a,b)=>a+(b.impacto_max||0),0);

  document.getElementById("k3").innerText=
    total>=1000000
      ? "$"+(total/1000000).toFixed(1)+"M"
      : "$"+(total/1000).toFixed(0)+"K";
}

/* ================= RENDER ================= */
function render(){
  const c=document.getElementById("leads");
  c.innerHTML="";

  if(!leads.length){
    c.innerHTML="<p style='color:#4A8FA8'>Sin leads</p>";
    return;
  }

  leads.forEach(l=>{

    const cls=
      l.clasificacion==="ALTO"?"alto":
      l.clasificacion==="MEDIO"?"medio":"";

    const tel=(l.telefono||"").replace(/\D/g,"");

    const div=document.createElement("div");
    div.className="card "+cls;

    div.innerHTML=`
      <b>${l.nombre||"Sin nombre"}</b><br>
      <small>${l.giro||"—"}</small><br>
      <div>$${l.impacto_max||0}</div>
      <small>${l.clasificacion||"N/A"} | ${l.estatus||"nuevo"}</small><br>

      ${tel?`<button class="btn" onclick="wa('${tel}')">WA</button>`:""}
      <button class="btn" onclick="mover('${l.id}','contactado')">Contactado</button>
      <button class="btn" onclick="mover('${l.id}','cerrado')">Cerrar</button>
    `;

    c.appendChild(div);
  });
}

/* ================= ACTIONS ================= */
function wa(t){
  if(!t) return;
  window.open("https://wa.me/52"+t);
}

async function mover(id,estado){
  try{
    console.log("moviendo:",id,estado);

    await fetch(API+"/lead/"+id,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        "api-key":KEY
      },
      body:JSON.stringify({estatus:estado})
    });

    load();

  }catch(e){
    console.error("ERROR mover:",e);
  }
}

/* ================= SESSION ================= */
function logout(){
  localStorage.removeItem("mk");
  location.reload();
}

document.getElementById("key")?.addEventListener("keypress",e=>{
  if(e.key==="Enter") login();
});
</script>

</body>
</html>
