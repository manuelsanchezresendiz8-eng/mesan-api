<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω — Command Center</title>

<style>
:root{
  --bg:#04060A;
  --panel:#08121E;
  --border:rgba(0,229,255,0.15);
  --a:#00E5FF;
  --r:#FF3B3B;
  --w:#FF9500;
  --g:#00D09E;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:#C8F0FF;
  font-family:Arial;
  overflow:hidden;
}

/* LAYOUT */
.wrap{
  display:grid;
  grid-template-columns:260px 1fr 260px;
  height:100vh;
}

/* SIDE PANELS */
.panel{
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.panel.right{
  border-right:none;
  border-left:1px solid var(--border);
}

.title{
  font-size:12px;
  color:var(--a);
  letter-spacing:2px;
}

/* CENTER */
.center{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CORE */
.core{
  width:260px;
  height:260px;
  border-radius:50%;
  border:1px solid var(--border);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.core::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:1px solid var(--a);
  opacity:0.2;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:0.3}
  100%{transform:scale(1.4);opacity:0}
}

.eye{
  width:60px;
  height:60px;
  border-radius:50%;
  background:radial-gradient(circle,#00E5FF,transparent);
}

/* NODES */
.node{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--a);
  box-shadow:0 0 10px var(--a);
}

/* KPI */
.kpi{
  background:#060C14;
  padding:10px;
  border:1px solid var(--border);
}

.kv{font-size:18px;color:var(--a)}

/* ALERT */
.alert{
  padding:8px;
  border:1px solid rgba(255,59,59,0.3);
  color:var(--r);
  font-size:11px;
}

/* SEARCH */
.search{
  padding:8px;
  background:#060C14;
  border:1px solid var(--border);
  color:#00E5FF;
  outline:none;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- LEFT -->
  <div class="panel">
    <div class="title">SEGMENTACIÓN</div>
    <div class="kpi">Grupo Norte <div class="kv">35%</div></div>
    <div class="kpi">Retail <div class="kv">22%</div></div>

    <div class="title">HISTORIAL</div>
    <div class="kpi">Empresas nuevas: 18</div>
    <div class="kpi">Alertas: 6</div>
  </div>

  <!-- CENTER -->
  <div class="center">

    <div class="core">
      <div class="eye"></div>
    </div>

    <!-- NODOS -->
    <div class="node" style="top:20%;left:40%"></div>
    <div class="node" style="top:60%;left:70%"></div>
    <div class="node" style="top:40%;left:20%"></div>

  </div>

  <!-- RIGHT -->
  <div class="panel right">
    <div class="title">INTELIGENCIA</div>
    <div class="kpi">Procesadas <div class="kv">1.4M/día</div></div>
    <div class="kpi">Eventos <div class="kv">8K/hr</div></div>

    <div class="title">ALERTAS</div>
    <div class="alert">Riesgo crítico detectado</div>

    <div class="title">BUSCAR</div>
    <input class="search" placeholder="RFC / Empresa">
  </div>

</div>

</body>
</html>
