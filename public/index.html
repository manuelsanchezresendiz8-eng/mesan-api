<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Ω</title>
<style>
body { background-color: #0a0a0b; color: #00f3ff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; border: 4px solid #00f3ff; box-sizing: border-box; }
.cuadro { border: 1px solid #ff00ff; padding: 20px; background: rgba(0,0,0,0.8); text-align: center; width: 85%; max-width: 400px; }
.btn { background: #00f3ff; color: black; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
.stats { display: none; text-align: left; margin-top: 20px; border-top: 1px solid #00f3ff; }
.stat-line { margin: 10px 0; }
.valor { color: #ff00ff; float: right; }
</style>
</head>
<body>
<h1>MESAN Ω</h1>
<div class="cuadro">
<p id="Terminal">SISTEMA LISTO _</p>
<button class="btn" id="BtnScan" onclick="entrar()">INICIAR ESCANEO</button>
<div id="Dashboard" class="stats">
<div class="stat-line">RIESGO: <span class="valor">2.4%</span></div>
<div class="stat-line">EFICIENCIA: <span class="valor">98.6%</span></div>
<div class="stat-line">ESTADO: <span class="valor">ONLINE</span></div>
<p style="font-size: 0.7rem; color: #666; margin-top: 15px; text-align: center;">PROYECTO MAESTRO 2026</p>
</div>
</div>
<script>
function entrar() {
document.getElementById('BtnScan').style.display = 'none';
document.getElementById('Terminal').innerText = "ACCEDIENDO...";
setTimeout(() => {
document.getElementById('Terminal').innerText = "DASHBOARD ACTIVO";
document.getElementById('Dashboard').style.display = 'block';
alert("ACCESO AUTORIZADO");
}, 1000);
}
</script>
</body>
</html>
