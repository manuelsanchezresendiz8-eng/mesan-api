<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MESAN-Ω Test</title>
<style>
  body { background: #000; color: #00fff7; font-family: monospace; padding: 20px; }
  button { background: #00fff7; color: #000; border: none; padding: 10px 20px; font-size: 1rem; cursor: pointer; margin-top: 10px; }
  pre { background: #111; padding: 15px; margin-top: 15px; color: #00ff88; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>MESAN-Ω Enterprise Test</h2>
<button onclick="testEnterprise()">Probar /enterprise</button>
<pre id="resultado">Esperando...</pre>

<script>
async function testEnterprise() {
  document.getElementById("resultado").textContent = "Conectando...";
  try {
    const res = await fetch("https://mesan-api.onrender.com/enterprise", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        factura: "no",
        contabilidad: "no_tiene",
        imss: "no",
        contratos: "no",
        rpbi: "si",
        contrato_rpbi: "no",
        procesos: "no",
        inspeccion: "preocupado",
        historial: "si"
      })
    });
    const data = await res.json();
    document.getElementById("resultado").textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    document.getElementById("resultado").textContent = "Error: " + e.message;
  }
}
</script>
</body>
</html>
