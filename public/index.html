<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - Sistema de Diagnóstico</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --dark-bg: #0a0a0b;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            border: 2px solid var(--neon-cyan);
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5rem; letter-spacing: 5px; color: var(--neon-cyan); }
        .status-box {
            border: 1px solid var(--neon-magenta);
            padding: 20px;
            background: rgba(255, 0, 255, 0.05);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
            text-align: center;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MESAN Ω</h1>
        <p>SISTEMA DE SOBERANÍA TECNOLÓGICA v33.0</p>
    </div>
    <div class="status-box">
        <p id="terminal">ESTADO: EN LÍNEA _</p>
        <p>CONEXIÓN: ESTABLE</p>
        <button class="btn" onclick="alert('Iniciando Diagnóstico...')">INICIAR ESCANEO</button>
    </div>
</body>
</html>
