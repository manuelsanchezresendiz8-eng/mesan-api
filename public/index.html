<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN-Ω · Certificación Empresarial con Sello Criptográfico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5ff;
    --green: #00ff88;
    --amber: #ffaa00;
    --red: #ff3355;
    --bg: #000508;
    --bg2: #020d12;
    --panel: rgba(0,245,255,0.04);
    --border: rgba(0,245,255,0.15);
    --text: #c8f0f5;
    --dim: #4a7a85;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* ── CANVAS PARTICLES ── */
  #particles-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── SCAN LINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,255,0.015) 2px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 1;
    animation: scanShift 8s linear infinite;
  }

  @keyframes scanShift {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* ── MOVING SCAN BAR ── */
  body::after {
    content: '';
    position: fixed;
    top: -2px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    z-index: 2;
    animation: scanBar 6s ease-in-out infinite;
    box-shadow: 0 0 20px var(--cyan), 0 0 60px rgba(0,245,255,0.3);
  }

  @keyframes scanBar {
    0% { top: -2px; opacity: 1; }
    95% { opacity: 0.6; }
    100% { top: 100vh; opacity: 0; }
  }

  /* ── LAYOUT ── */
  section, nav, footer { position: relative; z-index: 10; }

  /* ── NAV ── */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 3rem;
    border-bottom: 1px solid var(--border);
    background: rgba(0,5,8,0.85);
    backdrop-filter: blur(12px);
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.4rem;
    color: var(--cyan);
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--cyan);
    text-decoration: none;
  }

  .nav-logo span { color: var(--green); }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s, text-shadow 0.2s;
  }

  .nav-links a:hover {
    color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan);
  }

  .nav-cta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    padding: 0.5rem 1.2rem;
    border: 1px solid var(--green);
    color: var(--green);
    text-decoration: none;
    text-transform: uppercase;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .nav-cta:hover {
    background: var(--green);
    color: #000;
    box-shadow: 0 0 20px var(--green);
  }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 8rem 3rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero-grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 20% 50%, black 20%, transparent 80%);
  }

  .hero-glow {
    position: absolute;
    right: -10%;
    top: 50%;
    transform: translateY(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,245,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  .hero-tag::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .hero-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.8rem, 7vw, 6rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 0.3rem;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .hero-title .line1 { color: #fff; }

  .hero-title .line2 {
    color: var(--cyan);
    text-shadow:
      0 0 30px var(--cyan),
      0 0 80px rgba(0,245,255,0.4);
    display: block;
  }

  .hero-title .omega {
    color: var(--green);
    text-shadow: 0 0 30px var(--green);
  }

  .hero-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(1rem, 2vw, 1.3rem);
    font-weight: 300;
    color: var(--dim);
    max-width: 520px;
    line-height: 1.7;
    margin: 1.5rem 0 2.5rem;
    animation: fadeUp 0.8s ease 0.6s both;
  }

  .hero-sub strong { color: var(--text); font-weight: 600; }

  .hero-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease 0.8s both;
  }

  .btn-primary {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 1rem 2.5rem;
    background: linear-gradient(135deg, var(--cyan), var(--green));
    color: #000;
    border: none;
    text-decoration: none;
    text-transform: uppercase;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: all 0.2s;
    display: inline-block;
  }

  .btn-primary:hover {
    box-shadow: 0 0 40px rgba(0,245,255,0.5);
    transform: translateY(-2px);
  }

  .btn-secondary {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    padding: 1rem 2rem;
    background: transparent;
    color: var(--cyan);
    border: 1px solid var(--border);
    text-decoration: none;
    text-transform: uppercase;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: all 0.2s;
    display: inline-block;
  }

  .btn-secondary:hover {
    border-color: var(--cyan);
    box-shadow: inset 0 0 20px rgba(0,245,255,0.08), 0 0 20px rgba(0,245,255,0.15);
  }

  /* HASH DISPLAY */
  .hero-hash {
    margin-top: 3rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: rgba(0,245,255,0.25);
    letter-spacing: 2px;
    animation: fadeUp 0.8s ease 1s both;
  }

  .hero-hash span {
    color: var(--green);
    opacity: 0.6;
  }

  /* ── STATS TICKER ── */
  .stats-bar {
    background: rgba(0,245,255,0.04);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 1rem 0;
    overflow: hidden;
    position: relative;
  }

  .ticker-track {
    display: flex;
    gap: 4rem;
    animation: ticker 30s linear infinite;
    white-space: nowrap;
  }

  .ticker-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .ticker-item .val {
    color: var(--cyan);
    margin-left: 0.5rem;
  }

  .ticker-item .up { color: var(--green); }
  .ticker-item .sep { color: var(--border); margin: 0 1rem; }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── WHAT IS MESAN ── */
  #que-es {
    padding: 7rem 3rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 5px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.7;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 1.5rem;
  }

  .section-title em {
    font-style: normal;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,245,255,0.4);
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
    margin-top: 4rem;
  }

  .col-text p {
    color: var(--dim);
    line-height: 1.8;
    margin-bottom: 1rem;
    font-size: 1.05rem;
  }

  .col-text p strong { color: var(--text); }

  /* HOLOGRAM DIAGRAM */
  .holo-diagram {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    max-width: 400px;
    margin: 0 auto;
  }

  .holo-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: rotateSlow linear infinite;
  }

  .ring-1 {
    width: 90%; height: 90%;
    border-color: rgba(0,245,255,0.2);
    animation-duration: 20s;
  }
  .ring-2 {
    width: 70%; height: 70%;
    border-color: rgba(0,255,136,0.25);
    animation-duration: 15s;
    animation-direction: reverse;
  }
  .ring-3 {
    width: 50%; height: 50%;
    border-color: rgba(0,245,255,0.35);
    animation-duration: 10s;
    border-style: dashed;
  }

  @keyframes rotateSlow {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to { transform: translate(-50%,-50%) rotate(360deg); }
  }

  .holo-core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan);
    animation: corePulse 2s ease-in-out infinite;
  }

  @keyframes corePulse {
    0%, 100% { opacity: 1; text-shadow: 0 0 20px var(--cyan); }
    50% { opacity: 0.6; text-shadow: 0 0 60px var(--cyan), 0 0 100px rgba(0,245,255,0.4); }
  }

  .holo-node {
    position: absolute;
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--green);
    animation: nodePulse 2s ease-in-out infinite;
  }

  @keyframes nodePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── PLANES PRICING ── */
  #planes {
    padding: 7rem 3rem;
    background: linear-gradient(180deg, transparent, rgba(0,245,255,0.02) 50%, transparent);
  }

  .planes-inner {
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
  }

  .planes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 4rem;
    align-items: start;
  }

  .plan-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 2.5rem 2rem;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    transition: all 0.3s;
  }

  .plan-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    right: 0;
    height: 2px;
    background: var(--border);
  }

  .plan-card.featured {
    border-color: rgba(0,245,255,0.4);
    background: rgba(0,245,255,0.07);
    transform: scale(1.05);
  }

  .plan-card.featured::before {
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 20px var(--cyan);
  }

  .plan-card:hover {
    border-color: rgba(0,245,255,0.3);
    box-shadow: 0 0 40px rgba(0,245,255,0.08);
    transform: translateY(-4px);
  }

  .plan-card.featured:hover {
    transform: scale(1.05) translateY(-4px);
  }

  .plan-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    background: rgba(0,245,255,0.1);
    border: 1px solid var(--border);
    color: var(--cyan);
    display: inline-block;
    margin-bottom: 1.5rem;
  }

  .plan-badge.hot {
    background: rgba(0,255,136,0.1);
    border-color: rgba(0,255,136,0.3);
    color: var(--green);
  }

  .plan-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  .plan-price {
    font-family: 'Orbitron', monospace;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,245,255,0.4);
    line-height: 1;
    margin: 1rem 0 0.2rem;
  }

  .plan-price sup {
    font-size: 1rem;
    vertical-align: top;
    margin-top: 0.5rem;
  }

  .plan-period {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
  }

  .plan-divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  .plan-features {
    list-style: none;
    text-align: left;
    margin-bottom: 2rem;
  }

  .plan-features li {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--dim);
    padding: 0.5rem 0;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    border-bottom: 1px solid rgba(0,245,255,0.04);
  }

  .plan-features li::before {
    content: '◈';
    color: var(--cyan);
    font-size: 0.5rem;
    flex-shrink: 0;
  }

  .plan-features li.active { color: var(--text); }

  .plan-btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 0.85rem 1.5rem;
    text-decoration: none;
    text-transform: uppercase;
    display: block;
    text-align: center;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .plan-btn-outline {
    border: 1px solid var(--border);
    color: var(--dim);
  }

  .plan-btn-outline:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .plan-btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--green));
    color: #000;
    font-weight: 900;
  }

  .plan-btn-primary:hover {
    box-shadow: 0 0 30px rgba(0,245,255,0.4);
  }

  /* ── HOW IT WORKS ── */
  #como-funciona {
    padding: 7rem 3rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-top: 4rem;
    position: relative;
  }

  .steps-grid::before {
    content: '';
    position: absolute;
    top: 28px;
    left: calc(12.5%);
    right: calc(12.5%);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--green), var(--cyan), transparent);
    opacity: 0.3;
  }

  .step {
    text-align: center;
    padding: 0 1rem;
    position: relative;
  }

  .step-num {
    width: 56px; height: 56px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--cyan);
    background: var(--bg);
    position: relative;
    z-index: 1;
    transition: all 0.3s;
  }

  .step:hover .step-num {
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.3);
    background: rgba(0,245,255,0.08);
  }

  .step-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 0.8rem;
    text-transform: uppercase;
  }

  .step-desc {
    font-size: 0.85rem;
    color: var(--dim);
    line-height: 1.6;
  }

  /* ── NODOS ── */
  #nodos {
    padding: 7rem 3rem;
    background: radial-gradient(ellipse 60% 50% at 50% 100%, rgba(0,255,136,0.04), transparent);
  }

  .nodos-inner {
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
  }

  .nodos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .nodo-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1.8rem;
    text-align: left;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .nodo-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green), transparent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .nodo-card:hover::after { transform: scaleX(1); }
  .nodo-card:hover {
    border-color: rgba(0,255,136,0.2);
    box-shadow: 0 0 30px rgba(0,255,136,0.05);
  }

  .nodo-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .status-dot.pending { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .status-online { color: var(--green); }
  .status-pending { color: var(--amber); }

  .nodo-city {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.3rem;
  }

  .nodo-state {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 1rem;
  }

  .nodo-features {
    font-size: 0.75rem;
    color: var(--dim);
    line-height: 1.7;
  }

  .nodo-features strong { color: var(--cyan); font-size: 0.65rem; font-family: 'Share Tech Mono', monospace; }

  /* ── SHA SECTION ── */
  #certificacion {
    padding: 7rem 3rem;
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
  }

  .sha-display {
    margin: 3rem auto;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    padding: 2.5rem;
    position: relative;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  .sha-display::before {
    content: 'SHA-256 HASH OUTPUT';
    position: absolute;
    top: 0; left: 0;
    font-size: 0.55rem;
    letter-spacing: 3px;
    padding: 0.4rem 0.8rem;
    background: var(--border);
    color: var(--dim);
  }

  .sha-hash {
    font-size: 0.75rem;
    color: var(--cyan);
    word-break: break-all;
    letter-spacing: 1.5px;
    line-height: 1.6;
    text-shadow: 0 0 10px rgba(0,245,255,0.3);
