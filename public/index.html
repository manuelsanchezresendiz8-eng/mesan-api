<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω | DASHBOARD</title>
    <style>
        body { background-color: #0a0a0b; color: #00f3ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; border: 4px solid #00f3ff; box-sizing: border-box; overflow: hidden; }
        .cuadro { border: 1px solid #ff00ff; padding: 20px; background: rgba(0,0,0,0.8); box-shadow: 0 0 15px #ff00ff; text-align: center; width: 85%; max-width: 450px; }
        .btn { background: #00f3ff; color: black; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 20px; width: 100%; display: block; }
        .stats { display: none; text-align: left; margin-top: 20px; border-top: 1px solid #00f3ff; padding-top: 10px; }
        .stat-line { margin: 12px 0; font-size: 0.9rem; }
        .valor { color: #ff00ff; font-weight: bold; float: right; }
        #Terminal { font-size: 1.1rem; color: #ff00ff; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>MESAN Ω</h1>
    <p style="letter-spacing: 3px; font-size: 0.8rem;">SOBERANÍA TECNOLÓGICA</p>

    <div class="cuadro">
        <p id="Terminal">SISTEMA LISTO _</p>
        <button class="btn" id="BtnScan" onclick="entrar()">INICIAR ESCANEO</button>

        <div id="Dashboard" class="stats">
            <div class="stat-line">NODO OPERATIVO: <span class="valor">ACTIVO</span></div>
            <div class="stat-line">NIVEL DE RIESGO: <span class="valor" style="color: #00ff00;">BAJO (2.4%)</span></div>
            <div class="stat-line">EFICIENCIA GLOBAL: <span class="valor">98.6%</span></div>
            <div class="stat-line">ESTADO: <span class="valor">DASHBOARD OK</span></div>
            <p style="font-size: 0.6rem; color: #666; margin-top: 20px; text-align: center;">PROYECTO MAESTRO 2026</p>
        </div>
    </div>

    <script>
    function entrar() {
        document.getElementById('BtnScan').style.display = 'none';
        document.getElementById('Terminal').innerText = "ACCEDIENDO...";
        
        setTimeout(() => {
            document.getElementById('Terminal').innerText = "DASHBOARD ACTIVO";
            document.getElementById('Dashboard').style.display = 'block';
            alert("ACCESO AUTORIZADO");
        }, 1000);
    }
    </script>
</body>
</html>
