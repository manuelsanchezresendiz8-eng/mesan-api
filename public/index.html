<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAN Ω - Sistema de Diagnóstico</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --dark-bg: #0a0a0b;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            <div class="cuadro de estado">
            <p id="Terminal">ESTADO: EN LÍNEA _</p>
            <p>CONEXIÓN: ESTABLE</p>
            <button class="botón" onclick="activarNodo()">INICIAR ESCANEO</button>
        </div>
    </div>

    <script>
    async function activarNodo() {
        const terminal = document.getElementById('Terminal');
        terminal.innerText = "CONECTANDO CON EL NODO...";
        
        try {
            // Esta es la llamada real a tu motor de Python en Render
            const respuesta = await fetch('https://mesan-api.onrender.com/');
            const datos = await respuesta.json();
            
            terminal.innerText = "NODO ACTIVO: " + datos.status;
            alert("CONEXIÓN EXITOSA CON MESAN Ω");
        } catch (error) {
            terminal.innerText = "ESTADO: ERROR DE VINCULACIÓN";
            alert("El motor de Python en Render está despertando. Reintenta en 20 segundos.");
        }
    }
    </script>
</body>
</html>
