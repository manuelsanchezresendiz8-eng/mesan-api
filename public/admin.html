<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN-Omega | CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f3ff;--magenta:#ff0055;--dark:#000508;--panel:#040f1e;--text:#d4e8f0;--dim:rgba(180,210,225,0.4);--border:rgba(0,243,255,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;padding:24px;}
h1{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;color:var(--cyan);letter-spacing:6px;margin-bottom:6px;}
.sub{font-size:10px;letter-spacing:3px;color:var(--dim);margin-bottom:24px;}
.stats{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
.stat{border:1px solid var(--border);padding:14px 20px;background:var(--panel);}
.stat-num{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:var(--cyan);}
.stat-num.red{color:var(--magenta);}
.stat-lbl{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.f-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:5px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;}
.f-btn.active{border-color:var(--cyan);color:var(--cyan);}
.card{border:1px solid var(--border);background:var(--panel);padding:18px;margin-bottom:12px;}
.card.critico{border-left:3px solid var(--magenta);}
.card.vulnerable{border-left:3px solid #ffaa00;}
.card.estable{border-left:3px solid #00e5a0;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.empresa{font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;color:#fff;}
.fecha{font-size:9px;color:var(--dim);letter-spacing:1px;}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.score{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;}
.score.critico{color:var(--magenta);}
.score.vulnerable{color:#ffaa00;}
.score.estable{color:#00e5a0;}
.badge{padding:3px 8px;font-size:9px;letter-spacing:2px;font-weight:700;border:1px solid;}
.badge.critico{color:var(--magenta);border-color:var(--magenta);}
.badge.vulnerable{color:#ffaa00;border-color:#ffaa00;}
.badge.estable{color:#00e5a0;border-color:#00e5a0;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.info-item{font-size:11px;}
.info-lbl{font-size:9px;letter-spacing:1px;color:var(--cyan);text-transform:uppercase;}
.impacto{background:rgba(255,0,85,0.07);border:1px solid rgba(255,0,85,0.2);padding:8px 12px;margin-bottom:10px;font-size:11px;}
.impacto span{color:var(--magenta);font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700;}
.problemas{margin-bottom:12px;}
.prob-lbl{font-size:9px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:6px;}
.prob-item{padding:4px 8px;border-left:2px solid var(--magenta);background:rgba(255,0,85,0.05);margin-bottom:3px;font-size:11px;}
.prob-area{color:var(--magenta);}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn-wa{background:#25D366;color:#fff;border:none;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-call{background:var(--cyan);color:var(--dark);border:none;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-id{background:transparent;border:1px solid var(--border);color:var(--dim);padding:7px 10px;font-size:9px;letter-spacing:1px;cursor:pointer;}
select.estatus{background:var(--dark);color:var(--text);border:1px solid var(--border);padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;}
.empty{text-align:center;padding:60px 20px;color:var(--dim);}
.empty h3{font-family:'Orbitron',sans-serif;font-size:.9rem;letter-spacing:3px;margin-bottom:8px;}
.refresh{background:transparent;border:1px solid var(--cyan);color:var(--cyan);padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;margin-bottom:20px;}
.timer{font-size:9px;color:var(--dim);letter-spacing:1px;display:inline-block;margin-left:12px;}
</style>
</head>
<body>

<h1>MESAN-Ω CRM</h1>
<div class="sub">// Panel de Control de Leads</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="total">0</div><div class="stat-lbl">Total Leads</div></div>
  <div class="stat"><div class="stat-num red" id="criticos">0</div><div class="stat-lbl">Criticos</div></div>
  <div class="stat"><div class="stat-num" id="nuevos">0</div><div class="stat-lbl">Nuevos</div></div>
  <div class="stat"><div class="stat-num" id="contactados">0</div><div class="stat-lbl">Contactados</div></div>
</div>

<button class="refresh" onclick="cargar()">↺ Actualizar</button>
<span class="timer" id="timer">Auto-refresh: 30s</span>

<div class="filters">
  <button class="f-btn active" onclick="filtrar('todos',this)">Todos</button>
  <button class="f-btn" onclick="filtrar('nuevo',this)">Nuevos</button>
  <button class="f-btn" onclick="filtrar('CRITICO',this)">Criticos</button>
  <button class="f-btn" onclick="filtrar('contactado',this)">Contactados</button>
  <button class="f-btn" onclick="filtrar('cerrado',this)">Cerrados</button>
</div>

<div id="leads"></div>

<script>
const API = "https://mesan-api.onrender.com";
let todos = [];
let countdown = 30;

async function cargar() {
  try {
    const res = await fetch(API + "/leads");
    const data = await res.json();
    todos = (data.leads || []).reverse();
    actualizarStats();
    renderizar(todos);
    countdown = 30;
  } catch(e) {
    document.getElementById("leads").innerHTML = '<div class="empty"><h3>Error conectando API</h3><p>Verifica que Render esté activo</p></div>';
  }
}

function actualizarStats() {
  document.getElementById("total").textContent = todos.length;
  document.getElementById("criticos").textContent = todos.filter(l => l.clasificacion === "CRITICO").length;
  document.getElementById("nuevos").textContent = todos.filter(l => l.estatus === "nuevo").length;
  document.getElementById("contactados").textContent = todos.filter(l => l.estatus === "contactado").length;
}

function filtrar(tipo, btn) {
  document.querySelectorAll(".f-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  let filtrados = todos;
  if (tipo === "nuevo" || tipo === "contactado" || tipo === "cerrado") {
    filtrados = todos.filter(l => l.estatus === tipo);
  } else if (tipo === "CRITICO") {
    filtrados = todos.filter(l => l.clasificacion === "CRITICO");
  }
  renderizar(filtrados);
}

function renderizar(leads) {
  const div = document.getElementById("leads");
  if (!leads.length) {
    div.innerHTML = '<div class="empty"><h3>Sin leads</h3><p>Comparte la landing para recibir diagnosticos</p></div>';
    return;
  }
  leads.sort((a,b) => (b.score||0) - (a.score||0));
  div.innerHTML = "";
  leads.forEach(l => {
    const cl = (l.clasificacion||"").toLowerCase() === "critico" ? "critico" :
               (l.clasificacion||"").toLowerCase() === "vulnerable" ? "vulnerable" : "estable";
    const soluciones = l.soluciones || [];
    const impMin = l.impacto_min ? "$"+Number(l.impacto_min).toLocaleString("es-MX")+" MXN" : "—";
    const impMax = l.impacto_max ? "$"+Number(l.impacto_max).toLocaleString("es-MX")+" MXN" : "—";
    const tel = (l.telefono||"").replace(/\D/g,"");
    const probsHtml = soluciones.length
      ? soluciones.map(s => `<div class="prob-item"><span class="prob-area">${s.area}</span> — ${s.accion}</div>`).join("")
      : '<div class="prob-item" style="color:var(--dim)">Sin detalle</div>';
    const waMsg = encodeURIComponent(`Hola ${l.nombre||""}, ya revise tu diagnostico MESAN-Omega. Score: ${l.score||0} — ${l.clasificacion||""}. ID: ${l.id}. Podemos corregir esto.`);

    div.innerHTML += `
      <div class="card ${cl}">
        <div class="card-top">
          <div class="empresa">${l.nombre||"Sin nombre"}</div>
          <div class="fecha">${l.fecha?l.fecha.substring(0,16).replace("T"," "):"—"}</div>
        </div>
        <div class="score-row">
          <div class="score ${cl}">${l.score||0}</div>
          <div class="badge ${cl}">${l.clasificacion||"SIN DATOS"}</div>
        </div>
        <div class="info-grid">
          <div class="info-item"><div class="info-lbl">Telefono</div>${l.telefono||"—"}</div>
          <div class="info-item"><div class="info-lbl">Email</div>${l.email||"—"}</div>
        </div>
        <div class="impacto">Exposicion: <span>${impMin} — ${impMax}</span></div>
        <div class="problemas">
          <div class="prob-lbl">Problemas detectados</div>
          ${probsHtml}
        </div>
        <div class="actions">
          <a href="https://wa.me/52${tel}?text=${waMsg}" target="_blank" class="btn-wa">WhatsApp</a>
          <a href="tel:${l.telefono}" class="btn-call">Llamar</a>
          <button class="btn-id" onclick="navigator.clipboard.writeText('${l.id}')">ID: ${(l.id||"").substring(0,8)}...</button>
          <select class="estatus" onchange="actualizar('${l.id}',this.value)">
            <option ${l.estatus==="nuevo"?"selected":""} value="nuevo">nuevo</option>
            <option ${l.estatus==="contactado"?"selected":""} value="contactado">contactado</option>
            <option ${l.estatus==="cerrado"?"selected":""} value="cerrado">cerrado</option>
            <option ${l.estatus==="perdido"?"selected":""} value="perdido">perdido</option>
          </select>
        </div>
      </div>`;
  });
}

async function actualizar(id, estatus) {
  await fetch(API + "/lead/" + id, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({estatus})
  });
}

setInterval(() => {
  countdown--;
  document.getElementById("timer").textContent = "Auto-refresh: " + countdown + "s";
  if (countdown <= 0) cargar();
}, 1000);

cargar();
</script>
</body>
</html>
